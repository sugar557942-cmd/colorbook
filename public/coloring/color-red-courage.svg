  <circle cx="175" cy="224" r="3" fill="white"/>
  <circle cx="222" cy="228" r="14" class="colorable" id="eye-r"/>
  <circle cx="222" cy="228" r="7" class="fixed"/>
  <circle cx="219" cy="224" r="3" fill="white"/>

