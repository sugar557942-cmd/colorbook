  <path d="M323,114 Q320,106 318,100" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="318" cy="99" r="2.5" fill="#2a2a2a"/>
  <path d="M327,114 Q330,106 332,100" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="332" cy="99" r="2.5" fill="#2a2a2a"/>
