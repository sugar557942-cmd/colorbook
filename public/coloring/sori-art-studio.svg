  <circle cx="258" cy="346" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="272" cy="340" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="287" cy="346" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="291" cy="360" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="280" cy="371" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

