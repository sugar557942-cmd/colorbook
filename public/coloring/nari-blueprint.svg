<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">나리의 발명 설계도</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- BLUEPRINT PAPER (large) -->
  <rect x="32" y="75" width="288" height="360" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- GRID LINES on blueprint (light) -->
  <!-- Vertical lines -->
  <line x1="56" y1="75" x2="56" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="80" y1="75" x2="80" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="104" y1="75" x2="104" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="128" y1="75" x2="128" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="152" y1="75" x2="152" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="176" y1="75" x2="176" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="200" y1="75" x2="200" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="224" y1="75" x2="224" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="248" y1="75" x2="248" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="272" y1="75" x2="272" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="296" y1="75" x2="296" y2="435" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <!-- Horizontal lines -->
  <line x1="32" y1="99" x2="320" y2="99" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="123" x2="320" y2="123" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="147" x2="320" y2="147" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="171" x2="320" y2="171" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="195" x2="320" y2="195" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="219" x2="320" y2="219" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="243" x2="320" y2="243" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="267" x2="320" y2="267" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="291" x2="320" y2="291" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="315" x2="320" y2="315" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="339" x2="320" y2="339" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="363" x2="320" y2="363" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="387" x2="320" y2="387" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="411" x2="320" y2="411" stroke="#2a2a2a" stroke-width="0.6" opacity="0.3"/>

  <!-- BLUEPRINT TITLE BAR -->
  <rect x="32" y="75" width="288" height="28" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="176" y="94" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="12" font-weight="bold" fill="#2a2a2a">발명품 설계도 No. ____</text>

  <!-- INVENTION SKETCH (rough outline of a flying machine / glider concept) -->
  <!-- Main body outline -->
  <path d="M80,220 Q80,185 100,175 Q130,160 160,165 Q180,168 185,185 L185,245 Q160,258 130,255 Q100,252 80,240 Z" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Wings -->
  <path d="M100,180 Q70,160 48,148 Q38,160 48,172 Q65,180 100,190" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M170,178 Q200,160 222,148 Q232,160 222,172 Q205,180 170,190" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Propeller circle (front) -->
  <circle cx="130" cy="168" r="14" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="130" y1="154" x2="130" y2="182" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="116" y1="168" x2="144" y2="168" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Tail fin -->
  <path d="M130,255 L118,278 L142,278 Z" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Cockpit window -->
  <circle cx="145" cy="205" r="14" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- MEASUREMENT ARROWS -->
  <!-- Width arrow -->
  <line x1="48" y1="148" x2="222" y2="148" stroke="#2a2a2a" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <polygon points="48,148 54,144 54,152" fill="#2a2a2a"/>
  <polygon points="222,148 216,144 216,152" fill="#2a2a2a"/>
  <text x="135" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2a2a2a">____ cm</text>
  <!-- Height arrow -->
  <line x1="36" y1="148" x2="36" y2="278" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="36,148 32,154 40,154" fill="#2a2a2a"/>
  <polygon points="36,278 32,272 40,272" fill="#2a2a2a"/>
  <text x="31" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2a2a2a" transform="rotate(-90,31,218)">____ cm</text>

  <!-- LABELS with blank boxes -->
  <!-- Label 1 -->
  <line x1="200" y1="168" x2="235" y2="152" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="235" y="140" width="70" height="20" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="270" y="154" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#555">프로펠러</text>
  <!-- Label 2 -->
  <line x1="155" y1="205" x2="235" y2="205" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="235" y="194" width="70" height="20" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="270" y="208" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#555">조종석</text>
  <!-- Label 3 -->
  <line x1="130" y1="262" x2="235" y2="252" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,2"/>
  <rect x="235" y="241" width="70" height="20" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="270" y="255" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#555">꼬리날개</text>

  <!-- Large blank area for drawing -->
  <rect x="40" y="300" width="272" height="128" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="176" y="360" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="12" fill="#aaa">여기에 내 발명품을 그려요</text>

  <!-- NARI FOX (small, lower right, holding pencil) -->
  <!-- Body (small) -->
  <ellipse cx="345" cy="340" rx="22" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Tail -->
  <path d="M360 342 Q378 330 378 315 Q378 302 368 300 Q362 298 360 306 Q368 308 366 318 Q363 328 352 336 Q347 342 350 348 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Left arm (holding pencil up) -->
  <path d="M330 322 Q322 310 325 298" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="326" cy="295" rx="8" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Pencil in hand -->
  <rect x="320" y="272" width="6" height="26" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-10,323,285)"/>
  <polygon points="320,272 326,272 323,264" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-10,323,285)"/>
  <!-- Legs -->
  <ellipse cx="337" cy="366" rx="11" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="353" cy="366" rx="11" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Neck -->
  <rect x="340" y="305" width="10" height="10" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Head -->
  <ellipse cx="345" cy="292" rx="26" ry="23" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Ears -->
  <path d="M328 280 L321 258 L341 272Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M331 278 L326 260 L339 271Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M362 280 L369 258 L349 272Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M359 278 L364 260 L351 271Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Goggles -->
  <rect x="332" y="282" width="12" height="8" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="347" y="282" width="12" height="8" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="344" y1="286" x2="347" y2="286" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="338" cy="292" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="338" cy="292" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="338" cy="292" r="1" fill="#2a2a2a"/>
  <circle cx="352" cy="292" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="352" cy="292" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="352" cy="292" r="1" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="345" cy="302" rx="13" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="345" cy="298" rx="3" ry="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Smile -->
  <path d="M340 306 Q345 311 350 306" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="475" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">설계도 빈칸에 내가 만들고</tspan>
    <tspan x="200" dy="18">싶은 것을 그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
