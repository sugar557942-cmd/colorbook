  <circle cx="150" cy="175" r="22" class="colorable" id="ear-l"/>
  <circle cx="150" cy="175" r="12" class="colorable" id="ear-l-in"/>
  <circle cx="250" cy="175" r="22" class="colorable" id="ear-r"/>
  <circle cx="250" cy="175" r="12" class="colorable" id="ear-r-in"/>

