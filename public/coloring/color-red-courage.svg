<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">빨간색 = 용기와 힘!</text>

  <!-- 불꽃 배경 장식들 -->
  <path d="M48 420 Q38 395 48 375 Q56 358 48 340 Q60 355 62 375 Q68 355 72 340 Q80 360 78 385 Q82 370 88 355 Q90 380 82 400 Q90 388 96 375 Q94 405 80 420 Z" class="colorable" id="flame-l"/>
  <path d="M304 420 Q294 395 304 375 Q312 358 304 340 Q316 355 318 375 Q324 355 328 340 Q336 360 334 385 Q338 370 344 355 Q346 380 338 400 Q346 388 352 375 Q350 405 336 420 Z" class="colorable" id="flame-r"/>

  <!-- 작은 불꽃들 -->
  <path d="M160 455 Q155 445 160 435 Q164 428 160 420 Q166 427 167 435 Q170 428 173 420 Q176 430 175 440 Q178 433 181 425 Q182 437 178 447 Q181 441 184 435 Q183 450 174 458 Z" class="colorable" id="small-flame-l"/>
  <path d="M218 455 Q213 445 218 435 Q222 428 218 420 Q224 427 225 435 Q228 428 231 420 Q234 430 233 440 Q236 433 239 425 Q240 437 236 447 Q239 441 242 435 Q241 450 232 458 Z" class="colorable" id="small-flame-r"/>

