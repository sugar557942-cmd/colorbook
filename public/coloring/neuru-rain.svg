  <ellipse cx="195" cy="297" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="201" cy="300" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60,201,300)"/>
  <ellipse cx="201" cy="308" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120,201,308)"/>
  <ellipse cx="195" cy="311" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="189" cy="308" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240,189,308)"/>
  <ellipse cx="189" cy="300" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300,189,300)"/>

  <!-- Legs walking -->
  <ellipse cx="248" cy="368" rx="19" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-30,248,368)"/>
  <ellipse cx="143" cy="365" rx="19" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(15,143,365)"/>
  <ellipse cx="238" cy="382" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(20,238,382)"/>
  <ellipse cx="152" cy="380" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-20,152,380)"/>

  <!-- Neck -->
  <ellipse cx="252" cy="338" rx="14" ry="19" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Head -->
  <circle cx="268" cy="320" r="22" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Eyes - determined smile in rain -->
  <circle cx="276" cy="314" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="278" cy="314" r="2.5" fill="#2a2a2a"/>
  <circle cx="279" cy="312" r="1" fill="white"/>
  <circle cx="262" cy="316" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="262" cy="316" r="1.5" fill="#2a2a2a"/>
  <!-- Determined smile -->
  <path d="M259,325 Q267,332 276,326" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Raindrop on shell tip -->
  <path d="M195,281 Q198,272 195,267 Q192,272 195,281" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Tail -->
  <path d="M127,358 Q115,364 112,374" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">비가 그치면 무엇이 나타날까요?</tspan>
    <tspan x="200" dy="18">그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
