  <path d="M183 262 Q191 270 200 265 Q209 270 217 262" class="outline" stroke-width="2"/>
  <!-- 작은 이빨 -->
  <path d="M191 268 L194 278 L197 268" class="colorable" id="tooth-l"/>
  <path d="M203 268 L206 278 L209 268" class="colorable" id="tooth-r"/>

