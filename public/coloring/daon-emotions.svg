<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- White background -->
  <rect width="400" height="560" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">다온이의 마음 날씨</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === SMALL BEAR AT TOP CENTER === -->
  <!-- Ears -->
  <circle cx="182" cy="82" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="184" cy="84" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="218" cy="82" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="216" cy="84" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Head -->
  <circle cx="200" cy="100" r="35" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="190" cy="94" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="191" cy="93" r="2.2" fill="#2a2a2a"/>
  <circle cx="210" cy="94" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="211" cy="93" r="2.2" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="200" cy="108" rx="16" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Nose -->
  <ellipse cx="200" cy="103" rx="5" ry="3.5" fill="#2a2a2a"/>
  <!-- Smile -->
  <path d="M193,112 Q200,120 207,112" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Body (small) -->
  <ellipse cx="200" cy="152" rx="30" ry="35" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === WEATHER PANELS 2x2 GRID === -->
  <!-- Panel 1: 맑음 (Sunny) — top left -->
  <rect x="30" y="200" width="155" height="130" rx="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Sun circle -->
  <circle cx="107" cy="252" r="28" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Sun rays -->
  <line x1="107" y1="212" x2="107" y2="204" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="131" y1="220" x2="136" y2="214" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="144" y1="244" x2="152" y2="244" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="131" y1="268" x2="136" y2="274" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="107" y1="280" x2="107" y2="288" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83" y1="268" x2="78" y2="274" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="244" x2="62" y2="244" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83" y1="220" x2="78" y2="214" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sun smile face -->
  <circle cx="99" cy="247" r="3.5" fill="#2a2a2a"/>
  <circle cx="115" cy="247" r="3.5" fill="#2a2a2a"/>
  <path d="M97,257 Q107,266 117,257" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="107" y="314" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">맑음</text>

  <!-- Panel 2: 흐림 (Cloudy) — top right -->
  <rect x="215" y="200" width="155" height="130" rx="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Clouds -->
  <ellipse cx="292" cy="248" rx="36" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="268" cy="258" rx="24" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="316" cy="256" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Partially hidden sun behind clouds -->
  <path d="M272,228 A22,22 0 0 1 312,228" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="292" y1="208" x2="292" y2="202" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="309" y1="213" x2="313" y2="208" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="316" y1="228" x2="322" y2="228" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="292" y="314" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">흐림</text>

  <!-- Panel 3: 비 (Rainy) — bottom left -->
  <rect x="30" y="345" width="155" height="130" rx="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Rain cloud -->
  <ellipse cx="107" cy="382" rx="38" ry="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="85" cy="390" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="130" cy="388" rx="20" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Rain drops -->
  <path d="M75,412 Q72,424 75,428" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92,418 Q89,430 92,434" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M108,412 Q105,424 108,428" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M124,418 Q121,430 124,434" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M140,412 Q137,424 140,428" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="107" y="458" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">비</text>

  <!-- Panel 4: 무지개 (Rainbow) — bottom right -->
  <rect x="215" y="345" width="155" height="130" rx="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Rainbow arcs -->
  <path d="M228,455 Q292,365 358,455" fill="none" stroke="#2a2a2a" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M236,455 Q292,375 349,455" fill="none" stroke="#2a2a2a" stroke-width="4" stroke-linecap="round"/>
  <path d="M244,455 Q292,385 341,455" fill="none" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M252,455 Q292,395 332,455" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M260,455 Q292,405 324,455" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small clouds at rainbow ends -->
  <ellipse cx="235" cy="452" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="349" cy="452" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Label -->
  <text x="292" y="458" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">무지개</text>

  <!-- Activity prompt -->
  <text x="200" y="488" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">오늘 내 마음은 어떤 날씨예요?</tspan>
    <tspan x="200" dy="18">날씨 칸에 색을 칠해 보세요.</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
