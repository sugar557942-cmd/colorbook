<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">노래하는 하루</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Spotlight circle around rabbit -->
  <circle cx="200" cy="280" r="140" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- Music staff lines in background -->
  <line x1="35" y1="90" x2="175" y2="90" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="35" y1="100" x2="175" y2="100" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="35" y1="110" x2="175" y2="110" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="35" y1="120" x2="175" y2="120" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="35" y1="130" x2="175" y2="130" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="225" y1="90" x2="368" y2="90" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="225" y1="100" x2="368" y2="100" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="225" y1="110" x2="368" y2="110" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="225" y1="120" x2="368" y2="120" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="225" y1="130" x2="368" y2="130" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Musical notes floating -->
  <text x="55" y="108" font-family="Arial" font-size="24" fill="none" stroke="#2a2a2a" stroke-width="1.5">♪</text>
  <text x="100" y="98" font-family="Arial" font-size="20" fill="none" stroke="#2a2a2a" stroke-width="1.5">♫</text>
  <text x="140" y="115" font-family="Arial" font-size="18" fill="none" stroke="#2a2a2a" stroke-width="1.5">♩</text>
  <text x="248" y="103" font-family="Arial" font-size="22" fill="none" stroke="#2a2a2a" stroke-width="1.5">♫</text>
  <text x="298" y="115" font-family="Arial" font-size="18" fill="none" stroke="#2a2a2a" stroke-width="1.5">♪</text>
  <text x="338" y="100" font-family="Arial" font-size="20" fill="none" stroke="#2a2a2a" stroke-width="1.5">♩</text>

  <!-- Rabbit (하루) singing -->
  <!-- Left ear -->
  <ellipse cx="174" cy="168" rx="19" ry="52" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="174" cy="170" rx="11" ry="38" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear -->
  <ellipse cx="226" cy="168" rx="19" ry="52" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="226" cy="170" rx="11" ry="38" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="220" r="52" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (happy squint singing) -->
  <path d="M180,210 Q186,203 192,210" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M208,210 Q214,203 220,210" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="200" cy="230" rx="6" ry="4.5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Open singing mouth (large) -->
  <path d="M185,236 Q200,255 215,236" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Tongue suggestion -->
  <ellipse cx="200" cy="248" rx="8" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Cheek flush circles -->
  <circle cx="178" cy="232" r="8" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="222" cy="232" r="8" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Microphone in right paw -->
  <!-- Mic body -->
  <rect x="285" y="290" width="22" height="38" rx="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Mic head (larger bulb) -->
  <circle cx="296" cy="282" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Mic grid lines -->
  <line x1="278" y1="282" x2="314" y2="282" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="280" y1="274" x2="312" y2="274" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="280" y1="290" x2="312" y2="290" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="296" y1="264" x2="296" y2="300" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Mic stand/handle -->
  <rect x="290" y="328" width="12" height="30" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Body -->
  <ellipse cx="200" cy="352" rx="55" ry="55" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Left arm (gesturing) -->
  <path d="M148,328 Q122,310 112,295" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="106" cy="290" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-40,106,290)"/>
  <!-- Right arm (holding mic) -->
  <path d="M252,330 Q270,310 280,300" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="177" cy="400" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="223" cy="400" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Tail -->
  <circle cx="250" cy="345" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Sound waves from mouth -->
  <path d="M218,243 Q235,238 240,248 Q245,258 238,263" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M218,243 Q240,232 248,244 Q255,258 244,268" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">하루가 부르는 노래는 어떤 제목일까요?</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
