<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <text x="200" y="22" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">보라색 = 창의력과 상상!</text>

  <!-- 마법 모자 (가운데 위) -->
  <path d="M140 215 L200 65 L260 215 Z" class="colorable" id="hat-body"/>
  <ellipse cx="200" cy="218" rx="72" ry="22" class="colorable" id="hat-brim"/>
  <!-- 모자 별 장식 -->
  <path d="M185 130 L187 123 L189 130 L196 132 L189 134 L187 141 L185 134 L178 132 Z" class="colorable" id="hat-star1"/>
  <path d="M208 158 L210 152 L212 158 L218 160 L212 162 L210 168 L208 162 L202 160 Z" class="colorable" id="hat-star2"/>
  <circle cx="200" cy="100" r="6" class="colorable" id="hat-dot1"/>
  <circle cx="178" cy="172" r="5" class="colorable" id="hat-dot2"/>
  <circle cx="222" cy="175" r="5" class="colorable" id="hat-dot3"/>
  <!-- 모자 끝 별 -->
  <path d="M200 65 L203 55 L206 65 L216 68 L206 71 L203 81 L200 71 L190 68 Z" class="colorable" id="hat-top-star"/>

  <!-- 마법 지팡이 -->
  <rect x="285" y="200" width="12" height="120" rx="5" transform="rotate(20 285 200)" class="colorable" id="wand"/>
  <path d="M295 185 L300 172 L305 185 L318 188 L305 191 L300 204 L295 191 L282 188 Z" class="colorable" id="wand-star"/>
  <!-- 지팡이 빛 -->
  <line x1="308" y1="172" x2="320" y2="160" class="outline" stroke-width="1.5"/>
  <line x1="318" y1="180" x2="332" y2="174" class="outline" stroke-width="1.5"/>
  <line x1="316" y1="192" x2="330" y2="192" class="outline" stroke-width="1.5"/>

  <!-- 마법 소용돌이 (왼쪽) -->
  <path d="M60 200 Q40 185 48 165 Q58 148 78 155 Q95 162 90 180 Q85 195 72 192 Q62 188 65 178 Q68 170 76 173" class="outline" stroke-width="2.5"/>

  <!-- 큰 별들 -->
  <path d="M55 105 L60 88 L65 105 L82 110 L65 115 L60 132 L55 115 L38 110 Z" class="colorable" id="big-star1"/>
  <path d="M340 115 L345 98 L350 115 L367 120 L350 125 L345 142 L340 125 L323 120 Z" class="colorable" id="big-star2"/>
  <path d="M185 48 L188 38 L191 48 L201 51 L191 54 L188 64 L185 54 L175 51 Z" class="colorable" id="top-star"/>

  <!-- 작은 별들 -->
  <path d="M32 155 L34 148 L36 155 L43 157 L36 159 L34 166 L32 159 L25 157 Z" class="colorable" id="sm-star1"/>
  <path d="M368 155 L370 148 L372 155 L379 157 L372 159 L370 166 L368 159 L361 157 Z" class="colorable" id="sm-star2"/>
  <path d="M112 58 L114 52 L116 58 L122 60 L116 62 L114 68 L112 62 L106 60 Z" class="colorable" id="sm-star3"/>
  <path d="M282 42 L284 36 L286 42 L292 44 L286 46 L284 52 L282 46 L276 44 Z" class="colorable" id="sm-star4"/>

  <!-- 마법 책 -->
  <rect x="48" y="295" width="80" height="68" rx="6" class="colorable" id="book-cover"/>
  <rect x="52" y="299" width="72" height="60" rx="4" class="colorable" id="book-page"/>
  <line x1="88" y1="299" x2="88" y2="359" class="outline" stroke-width="2"/>
  <!-- 책 줄 -->
  <line x1="54" y1="315" x2="84" y2="315" class="outline" stroke-width="1.2"/>
  <line x1="54" y1="325" x2="84" y2="325" class="outline" stroke-width="1.2"/>
  <line x1="54" y1="335" x2="84" y2="335" class="outline" stroke-width="1.2"/>
  <line x1="54" y1="345" x2="84" y2="345" class="outline" stroke-width="1.2"/>
  <!-- 책에서 별 나옴 -->
  <path d="M95 318 L97 311 L99 318 L106 320 L99 322 L97 329 L95 322 L88 320 Z" class="colorable" id="book-star1"/>
  <path d="M108 305 L110 299 L112 305 L118 307 L112 309 L110 315 L108 309 L102 307 Z" class="colorable" id="book-star2"/>

  <!-- 무지개 색 구슬들 -->
  <circle cx="200" cy="310" r="22" class="colorable" id="orb-main"/>
  <circle cx="200" cy="310" r="14" class="colorable" id="orb-inner"/>
  <!-- 구슬 주위 원형 -->
  <circle cx="200" cy="310" r="35" class="outline" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- 구슬 빛 -->
  <path d="M190 298 Q195 292 202 295" class="outline" stroke-width="1.5"/>

  <!-- 토끼 (마법사 조수) -->
  <ellipse cx="308" cy="368" rx="30" ry="35" class="colorable" id="rabbit-body"/>
  <circle cx="308" cy="335" r="24" class="colorable" id="rabbit-head"/>
  <ellipse cx="296" cy="312" rx="9" ry="22" class="colorable" id="rabbit-ear-l"/>
  <ellipse cx="320" cy="312" rx="9" ry="22" class="colorable" id="rabbit-ear-r"/>
  <ellipse cx="296" cy="314" rx="5" ry="16" class="colorable" id="rabbit-ear-l-in"/>
  <ellipse cx="320" cy="314" rx="5" ry="16" class="colorable" id="rabbit-ear-r-in"/>
  <circle cx="301" cy="332" r="4.5" class="fixed"/>
  <circle cx="315" cy="332" r="4.5" class="fixed"/>
  <ellipse cx="308" cy="342" rx="9" ry="6" class="colorable" id="rabbit-snout"/>
  <ellipse cx="308" cy="339" rx="3.5" ry="2.5" class="colorable" id="rabbit-nose"/>
  <path d="M302 346 Q308 352 314 346" class="outline"/>

  <!-- 발 -->
  <ellipse cx="293" cy="400" rx="22" ry="14" class="colorable" id="rabbit-foot-l"/>
  <ellipse cx="323" cy="400" rx="22" ry="14" class="colorable" id="rabbit-foot-r"/>

  <!-- 반짝이는 먼지들 (작은 다이아몬드) -->
  <path d="M155 280 L158 274 L161 280 L155 286 Z" class="colorable" id="dust1"/>
  <path d="M238 285 L241 279 L244 285 L238 291 Z" class="colorable" id="dust2"/>
  <path d="M170 250 L172 245 L174 250 L170 255 Z" class="colorable" id="dust3"/>
  <path d="M230 260 L232 255 L234 260 L230 265 Z" class="colorable" id="dust4"/>
  <path d="M145 260 L147 255 L149 260 L145 265 Z" class="colorable" id="dust5"/>
  <path d="M252 248 L254 243 L256 248 L252 253 Z" class="colorable" id="dust6"/>

  <!-- 달 -->
  <path d="M358 55 Q358 28 372 28 A30 30 0 0 0 358 55 Z" class="colorable" id="crescent"/>

  <text x="200" y="468" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">보라색으로 색칠하면 상상력이 커져요!</text>
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#9B8ED6" font-weight="bold">보라색의 창의력 ✨</text>
</svg>
