  <ellipse cx="183" cy="306" rx="11" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="183" cy="307" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M183,303 L184.5,307 L188,307 L185,309 L186,313 L183,310 L180,313 L181,309 L178,307 L181.5,307 Z" fill="#2a2a2a"/>
  <ellipse cx="217" cy="306" rx="11" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="217" cy="307" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M217,303 L218.5,307 L222,307 L219,309 L220,313 L217,310 L214,313 L215,309 L212,307 L215.5,307 Z" fill="#2a2a2a"/>

  <!-- Big singing mouth/muzzle -->
  <ellipse cx="200" cy="328" rx="20" ry="14" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200,321 Q196,317 193,321 Q190,325 196,328 Q200,331 200,331 Q200,331 204,328 Q210,325 207,321 Q204,317 200,321 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
