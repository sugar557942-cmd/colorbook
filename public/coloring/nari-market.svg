<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">두근시장의 나리</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- SKY / BACKGROUND -->
  <!-- Ground -->
  <rect x="28" y="390" width="340" height="65" rx="0" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="28" y1="390" x2="368" y2="390" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- BANNER / BUNTING across top -->
  <line x1="30" y1="90" x2="370" y2="90" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Triangle banners -->
  <polygon points="35,90 55,90 45,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="60,90 80,90 70,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="85,90 105,90 95,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="110,90 130,90 120,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="135,90 155,90 145,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="160,90 180,90 170,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="185,90 205,90 195,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="210,90 230,90 220,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="235,90 255,90 245,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="260,90 280,90 270,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="285,90 305,90 295,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="310,90 330,90 320,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="335,90 355,90 345,108" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- STALL 1 (left side) -->
  <!-- Awning -->
  <path d="M28,118 L28,128 L140,128 L140,118 Z" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M28,128 Q40,145 52,128 Q64,145 76,128 Q88,145 100,128 Q112,145 124,128 Q136,145 140,128" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Stall frame -->
  <rect x="28" y="128" width="112" height="175" rx="0" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stall counter -->
  <rect x="28" y="268" width="112" height="18" rx="0" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sign -->
  <rect x="44" y="135" width="80" height="22" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="84" y="150" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#2a2a2a">신기한 발명품</text>
  <!-- Stall legs -->
  <line x1="38" y1="303" x2="38" y2="390" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="130" y1="303" x2="130" y2="390" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Items on stall 1 (interesting gadgets) -->
  <!-- Gear item -->
  <g transform="translate(60,195)">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="9" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="-22" width="6" height="7" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="15" width="6" height="7" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-22" y="-3" width="7" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="15" y="-3" width="7" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  </g>
  <!-- Crystal/gem shape -->
  <g transform="translate(108,200)">
    <polygon points="0,-20 18,0 0,22 -18,0" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <polygon points="0,-20 18,0 0,0 -18,0" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#2a2a2a" stroke-width="1"/>
  </g>
  <!-- Small robot toy -->
  <g transform="translate(55,240)">
    <rect x="-10" y="-20" width="20" height="20" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-8" y="-30" width="16" height="12" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <circle cx="-4" cy="-24" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
    <circle cx="4" cy="-24" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
    <line x1="-10" y1="-10" x2="-18" y2="-5" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="10" y1="-10" x2="18" y2="-5" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="-5" y2="8" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="0" x2="5" y2="8" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- STALL 2 (right side) -->
  <!-- Awning -->
  <path d="M260,118 L260,128 L368,128 L368,118 Z" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M260,128 Q272,145 284,128 Q296,145 308,128 Q320,145 332,128 Q344,145 356,128 Q363,140 368,128" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Stall frame -->
  <rect x="260" y="128" width="108" height="175" rx="0" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stall counter -->
  <rect x="260" y="268" width="108" height="18" rx="0" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sign -->
  <rect x="276" y="135" width="76" height="22" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="314" y="150" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#2a2a2a">오늘의 특산물</text>
  <!-- Stall legs -->
  <line x1="270" y1="303" x2="270" y2="390" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="358" y1="303" x2="358" y2="390" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Items on stall 2 (produce) -->
  <!-- Apples -->
  <circle cx="290" cy="250" r="14" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M290 236 Q293 230 296 228" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M287 248 Q290 244 293 248" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="315" cy="248" r="14" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M315 234 Q318 228 321 226" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="340" cy="250" r="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M340 238 Q342 232 345 230" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Basket -->
  <path d="M275,265 Q275,275 290,278 Q314,282 338,278 Q353,275 353,265" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M278,265 Q288,258 314,258 Q338,258 350,265" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Basket weave lines -->
  <line x1="290" y1="258" x2="290" y2="278" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="304" y1="258" x2="304" y2="280" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="318" y1="258" x2="318" y2="280" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="332" y1="258" x2="332" y2="278" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="278" y1="268" x2="350" y2="268" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Jar / bottle on stall -->
  <rect x="280" y="195" width="22" height="42" rx="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <rect x="282" y="188" width="18" height="10" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="280" y1="225" x2="302" y2="225" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Candle/lantern on stall -->
  <rect x="330" y="205" width="18" height="34" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M339,205 Q342,196 339,190 Q336,196 339,205Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Lantern bars -->
  <line x1="330" y1="215" x2="348" y2="215" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="330" y1="225" x2="348" y2="225" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="339" y1="205" x2="339" y2="239" stroke="#2a2a2a" stroke-width="1"/>

  <!-- MIDDLE STALL display (smaller, Nari is looking at it) -->
  <rect x="155" y="200" width="90" height="88" rx="4" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="155" y="268" width="90" height="16" rx="0" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Display sign -->
  <rect x="163" y="206" width="74" height="18" rx="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="200" y="219" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="9" fill="#2a2a2a">특별 전시품</text>
  <!-- Mystery item on display (big glowing gadget outline) -->
  <g transform="translate(200, 248)">
    <ellipse cx="0" cy="0" rx="25" ry="16" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-8" y="-24" width="16" height="12" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <polygon points="0,-38 6,-24 -6,-24" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Glow lines -->
    <line x1="-28" y1="-5" x2="-38" y2="-8" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="28" y1="-5" x2="38" y2="-8" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-28" y1="5" x2="-38" y2="8" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="28" y1="5" x2="38" y2="8" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="0" y2="30" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- Display legs -->
  <line x1="170" y1="284" x2="170" y2="390" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="230" y1="284" x2="230" y2="390" stroke="#2a2a2a" stroke-width="2"/>

  <!-- === NARI FOX (looking at display with wide eyes) === -->
  <!-- Tail -->
  <path d="M138 355 Q98 338 95 315 Q92 295 106 292 Q116 290 116 302 Q106 304 108 318 Q110 332 128 342 Q140 350 138 360 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="152" cy="365" rx="32" ry="40" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Legs -->
  <ellipse cx="138" cy="398" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="162" cy="398" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="136" cy="407" rx="13" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="164" cy="407" rx="13" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Arms (raised, excited/curious) -->
  <path d="M132 348 Q118 338 125 324" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="126" cy="321" rx="9" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M172 350 Q182 338 180 325" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="180" cy="322" rx="9" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Neck -->
  <rect x="145" y="318" width="12" height="12" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- HEAD (leaning forward, looking at display) -->
  <ellipse cx="152" cy="303" rx="35" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Ears -->
  <path d="M126 288 L116 262 L144 280Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M129 286 L122 266 L141 279Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M178 288 L188 262 L160 280Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M175 286 L182 266 L163 279Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Goggles -->
  <rect x="136" y="280" width="14" height="10" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <rect x="153" y="280" width="14" height="10" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="150" y1="285" x2="153" y2="285" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Eyes (WIDE, curious) -->
  <circle cx="142" cy="300" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="142" cy="300" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="143" cy="299" r="2.5" fill="#2a2a2a"/>
  <!-- Eye shine -->
  <circle cx="146" cy="297" r="1.5" fill="white"/>
  <circle cx="162" cy="300" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="162" cy="300" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="163" cy="299" r="2.5" fill="#2a2a2a"/>
  <circle cx="166" cy="297" r="1.5" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="152" cy="312" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="152" cy="307" rx="4" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Open excited mouth -->
  <path d="M145 315 Q152 321 159 315" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="475" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">시장에서 가장 재미있어 보이는</tspan>
    <tspan x="200" dy="18">물건은 무엇인가요?</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
