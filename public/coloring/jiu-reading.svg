  <!-- OWL sitting reading -->
  <!-- Body -->
  <ellipse cx="196" cy="354" rx="58" ry="68" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
