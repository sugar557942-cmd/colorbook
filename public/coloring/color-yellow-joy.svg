  <g transform="rotate(180,338,345)"><ellipse cx="338" cy="312" rx="10" ry="18" class="colorable" id="sm-p-r180"/></g>
  <g transform="rotate(240,338,345)"><ellipse cx="338" cy="312" rx="10" ry="18" class="colorable" id="sm-p-r240"/></g>
  <g transform="rotate(300,338,345)"><ellipse cx="338" cy="312" rx="10" ry="18" class="colorable" id="sm-p-r300"/></g>

  <!-- 별/반짝 장식 -->
  <path d="M32 165 L34 158 L36 165 L43 167 L36 169 L34 176 L32 169 L25 167 Z" class="colorable" id="sparkle1"/>
  <path d="M368 165 L370 158 L372 165 L379 167 L372 169 L370 176 L368 169 L361 167 Z" class="colorable" id="sparkle2"/>
  <path d="M36 82 L38 76 L40 82 L46 84 L40 86 L38 92 L36 86 L30 84 Z" class="colorable" id="sparkle3"/>
  <path d="M360 82 L362 76 L364 82 L370 84 L364 86 L362 92 L360 86 L354 84 Z" class="colorable" id="sparkle4"/>

  <!-- 나비들 -->
  <path d="M135 130 Q118 115 112 128 Q118 142 135 135 Z" class="colorable" id="butterfly1-l"/>
  <path d="M140 130 Q157 115 163 128 Q157 142 140 135 Z" class="colorable" id="butterfly1-r"/>
  <circle cx="137" cy="132" r="3" class="fixed"/>
  <path d="M272 148 Q258 134 253 146 Q258 158 272 153 Z" class="colorable" id="butterfly2-l"/>
  <path d="M276 148 Q290 134 295 146 Q290 158 276 153 Z" class="colorable" id="butterfly2-r"/>
  <circle cx="274" cy="150" r="3" class="fixed"/>

  <text x="200" y="468" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">노란색으로 색칠하면 기쁨이 가득해요!</text>
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#F5C518" font-weight="bold">노란색의 기쁨 🌻</text>
</svg>
