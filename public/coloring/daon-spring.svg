  <circle cx="85" cy="415" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="85" y1="420" x2="85" y2="428" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="305" cy="408" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="305" y1="413" x2="305" y2="422" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="350" cy="412" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === BEAR STANDING IN FIELD === -->
  <!-- Left ear outer -->
  <circle cx="162" cy="136" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="165" cy="139" r="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear outer -->
  <circle cx="238" cy="136" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="235" cy="139" r="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="180" r="56" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes (happy bright) -->
  <circle cx="182" cy="170" r="7.5" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="184" cy="168" r="3.2" fill="#2a2a2a"/>
  <circle cx="186" cy="166" r="1.5" fill="white"/>
  <circle cx="218" cy="170" r="7.5" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="220" cy="168" r="3.2" fill="#2a2a2a"/>
  <circle cx="222" cy="166" r="1.5" fill="white"/>
  <!-- Muzzle -->
  <ellipse cx="200" cy="194" rx="26" ry="18" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Nose -->
  <ellipse cx="200" cy="187" rx="7.5" ry="5" fill="#2a2a2a"/>
  <!-- Big happy smile -->
  <path d="M186,200 Q200,214 214,200" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="168" cy="194" rx="11" ry="7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <ellipse cx="232" cy="194" rx="11" ry="7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- Body -->
  <ellipse cx="200" cy="322" rx="68" ry="76" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly -->
  <ellipse cx="200" cy="326" rx="40" ry="46" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Arms (holding a flower) -->
  <!-- Left arm out with flower -->
  <path d="M140,272 Q115,285 95,270" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="90" cy="268" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower in left paw -->
  <circle cx="76" cy="256" r="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="76" cy="243" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="76" cy="269" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="63" cy="256" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="89" cy="256" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Right arm relaxed -->
  <path d="M260,272 Q285,285 298,305 Q305,320 295,340" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="292" cy="344" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Legs -->
  <ellipse cx="170" cy="390" rx="28" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="162" cy="408" rx="22" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="230" cy="390" rx="28" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="238" cy="408" rx="22" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Activity prompt -->
  <text x="200" y="478" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">꽃밭에 내가 좋아하는 꽃을</tspan>
    <tspan x="200" dy="18">더 그려 넣어 보세요.</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
