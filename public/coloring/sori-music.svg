  <line x1="217" y1="328" x2="258" y2="328" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="217" y1="332" x2="256" y2="340" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="324" x2="142" y2="316" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="328" x2="142" y2="328" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="332" x2="144" y2="340" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Music notes from mouth -->
  <ellipse cx="170" cy="356" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20 170 356)"/>
  <line x1="176" y1="354" x2="176" y2="338" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="230" cy="352" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20 230 352)"/>
  <line x1="236" y1="350" x2="236" y2="334" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M236,334 Q250,328 248,340" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">소리의 악보에 내가 좋아하는</tspan>
    <tspan x="200" dy="18">노래 제목을 써 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
