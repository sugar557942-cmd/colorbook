  <line x1="348" y1="400" x2="348" y2="416" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="348" cy="393" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="348" cy="384" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="356" cy="389" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(60,356,389)"/>
  <ellipse cx="356" cy="397" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(120,356,397)"/>
  <ellipse cx="348" cy="402" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(180,348,402)"/>
  <ellipse cx="340" cy="397" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(240,340,397)"/>
  <ellipse cx="340" cy="389" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(300,340,389)"/>

  <!-- TURTLE -->
  <!-- Shell -->
  <ellipse cx="195" cy="335" rx="70" ry="56" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Shell underplate rim -->
  <ellipse cx="195" cy="352" rx="70" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Hex pattern on shell -->
  <polygon points="195,287 214,297 214,316 195,326 176,316 176,297" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="220,302 238,310 238,328 220,336 202,328 202,310" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="170,302 188,310 188,328 170,336 152,328 152,310" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="195,318 213,326 213,344 195,352 177,344 177,326" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="222,318 238,325 238,340 222,347 206,340 206,325" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Flower on center hex -->
  <circle cx="195" cy="306" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="195" cy="299" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="201" cy="303" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60,201,303)"/>
  <ellipse cx="201" cy="309" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120,201,309)"/>
  <ellipse cx="195" cy="313" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="189" cy="309" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240,189,309)"/>
  <ellipse cx="189" cy="303" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300,189,303)"/>

  <!-- Legs -->
  <ellipse cx="248" cy="368" rx="19" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-25,248,368)"/>
  <ellipse cx="143" cy="368" rx="19" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(25,143,368)"/>
  <ellipse cx="240" cy="383" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(15,240,383)"/>
  <ellipse cx="152" cy="383" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-15,152,383)"/>

  <!-- Neck -->
  <ellipse cx="252" cy="336" rx="15" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Head -->
  <circle cx="270" cy="317" r="23" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Eye -->
  <circle cx="278" cy="311" r="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="280" cy="311" r="3" fill="#2a2a2a"/>
  <circle cx="281" cy="309" r="1" fill="white"/>
  <!-- Small eye shine -->
  <circle cx="263" cy="314" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="263" cy="314" r="1" fill="#2a2a2a"/>
  <!-- Happy smile -->
  <path d="M260,322 Q268,330 277,323" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheek blush marks -->
  <line x1="257" y1="317" x2="261" y2="319" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="258" y1="320" x2="262" y2="320" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M127,356 Q115,362 112,372" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">느루처럼 천천히, 포기하지 않고</tspan>
    <tspan x="200" dy="18">끝까지 색칠해 보세요!</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
