<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">씨앗을 퍼뜨리는 라온</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- WIND LINES upper area -->
  <path d="M34,120 Q80,110 130,118 Q170,108 220,116" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <path d="M34,134 Q75,124 120,132 Q160,122 200,130" fill="none" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="5,5" stroke-linecap="round"/>
  <path d="M180,100 Q230,92 285,100 Q325,92 366,100" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <path d="M220,142 Q265,134 310,140 Q340,133 366,140" fill="none" stroke="#2a2a2a" stroke-width="1.3" stroke-dasharray="5,5" stroke-linecap="round"/>

  <!-- === SEQUENCE top to bottom === -->

  <!-- SEQUENCE 1: RAON FLYING with seeds (top center-right) -->
  <!-- Wings spread -->
  <path d="M236,130 Q215,105 200,100 Q206,118 213,128 Q225,126 236,130" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="206" y1="104" x2="218" y2="122" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="200" y1="112" x2="212" y2="125" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M266,130 Q288,105 302,100 Q296,118 289,128 Q277,126 266,130" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="296" y1="104" x2="284" y2="122" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="302" y1="112" x2="290" y2="125" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="251" cy="140" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M230,142 Q220,150 215,146 Q220,139 229,138 Z" fill="white" stroke="#2a2a2a" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="220" y1="142" x2="215" y2="147" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="222" y1="147" x2="217" y2="152" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="264" cy="125" r="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Beak holding seed -->
  <polygon points="276,122 286,120 278,128" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Seed in beak -->
  <ellipse cx="287" cy="120" rx="5" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-15,287,120)"/>
  <!-- Eye joyful -->
  <circle cx="269" cy="121" r="5.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="270" cy="121" r="2.8" fill="#2a2a2a"/>
  <circle cx="271.5" cy="119.5" r="1.1" fill="white"/>
  <!-- Eyebrow -->
  <path d="M265,115 Q269,112 273,114" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Seeds dropping from feet area (dotted trail) -->
  <ellipse cx="238" cy="157" rx="4.5" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20,238,157)"/>
  <ellipse cx="245" cy="163" rx="4" ry="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(10,245,163)"/>
  <ellipse cx="258" cy="160" rx="4" ry="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-30,258,160)"/>
  <!-- Dotted fall lines -->
  <line x1="238" y1="160" x2="230" y2="185" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line x1="245" y1="166" x2="242" y2="200" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line x1="258" y1="163" x2="265" y2="195" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,3" stroke-linecap="round"/>
  <line x1="290" y1="122" x2="295" y2="160" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,3" stroke-linecap="round"/>

  <!-- Arrow 1: fly to drop -->
  <path d="M218,170 Q200,185 190,200" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="190,200 186,188 196,192" fill="#2a2a2a"/>

  <!-- SEQUENCE 2: SEEDS FALLING (middle left) -->
  <text x="65" y="200" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#555">씨앗이</text>
  <text x="65" y="212" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#555">떨어져요!</text>
  <!-- Falling seeds cluster -->
  <ellipse cx="100" cy="215" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,100,215)"/>
  <ellipse cx="85" cy="235" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(20,85,235)"/>
  <ellipse cx="118" cy="242" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-10,118,242)"/>
  <ellipse cx="135" cy="228" rx="5.5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(35,135,228)"/>
  <ellipse cx="150" cy="248" rx="5.5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-25,150,248)"/>
  <!-- Speed lines on seeds -->
  <line x1="100" y1="220" x2="98" y2="232" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2" stroke-linecap="round"/>
  <line x1="85" y1="240" x2="83" y2="252" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2" stroke-linecap="round"/>
  <line x1="118" y1="247" x2="116" y2="258" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2" stroke-linecap="round"/>
  <line x1="135" y1="233" x2="134" y2="244" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2" stroke-linecap="round"/>
  <line x1="150" y1="253" x2="149" y2="264" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2" stroke-linecap="round"/>

  <!-- Soil / earth area -->
  <path d="M34,350 Q80,340 160,348 Q240,340 310,348 Q350,340 366,348 L366,380 L34,380 Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Soil texture -->
  <ellipse cx="70" cy="362" rx="12" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="120" cy="358" rx="14" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="180" cy="363" rx="16" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="250" cy="360" rx="14" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>
  <ellipse cx="320" cy="362" rx="12" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Arrow 2: drop to sprout -->
  <path d="M160,265 Q155,295 155,320" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3" stroke-linecap="round"/>
  <polygon points="155,320 151,308 159,312" fill="#2a2a2a"/>

  <!-- SEQUENCE 3: SEEDS IN SOIL + SPROUTING -->
  <!-- Planted seeds in soil -->
  <ellipse cx="80" cy="349" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="140" cy="346" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="200" cy="348" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="260" cy="346" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="320" cy="349" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- SPROUTS emerging above soil! -->
  <!-- Sprout 1 (small) -->
  <path d="M80,350 Q80,330 80,318" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M80,330 Q72,320 66,316 Q72,326 80,328" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Sprout 2 (medium) -->
  <path d="M140,350 Q140,320 140,300" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M140,325 Q130,312 122,308 Q130,320 140,322" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M140,315 Q150,302 158,298 Q150,310 140,313" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tiny bud on top -->
  <circle cx="140" cy="298" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="138" y1="295" x2="137" y2="290" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="142" y1="295" x2="143" y2="290" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Sprout 3 (taller) -->
  <path d="M200,350 Q200,308 200,280" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M200,325 Q188,310 178,306 Q188,318 200,320" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M200,308 Q212,294 222,290 Q212,302 200,305" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M200,290 Q190,278 182,274 Q190,284 200,287" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Flower bud on top, empty for coloring -->
  <circle cx="200" cy="275" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="200" cy="275" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Sprout 4 (medium) -->
  <path d="M260,350 Q260,322 260,305" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M260,328 Q250,316 242,312 Q250,323 260,325" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M260,316 Q270,304 278,300 Q270,312 260,314" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="260" cy="303" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Sprout 5 (small) -->
  <path d="M320,350 Q320,330 320,320" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M320,334 Q310,322 303,320 Q311,328 320,330" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Growth sparkles near plants -->
  <line x1="145" y1="292" x2="145" y2="288" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="141" y1="293" x2="137" y2="291" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="149" y1="293" x2="153" y2="291" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

  <line x1="207" y1="268" x2="207" y2="264" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="203" y1="270" x2="199" y2="267" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="211" y1="270" x2="215" y2="267" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">씨앗이 자라면 어떤 꽃이 될까요?</tspan>
    <tspan x="200" dy="18">그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
