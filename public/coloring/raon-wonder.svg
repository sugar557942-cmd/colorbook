<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">신기한 것을 발견한 라온</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Ground -->
  <line x1="34" y1="400" x2="366" y2="400" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ground texture -->
  <path d="M34,400 Q50,395 70,400 Q90,396 110,400 Q140,396 160,400" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M200,400 Q230,395 260,400 Q290,396 320,400 Q345,396 366,400" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Grass tufts under sparrow -->
  <path d="M80,400 Q82,390 84,400" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M88,400 Q90,392 92,400" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M94,400 Q96,395 98,400" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ===== THE LARGE MYSTERY SHAPE — empty star/circle for child to fill ===== -->
  <!-- Large decorative circle / star outline in center-right -->
  <!-- Outer glow rings (dashed) -->
  <circle cx="268" cy="240" r="105" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,8"/>
  <circle cx="268" cy="240" r="90" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,6"/>
  <!-- Main mystery shape: large star outline -->
  <path d="M268,140
    L280,200 L340,200 L292,238 L312,298 L268,262 L224,298 L244,238 L196,200 L256,200 Z"
    fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Inner star (smaller, concentrically) -->
  <path d="M268,172
    L276,214 L318,214 L284,236 L298,278 L268,256 L238,278 L252,236 L218,214 L260,214 Z"
    fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,3"/>

  <!-- WONDER RAYS radiating from mystery object (like light beams) -->
  <!-- Right side rays -->
  <line x1="358" y1="240" x2="372" y2="240" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="350" y1="200" x2="362" y2="194" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="350" y1="280" x2="362" y2="286" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="330" y1="170" x2="340" y2="160" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="330" y1="310" x2="340" y2="320" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top rays -->
  <line x1="268" y1="130" x2="268" y2="116" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="310" y1="148" x2="320" y2="138" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="230" y1="152" x2="220" y2="142" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Bottom rays -->
  <line x1="268" y1="350" x2="268" y2="364" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="308" y1="336" x2="318" y2="346" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="228" y1="338" x2="218" y2="348" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left rays (toward sparrow) -->
  <line x1="180" y1="240" x2="168" y2="240" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="188" y1="208" x2="176" y2="200" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="188" y1="272" x2="176" y2="280" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- STAR SPARKLES floating around the object -->
  <!-- Sparkle 1 -->
  <line x1="180" y1="155" x2="180" y2="163" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="176" y1="157" x2="184" y2="161" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="184" y1="157" x2="176" y2="161" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkle 2 -->
  <line x1="355" y1="158" x2="355" y2="168" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="350" y1="161" x2="360" y2="165" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="360" y1="161" x2="350" y2="165" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkle 3 small -->
  <line x1="200" y1="320" x2="200" y2="326" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="197" y1="321" x2="203" y2="325" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="203" y1="321" x2="197" y2="325" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Sparkle 4 -->
  <line x1="350" y1="318" x2="350" y2="326" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="346" y1="320" x2="354" y2="324" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="354" y1="320" x2="346" y2="324" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Small dot sparkles -->
  <circle cx="164" cy="200" r="2.5" fill="#2a2a2a"/>
  <circle cx="164" cy="280" r="2" fill="#2a2a2a"/>
  <circle cx="375" cy="215" r="2" fill="#2a2a2a"/>
  <circle cx="375" cy="265" r="2" fill="#2a2a2a"/>

  <!-- ===== SPARROW RAON standing left, WIDE EYES, beak open ===== -->
  <!-- Body -->
  <ellipse cx="90" cy="365" rx="26" ry="21" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail fan -->
  <path d="M65,368 Q53,380 46,375 Q53,366 64,364 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="53" y1="369" x2="46" y2="375" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="375" x2="48" y2="381" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="380" x2="52" y2="386" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="108" cy="342" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Beak WIDE OPEN in amazement -->
  <!-- Upper beak -->
  <path d="M122,338 L135,333 L128,342" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Lower beak open gap -->
  <path d="M122,342 Q126,348 128,346" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Tongue hint -->
  <path d="M123,342 Q125,344 128,343" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Eyes HUGE with amazement (double ring) -->
  <circle cx="115" cy="337" r="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="115" cy="337" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="116" cy="337" r="3" fill="#2a2a2a"/>
  <circle cx="118" cy="335" r="1.3" fill="white"/>
  <!-- EYEBROWS raised dramatically -->
  <path d="M108,328 Q115,323 120,327" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Surprise spikes on head (hair up) -->
  <line x1="105" y1="326" x2="103" y2="318" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="112" y1="325" x2="112" y2="317" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="119" y1="327" x2="121" y2="319" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Cheek blush dots of amazement -->
  <circle cx="105" cy="346" r="1.5" fill="#2a2a2a"/>
  <circle cx="109" cy="349" r="1.5" fill="#2a2a2a"/>
  <circle cx="104" cy="350" r="1" fill="#2a2a2a"/>
  <!-- Wing folded -->
  <path d="M86,357 Q75,364 77,375 Q86,377 100,374 Q99,364 91,357 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="78" y1="364" x2="96" y2="367" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="77" y1="370" x2="96" y2="373" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Feet standing -->
  <line x1="92" y1="386" x2="90" y2="396" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="87" y1="396" x2="90" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="93" y1="396" x2="90" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="90" y1="396" x2="90" y2="399" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="103" y1="386" x2="103" y2="396" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="396" x2="103" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="106" y1="396" x2="103" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="103" y1="396" x2="103" y2="399" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Motion lines from sparrow (looking toward object) -->
  <line x1="138" y1="342" x2="155" y2="340" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="352" x2="157" y2="352" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="140" y1="362" x2="156" y2="364" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">라온이 발견한 것은 무엇인가요?</tspan>
    <tspan x="200" dy="18">그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
