<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
    .label { font-family: sans-serif; font-size: 11px; fill: #444; text-anchor: middle; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="200" y="32" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#888" font-weight="bold">내 마음의 색깔은?</text>

  <!-- 감정 바퀴 (8 섹션, 반지름 160) -->
  <!-- 섹션 1: 기쁨 (위) -->
  <path d="M200 255 L200 95 A160 160 0 0 1 313 128 Z" class="colorable" id="emotion-joy"/>
  <!-- 섹션 2: 설렘 (오른쪽 위) -->
  <path d="M200 255 L313 128 A160 160 0 0 1 360 255 Z" class="colorable" id="emotion-excited"/>
  <!-- 섹션 3: 평온 (오른쪽) -->
  <path d="M200 255 L360 255 A160 160 0 0 1 313 382 Z" class="colorable" id="emotion-calm"/>
  <!-- 섹션 4: 슬픔 (오른쪽 아래) -->
  <path d="M200 255 L313 382 A160 160 0 0 1 200 415 Z" class="colorable" id="emotion-sad"/>
  <!-- 섹션 5: 무서움 (아래) -->
  <path d="M200 255 L200 415 A160 160 0 0 1 87 382 Z" class="colorable" id="emotion-fear"/>
  <!-- 섹션 6: 화남 (왼쪽 아래) -->
  <path d="M200 255 L87 382 A160 160 0 0 1 40 255 Z" class="colorable" id="emotion-angry"/>
  <!-- 섹션 7: 놀람 (왼쪽) -->
  <path d="M200 255 L40 255 A160 160 0 0 1 87 128 Z" class="colorable" id="emotion-surprise"/>
  <!-- 섹션 8: 사랑 (왼쪽 위) -->
  <path d="M200 255 L87 128 A160 160 0 0 1 200 95 Z" class="colorable" id="emotion-love"/>

  <!-- 중간 링 (안쪽 원 테두리) -->
  <circle cx="200" cy="255" r="90" class="colorable" id="inner-ring"/>

  <!-- 안쪽 섹션들 (작은 원) -->
  <path d="M200 255 L200 165 A90 90 0 0 1 278 210 Z" class="colorable" id="inner-joy"/>
  <path d="M200 255 L278 210 A90 90 0 0 1 290 255 Z" class="colorable" id="inner-excited"/>
  <path d="M200 255 L290 255 A90 90 0 0 1 278 300 Z" class="colorable" id="inner-calm"/>
  <path d="M200 255 L278 300 A90 90 0 0 1 200 345 Z" class="colorable" id="inner-sad"/>
  <path d="M200 255 L200 345 A90 90 0 0 1 122 300 Z" class="colorable" id="inner-fear"/>
  <path d="M200 255 L122 300 A90 90 0 0 1 110 255 Z" class="colorable" id="inner-angry"/>
  <path d="M200 255 L110 255 A90 90 0 0 1 122 210 Z" class="colorable" id="inner-surprise"/>
  <path d="M200 255 L122 210 A90 90 0 0 1 200 165 Z" class="colorable" id="inner-love"/>

  <!-- 중심 원 -->
  <circle cx="200" cy="255" r="38" class="colorable" id="center-circle"/>
  <!-- 중심 얼굴 -->
  <circle cx="193" cy="250" r="4.5" class="fixed"/>
  <circle cx="207" cy="250" r="4.5" class="fixed"/>
  <path d="M191 260 Q200 268 209 260" class="outline" stroke-width="2"/>

  <!-- 구분선들 (바퀴살) -->
  <line x1="200" y1="95" x2="200" y2="415" class="outline" stroke-width="1.5"/>
  <line x1="87" y1="128" x2="313" y2="382" class="outline" stroke-width="1.5"/>
  <line x1="40" y1="255" x2="360" y2="255" class="outline" stroke-width="1.5"/>
  <line x1="87" y1="382" x2="313" y2="128" class="outline" stroke-width="1.5"/>

  <!-- 테두리 원 -->
  <circle cx="200" cy="255" r="160" class="outline" stroke-width="2.5"/>

  <!-- 감정 레이블 -->
  <text x="200" y="118" class="label">기쁨 😊</text>
  <text x="322" y="158" class="label">설렘 🤩</text>
  <text x="348" y="260" class="label">평온 😌</text>
  <text x="322" y="370" class="label">슬픔 😢</text>
  <text x="200" y="408" class="label">무서움 😨</text>
  <text x="78" y="370" class="label">화남 😠</text>
  <text x="52" y="260" class="label">놀람 😲</text>
  <text x="78" y="158" class="label">사랑 🥰</text>

  <text x="200" y="468" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9E9E9E">오늘 느끼는 감정을 색칠해 보세요</text>
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#C4A77D" font-weight="bold">감정 바퀴 🎨</text>
</svg>
