<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">실수해도 괜찮아!</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- FLOOR -->
  <line x1="28" y1="420" x2="368" y2="420" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- SCATTERED TOOLS ON FLOOR -->
  <!-- Fallen beaker (tipped over) -->
  <g transform="translate(70,405) rotate(-75)">
    <path d="M-10,0 L-12,-20 L-8,-35 L8,-35 L12,-20 L10,0 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="-8" y="-44" width="16" height="12" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Spilled liquid puddle -->
  </g>
  <!-- Liquid spill near beaker -->
  <path d="M40 418 Q55 422 75 420 Q90 418 85 415 Q70 412 55 414 Q42 416 40 418Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Fallen wrench -->
  <g transform="translate(330,415) rotate(40)">
    <rect x="-4" y="-25" width="8" height="42" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <path d="M-8,-25 Q-4,-35 4,-33 Q6,-28 4,-25Z" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-6" y="15" width="12" height="5" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  </g>

  <!-- Scattered nuts/bolts -->
  <polygon points="52,395 56,392 60,395 60,400 56,403 52,400" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="56" cy="397" r="2" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <polygon points="310,395 314,392 318,395 318,400 314,403 310,400" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="282,408 286,405 290,408 290,413 286,416 282,413" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Fallen screwdriver -->
  <g transform="translate(352,400) rotate(-20)">
    <rect x="-3" y="-35" width="6" height="35" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-6" y="-50" width="12" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <polygon points="-2,0 2,0 1,10 -1,10" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  </g>

  <!-- THE WOBBLY BROKEN EXPERIMENT (center/left of scene) -->
  <!-- Table/platform it was on, now tilted -->
  <g transform="translate(130,370) rotate(-8)">
    <rect x="-65" y="-15" width="130" height="15" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
    <rect x="-55" y="0" width="10" height="40" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="45" y="0" width="10" height="40" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  </g>
  <!-- Wonky invention on table (crooked machine) -->
  <g transform="translate(130,340) rotate(5)">
    <!-- Base box (cracked) -->
    <rect x="-38" y="-28" width="76" height="32" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
    <!-- Crack in box -->
    <path d="M-10,-28 L-6,-20 L-14,-12 L-8,-4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Chimney (bent) -->
    <rect x="15" y="-52" width="12" height="28" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(12,21,-38)"/>
    <!-- Smoke puff (from bent chimney) -->
    <path d="M26,-60 Q24,-72 30,-78 Q26,-84 32,-88 Q29,-95 36,-96" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Dials/buttons fallen off -->
    <circle cx="-20" cy="-14" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <circle cx="2" cy="-14" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <!-- Spring poking out -->
    <path d="M-30,-28 Q-35,-35 -30,-40 Q-25,-45 -30,-50 Q-35,-55 -30,-60" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
    <!-- Wheel fallen off side -->
    <circle cx="-55" cy="-10" r="14" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <circle cx="-55" cy="-10" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="-55" y1="-17" x2="-55" y2="-3" stroke="#2a2a2a" stroke-width="1.5"/>
    <line x1="-62" y1="-10" x2="-48" y2="-10" stroke="#2a2a2a" stroke-width="1.5"/>
  </g>

  <!-- STARS / SPARKS around the mess -->
  <!-- Star 1 -->
  <path d="M55,310 L58,302 L61,310 L69,313 L61,316 L58,324 L55,316 L47,313 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Star 2 -->
  <path d="M340,295 L343,289 L346,295 L352,297 L346,299 L343,305 L340,299 L334,297 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Star 3 -->
  <path d="M88,255 L90,250 L92,255 L97,257 L92,259 L90,264 L88,259 L83,257 Z" fill="none" stroke="#2a2a2a" stroke-width="1.3"/>
  <!-- Star 4 (tiny) -->
  <path d="M348,340 L350,336 L352,340 L356,341 L352,343 L350,347 L348,343 L344,341 Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Burst lines -->
  <line x1="295" y1="308" x2="308" y2="298" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="295" y1="320" x2="310" y2="322" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="302" y1="332" x2="315" y2="338" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="68" y1="340" x2="55" y2="330" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="65" y1="352" x2="52" y2="355" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === NARI FOX (center right, sheepish smile, thumbs up) === -->
  <!-- Tail -->
  <path d="M288 365 Q338 340 340 308 Q342 280 320 276 Q305 272 304 285 Q318 290 315 308 Q312 328 290 348 Q276 360 282 372 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Body (apron) -->
  <ellipse cx="258" cy="365" rx="38" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Apron -->
  <rect x="240" y="325" width="36" height="42" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Legs -->
  <ellipse cx="244" cy="408" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="272" cy="408" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="242" cy="417" rx="15" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="274" cy="417" rx="15" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Left arm (THUMBS UP!) -->
  <path d="M232 348 Q212 338 208 322" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Thumb up hand shape -->
  <g transform="translate(205,316)">
    <rect x="-8" y="-12" width="16" height="18" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Thumb -->
    <rect x="-18" y="-8" width="12" height="8" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <!-- Fist fingers -->
    <line x1="-6" y1="-12" x2="-6" y2="-18" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="-12" x2="0" y2="-20" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="-12" x2="6" y2="-18" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Right arm (scratching head) -->
  <path d="M284 345 Q298 330 296 316" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="296" cy="313" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- NECK -->
  <rect x="251" y="305" width="14" height="15" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- HEAD -->
  <ellipse cx="258" cy="282" rx="42" ry="38" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Ears -->
  <path d="M224 264 L212 224 L248 252Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M228 262 L219 229 L245 253Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M292 264 L304 224 L268 252Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M288 262 L297 229 L271 253Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Goggles (askew/crooked on forehead) -->
  <rect x="234" y="256" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-5,244,262)"/>
  <rect x="267" y="256" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-5,277,262)"/>
  <line x1="254" y1="262" x2="267" y2="260" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (SHEEPISH: one eye squinted, one normal, happy) -->
  <!-- Left eye (squinted/winking) -->
  <path d="M240 282 Q248 275 256 282" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right eye (normal, happy) -->
  <ellipse cx="270" cy="280" rx="9" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="270" cy="281" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="270" cy="280" r="2" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="258" cy="295" rx="22" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="258" cy="289" rx="5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sheepish/embarrassed smile (lopsided) -->
  <path d="M248 300 Q258 308 268 298" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Blush circles (embarrassed) -->
  <circle cx="238" cy="294" r="6" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="278" cy="293" r="6" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Sweat drop above head -->
  <path d="M215,258 Q212,250 218,245 Q222,243 224,248 Q226,254 220,260 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- SPEECH BUBBLE "괜찮아!" -->
  <path d="M78,180 Q78,148 112,148 L220,148 Q254,148 254,180 Q254,210 220,210 L140,210 L128,228 L125,210 L112,210 Q78,210 78,180Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="166" y="183" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="22" font-weight="bold" fill="#2a2a2a">괜찮아!</text>
  <!-- Small stars inside bubble -->
  <path d="M95,168 L97,163 L99,168 L104,170 L99,172 L97,177 L95,172 L90,170 Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M233,192 L235,188 L237,192 L241,194 L237,196 L235,200 L233,196 L229,194 Z" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Activity prompt -->
  <text x="200" y="448" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">나도 실수한 적 있나요?</tspan>
    <tspan x="200" dy="18">그래도 괜찮았던 경험을 나눠 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
