  <circle cx="216" cy="260" r="24" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="200" y1="260" x2="192" y2="260" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="152" y1="256" x2="142" y2="252" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="240" y1="256" x2="250" y2="252" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Large open book held by wings -->
  <path d="M112,408 Q196,394 280,408 L280,448 Q196,434 112,448Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
