  <circle cx="244" cy="362" r="3" fill="#2a2a2a"/>
  <circle cx="245.5" cy="360.5" r="1.2" fill="white"/>
  <!-- Hedgehog eyebrow -->
  <path d="M239,356 Q243,353 247,355" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
