  <path d="M54,416 L52,404 L58,414" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M336,412 L334,400 L340,410" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M352,414 L350,402 L356,412" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

