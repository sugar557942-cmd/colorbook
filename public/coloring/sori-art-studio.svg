  <path d="M168,352 Q165,368 168,400 Q180,418 200,420 Q220,418 232,400 Q235,368 232,352" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <rect x="188" y="384" width="24" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="178" cy="368" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="222" cy="374" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="210" cy="358" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

