  <path d="M217,294 L218,297 L221,297 L219,299 L220,302 L217,300 L214,302 L215,299 L213,297 L216,297 Z" fill="#2a2a2a"/>

  <!-- Muzzle -->
  <ellipse cx="200" cy="316" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200,309 Q196,305 193,309 Q190,313 196,316 Q200,319 200,319 Q200,319 204,316 Q210,313 207,309 Q204,305 200,309 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M196,319 Q200,324 204,319" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="215" y1="313" x2="255" y2="306" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="317" x2="256" y2="317" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="321" x2="254" y2="328" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="313" x2="145" y2="306" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="317" x2="144" y2="317" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="321" x2="146" y2="328" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="484" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">기쁠 때는 어떤 색, 슬플 때는</tspan>
    <tspan x="200" dy="18">어떤 색인가요?</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
