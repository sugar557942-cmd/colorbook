  <line x1="174" y1="252" x2="148" y2="245" class="outline" stroke-width="1.5"/>
  <line x1="174" y1="258" x2="145" y2="258" class="outline" stroke-width="1.5"/>
  <line x1="226" y1="252" x2="252" y2="245" class="outline" stroke-width="1.5"/>
  <line x1="226" y1="258" x2="255" y2="258" class="outline" stroke-width="1.5"/>

