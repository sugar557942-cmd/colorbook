  <path d="M166,328 Q160,345 162,378 Q173,400 198,405 Q222,400 235,375 Q240,345 238,328" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" transform="rotate(-10 200 365)"/>

  <!-- Left arm raised up triumphantly -->
  <path d="M162,330 Q138,296 130,268" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="127" cy="263" rx="12" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Star in paw -->
  <path d="M127,258 L128.5,263 L132,263 L129.5,266 L130.5,270 L127,267 L123.5,270 L124.5,266 L122,263 L125.5,263 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Right arm open out to side -->
