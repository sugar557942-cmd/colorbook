<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">하늘 나는 연 나리</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- SKY BACKGROUND AREA (just white) -->
  <!-- Ground line -->
  <path d="M28 420 Q100 410 200 415 Q300 420 368 412" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Ground fill outline -->
  <path d="M28 420 Q100 410 200 415 Q300 420 368 412 L368 460 L28 460 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Grass tufts -->
  <path d="M45 418 L45 408 M50 420 L52 410 M55 418 L55 408" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M120 414 L120 404 M125 416 L127 406 M130 414 L130 404" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M280 416 L280 406 M285 418 L287 408 M290 416 L290 406" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M340 413 L340 403 M345 415 L347 405 M350 413 L350 403" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- CLOUDS -->
  <!-- Cloud 1 (upper right) -->
  <path d="M280,108 Q285,95 298,96 Q302,85 315,88 Q325,82 335,90 Q348,88 350,100 Q360,103 355,114 Q350,122 338,120 Q335,128 322,126 Q315,132 305,127 Q295,132 288,125 Q278,122 280,108Z" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Cloud 2 (upper left) -->
  <path d="M42,145 Q46,134 56,135 Q60,126 70,128 Q77,122 86,128 Q95,126 97,136 Q104,138 102,148 Q98,155 88,153 Q85,160 76,157 Q68,162 62,157 Q54,160 50,153 Q42,150 42,145Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cloud 3 (middle) -->
  <path d="M145,188 Q149,180 157,181 Q160,174 168,176 Q173,171 180,175 Q187,172 190,180 Q196,182 194,190 Q191,196 184,194 Q182,200 175,197 Q169,201 164,197 Q158,200 154,195 Q145,192 145,188Z" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- KITE (diamond shape, high in sky) -->
  <g transform="translate(255, 118)">
    <!-- Kite diamond -->
    <path d="M0,-65 L42,0 L0,65 L-42,0 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
    <!-- Kite cross spars -->
    <line x1="0" y1="-65" x2="0" y2="65" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="-42" y1="0" x2="42" y2="0" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,3"/>
    <!-- Kite decorative sections (4 panels for coloring) -->
    <!-- Top panel outline only -->
    <!-- Bottom panel outline only -->
    <!-- Kite face decoration (blank for coloring) -->
    <circle cx="0" cy="-20" r="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <circle cx="0" cy="20" r="8" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Kite bow tail -->
    <path d="M0,65 Q5,80 -5,95 Q5,110 -5,125 Q5,140 -5,155 Q5,170 -5,185" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
    <!-- Bow decorations on tail -->
    <path d="M-5,95 Q-12,90 -15,95 Q-12,100 -5,95Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-5,95 Q2,90 5,95 Q2,100 -5,95Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-5,125 Q-12,120 -15,125 Q-12,130 -5,125Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-5,125 Q2,120 5,125 Q2,130 -5,125Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-5,155 Q-12,150 -15,155 Q-12,160 -5,155Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <path d="M-5,155 Q2,150 5,155 Q2,160 -5,155Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Kite border patterns (blank for coloring) -->
    <path d="M0,-65 L42,0" fill="none" stroke="#2a2a2a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- KITE STRING (wavy, going down to fox) -->
  <path d="M213,118 Q200,140 210,165 Q220,190 205,215 Q190,240 200,265 Q210,290 195,315 Q180,340 185,370 Q188,388 182,405" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- WIND LINES -->
  <path d="M32,170 Q55,163 75,172" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M38,190 Q65,182 82,192" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M320,200 Q345,193 365,200" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M315,220 Q340,213 360,222" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M340,165 Q358,158 375,165" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Curved wind around kite -->
  <path d="M192,88 Q210,75 230,80" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M300,72 Q318,65 338,70" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === NARI FOX on ground === -->
  <!-- Tail -->
  <path d="M148 400 Q108 385 105 360 Q102 338 118 335 Q128 332 130 344 Q120 346 122 360 Q124 375 142 388 Q154 396 150 405 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="188" cy="420" rx="38" ry="45" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Legs -->
  <ellipse cx="172" cy="460" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="204" cy="460" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="170" cy="469" rx="15" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="206" cy="469" rx="15" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Left arm (holding string, reaching up slightly) -->
  <path d="M165 400 Q155 390 162 378 Q166 372 172 372" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="175" cy="371" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- String spool in right hand -->
  <path d="M210 405 Q228 398 238 392" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="241" cy="390" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Spool shape -->
  <ellipse cx="248" cy="388" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="240" y1="382" x2="256" y2="394" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="240" y1="394" x2="256" y2="382" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- NECK -->
  <rect x="181" y="372" width="14" height="14" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- HEAD (looking up) -->
  <ellipse cx="188" cy="350" rx="42" ry="37" fill="white" stroke="#2a2a2a" stroke-width="3" transform="rotate(10,188,350)"/>
  <!-- Ears -->
  <path d="M154 332 L143 292 L177 320Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M158 330 L149 296 L174 321Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M220 328 L230 290 L200 318Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M216 327 L224 294 L202 319Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Goggles on forehead -->
  <rect x="164" y="325" width="19" height="12" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="196" y="325" width="19" height="12" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="183" y1="331" x2="196" y2="331" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Eyes (looking upward, wide with delight) -->
  <ellipse cx="176" cy="347" rx="9" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="176" cy="345" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="176" cy="344" r="2" fill="#2a2a2a"/>
  <ellipse cx="200" cy="345" rx="9" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="200" cy="343" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="200" cy="342" r="2" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="188" cy="360" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="188" cy="354" rx="5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Happy smile -->
  <path d="M179 365 Q188 373 197 365" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="168" cy="358" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="208" cy="357" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Activity prompt -->
  <text x="200" y="487" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">나리의 연에 멋진 무늬와</tspan>
    <tspan x="200" dy="18">꼬리 장식을 그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
