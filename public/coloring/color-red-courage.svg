  <path d="M318 395 Q330 382 338 388 Q342 398 332 408 Q322 414 314 405 Z" class="colorable" id="tail-tuft"/>

  <!-- 앞발 -->
  <ellipse cx="140" cy="418" rx="35" ry="22" class="colorable" id="paw-fl"/>
  <ellipse cx="260" cy="418" rx="35" ry="22" class="colorable" id="paw-fr"/>
  <!-- 발톱 -->
  <line x1="123" y1="432" x2="116" y2="442" class="outline" stroke-width="2"/>
  <line x1="138" y1="436" x2="138" y2="447" class="outline" stroke-width="2"/>
  <line x1="155" y1="432" x2="162" y2="442" class="outline" stroke-width="2"/>
  <line x1="245" y1="432" x2="238" y2="442" class="outline" stroke-width="2"/>
