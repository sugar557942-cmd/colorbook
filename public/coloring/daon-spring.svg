  <path d="M150,365 Q150,340 158,330 Q166,340 166,365 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M150,388 Q140,376 145,367" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

