  <path d="M355 230 L357 224 L359 230 L365 232 L359 234 L357 240 L355 234 L349 232 Z" class="colorable" id="sparkle2"/>

  <text x="200" y="492" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#5BAED6" font-weight="bold">라온의 하늘 🐦</text>
