<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">용기의 다리를 건너는 라온</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- MIST / GAP below bridge -->
  <ellipse cx="200" cy="390" rx="170" ry="45" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="8,5"/>
  <ellipse cx="130" cy="410" rx="90" ry="30" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="6,4"/>
  <ellipse cx="280" cy="415" rx="80" ry="28" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="6,4"/>
  <!-- Mist wisp lines -->
  <path d="M60,390 Q100,380 140,392 Q180,382 220,393" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,5" stroke-linecap="round"/>
  <path d="M180,410 Q220,400 260,412 Q300,402 340,412" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,5" stroke-linecap="round"/>

  <!-- BRIGHT SCENE AHEAD (right side) -->
  <!-- Sunburst on right cliff -->
  <circle cx="350" cy="200" r="22" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="350" y1="172" x2="350" y2="165" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="372" y1="186" x2="377" y2="181" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="378" y1="200" x2="385" y2="200" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="372" y1="214" x2="377" y2="219" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="328" y1="186" x2="323" y2="181" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="322" y1="200" x2="315" y2="200" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="328" y1="214" x2="323" y2="219" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Flowers on right cliff -->
  <circle cx="320" cy="300" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="322" cy="292" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="328" cy="296" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="316" cy="296" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="322" cy="308" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="320" y1="305" x2="318" y2="318" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="340" cy="308" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="342" cy="300" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="348" cy="304" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="334" cy="304" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="340" y1="312" x2="338" y2="322" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LEFT CLIFF -->
  <path d="M25,330 Q40,300 70,280 L70,460 L25,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- RIGHT CLIFF -->
  <path d="M375,330 Q360,295 330,275 L330,460 L375,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BRIDGE ROPES -->
  <!-- Top rope left -->
  <path d="M68,270 Q140,290 200,288 Q260,290 332,272" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom rope left (sag more) -->
  <path d="M68,285 Q140,310 200,308 Q260,310 332,287" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BRIDGE PLANKS -->
  <rect x="78" y="305" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="112" y="308" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="146" y="310" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sparrow plank -->
  <rect x="180" y="309" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="214" y="308" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="248" y="306" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="282" y="302" width="28" height="9" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Vertical rope hangers -->
  <line x1="87" y1="279" x2="87" y2="305" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="97" y1="279" x2="97" y2="305" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="121" y1="282" x2="121" y2="308" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="131" y1="282" x2="131" y2="308" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="155" y1="284" x2="155" y2="310" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="165" y1="284" x2="165" y2="310" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="189" y1="285" x2="189" y2="309" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="199" y1="285" x2="199" y2="309" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="223" y1="284" x2="223" y2="308" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="233" y1="284" x2="233" y2="308" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="257" y1="282" x2="257" y2="306" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="267" y1="282" x2="267" y2="306" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="291" y1="279" x2="291" y2="302" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="301" y1="279" x2="301" y2="302" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== SPARROW RAON mid-bridge, one foot forward ===== -->
  <!-- Body -->
  <ellipse cx="192" cy="294" rx="20" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M173,297 Q163,305 157,301 Q163,294 172,292 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="163" y1="297" x2="157" y2="302" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="165" y1="302" x2="159" y2="307" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="205" cy="279" r="13" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Beak (forward, brave look) -->
  <polygon points="216,276 225,275 218,282" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Eye determined/wide -->
  <circle cx="210" cy="275" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="211" cy="275" r="2.5" fill="#2a2a2a"/>
  <circle cx="212.5" cy="273.5" r="1" fill="white"/>
  <!-- Eyebrow strong -->
  <path d="M206,269 Q210,267 214,269" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Wing -->
  <path d="M189,287 Q180,293 182,303 Q190,304 202,302 Q201,292 193,287 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="183" y1="294" x2="198" y2="296" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="182" y1="299" x2="198" y2="301" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Foot forward (left, stepping ahead) -->
  <line x1="198" y1="310" x2="204" y2="318" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="201" y1="318" x2="204" y2="318" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="207" y1="318" x2="204" y2="318" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="204" y1="318" x2="204" y2="321" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Foot back (right, planted) -->
  <line x1="187" y1="310" x2="185" y2="318" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="182" y1="318" x2="185" y2="318" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="188" y1="318" x2="185" y2="318" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="185" y1="318" x2="185" y2="321" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Explorer hat -->
  <ellipse cx="205" cy="268" rx="16" ry="4.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M193,268 Q196,258 205,256 Q214,258 217,268" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Small motion lines from feet -->
  <line x1="212" y1="316" x2="218" y2="313" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="213" y1="320" x2="220" y2="319" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">다리 너머에 무엇이 있을까요?</tspan>
    <tspan x="200" dy="18">그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
