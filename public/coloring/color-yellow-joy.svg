  <circle cx="200" cy="234" r="5" class="fixed"/>
  <circle cx="200" cy="234" r="5" class="fixed"/>
  <circle cx="193" cy="234" r="5" class="fixed"/>
  <circle cx="207" cy="234" r="5" class="fixed"/>
  <path d="M190 244 Q200 254 210 244" class="outline" stroke-width="2.5"/>

