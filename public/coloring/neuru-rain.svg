  <polygon points="195,287 213,296 213,314 195,323 177,314 177,296" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="218,300 234,308 234,325 218,333 202,325 202,308" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="172,300 188,308 188,325 172,333 156,325 156,308" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="195,316 212,324 212,340 195,348 178,340 178,324" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower on shell -->
