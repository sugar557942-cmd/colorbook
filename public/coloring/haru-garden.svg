<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 땅 -->
  <path d="M0 430 Q100 415 200 420 Q300 415 400 430 L400 500 L0 500 Z" class="colorable" id="ground"/>

  <!-- 꽃들 (왼쪽) -->
  <circle cx="55" cy="390" r="14" class="colorable" id="flower1-center"/>
  <circle cx="40" cy="378" r="10" class="colorable" id="flower1-p1"/>
  <circle cx="55" cy="372" r="10" class="colorable" id="flower1-p2"/>
  <circle cx="70" cy="378" r="10" class="colorable" id="flower1-p3"/>
  <circle cx="70" cy="394" r="10" class="colorable" id="flower1-p4"/>
  <circle cx="55" cy="400" r="10" class="colorable" id="flower1-p5"/>
  <circle cx="40" cy="394" r="10" class="colorable" id="flower1-p6"/>
  <line x1="55" y1="404" x2="55" y2="430" class="outline" stroke-width="2.5"/>

  <!-- 꽃들 (오른쪽) -->
  <circle cx="340" cy="385" r="12" class="colorable" id="flower2-center"/>
  <circle cx="327" cy="374" r="9" class="colorable" id="flower2-p1"/>
  <circle cx="340" cy="368" r="9" class="colorable" id="flower2-p2"/>
  <circle cx="353" cy="374" r="9" class="colorable" id="flower2-p3"/>
  <circle cx="353" cy="388" r="9" class="colorable" id="flower2-p4"/>
  <circle cx="340" cy="394" r="9" class="colorable" id="flower2-p5"/>
  <circle cx="327" cy="388" r="9" class="colorable" id="flower2-p6"/>
  <line x1="340" y1="397" x2="340" y2="425" class="outline" stroke-width="2.5"/>

  <!-- 작은 꽃 -->
  <circle cx="150" cy="428" r="8" class="colorable" id="small-flower1"/>
  <circle cx="255" cy="425" r="8" class="colorable" id="small-flower2"/>
  <circle cx="310" cy="418" r="7" class="colorable" id="small-flower3"/>

  <!-- 물뿌리개 -->
  <path d="M68 310 Q65 295 80 288 L120 285 Q132 285 132 298 L130 315 Z" class="colorable" id="watering-can"/>
  <ellipse cx="99" cy="316" rx="32" ry="12" class="colorable" id="can-base"/>
  <path d="M132 292 Q155 285 165 300" class="outline" stroke-width="3"/>
  <!-- 물방울들 -->
  <ellipse cx="158" cy="318" rx="4" ry="7" class="colorable" id="drop-a"/>
  <ellipse cx="168" cy="325" rx="4" ry="7" class="colorable" id="drop-b"/>
  <ellipse cx="175" cy="315" rx="3" ry="6" class="colorable" id="drop-c"/>
  <ellipse cx="163" cy="332" rx="3" ry="5" class="colorable" id="drop-d"/>

  <!-- 하루 몸통 (토끼) -->
  <ellipse cx="200" cy="350" rx="70" ry="75" class="colorable" id="body"/>
  <!-- 배 -->
  <ellipse cx="200" cy="355" rx="42" ry="52" class="colorable" id="belly"/>

  <!-- 팔 왼쪽 (물뿌리개 들기) -->
  <ellipse cx="122" cy="315" rx="25" ry="55" transform="rotate(-35 122 315)" class="colorable" id="arm-l"/>
  <!-- 팔 오른쪽 -->
  <ellipse cx="278" cy="318" rx="25" ry="55" transform="rotate(30 278 318)" class="colorable" id="arm-r"/>

  <!-- 다리 -->
  <ellipse cx="170" cy="428" rx="28" ry="18" class="colorable" id="leg-l"/>
  <ellipse cx="230" cy="428" rx="28" ry="18" class="colorable" id="leg-r"/>

  <!-- 머리 -->
  <circle cx="200" cy="215" r="82" class="colorable" id="head"/>

  <!-- 토끼 귀 (길쭉한 귀) -->
  <ellipse cx="162" cy="130" rx="24" ry="55" class="colorable" id="ear-l-outer"/>
  <ellipse cx="162" cy="132" rx="13" ry="42" class="colorable" id="ear-l-inner"/>
  <ellipse cx="238" cy="130" rx="24" ry="55" class="colorable" id="ear-r-outer"/>
  <ellipse cx="238" cy="132" rx="13" ry="42" class="colorable" id="ear-r-inner"/>

  <!-- 눈 -->
  <circle cx="180" cy="215" r="13" class="colorable" id="eye-l"/>
  <circle cx="180" cy="215" r="6" class="fixed"/>
  <circle cx="177" cy="212" r="2.5" fill="white"/>
  <circle cx="220" cy="215" r="13" class="colorable" id="eye-r"/>
  <circle cx="220" cy="215" r="6" class="fixed"/>
  <circle cx="217" cy="212" r="2.5" fill="white"/>

  <!-- 주둥이/코 -->
  <ellipse cx="200" cy="233" rx="22" ry="16" class="colorable" id="snout"/>
  <ellipse cx="200" cy="228" rx="6" ry="4.5" class="colorable" id="nose"/>
  <!-- 입 -->
  <path d="M191 238 Q200 246 209 238" class="outline"/>

  <!-- 수염 -->
  <line x1="178" y1="232" x2="155" y2="227" class="outline" stroke-width="1.5"/>
  <line x1="178" y1="237" x2="153" y2="237" class="outline" stroke-width="1.5"/>
  <line x1="222" y1="232" x2="245" y2="227" class="outline" stroke-width="1.5"/>
  <line x1="222" y1="237" x2="247" y2="237" class="outline" stroke-width="1.5"/>

  <!-- 볼 -->
  <ellipse cx="163" cy="226" rx="13" ry="8" class="colorable" id="blush-l"/>
  <ellipse cx="237" cy="226" rx="13" ry="8" class="colorable" id="blush-r"/>

  <!-- 앞치마 -->
  <path d="M162 298 Q200 310 238 298 L232 380 Q200 388 168 380 Z" class="colorable" id="apron"/>
  <!-- 주머니 -->
  <rect x="183" y="338" width="34" height="28" rx="6" class="colorable" id="pocket"/>

  <!-- 새싹 장식 -->
  <path d="M280 400 Q285 380 290 370 Q298 360 305 370 Q300 385 295 400 Z" class="colorable" id="sprout1"/>
  <path d="M288 375 Q278 368 272 372 Q278 382 288 380 Z" class="colorable" id="sprout-leaf"/>

  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#7EC8A0" font-weight="bold">하루의 정원 🐰</text>
</svg>
