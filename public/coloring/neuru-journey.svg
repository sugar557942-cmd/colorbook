  <path d="M185,195 Q195,188 205,195" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Flower left -->
  <line x1="60" y1="415" x2="60" y2="432" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="60" cy="408" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="60" cy="399" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="68" cy="404" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(60,68,404)"/>
  <ellipse cx="68" cy="412" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(120,68,412)"/>
  <ellipse cx="60" cy="417" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(180,60,417)"/>
