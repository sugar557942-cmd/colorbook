  <ellipse cx="110" cy="382" rx="5" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="110" cy="408" rx="5" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="97" cy="395" rx="9" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="123" cy="395" rx="9" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="99" cy="384" rx="7" ry="4" transform="rotate(-45,99,384)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="121" cy="384" rx="7" ry="4" transform="rotate(45,121,384)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="99" cy="406" rx="7" ry="4" transform="rotate(45,99,406)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="121" cy="406" rx="7" ry="4" transform="rotate(-45,121,406)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="110" y1="402" x2="110" y2="420" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

