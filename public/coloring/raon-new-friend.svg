  <ellipse cx="258" cy="392" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="280" cy="392" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Toe lines -->
  <line x1="254" y1="394" x2="253" y2="397" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="258" y1="395" x2="258" y2="398" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="262" y1="394" x2="263" y2="397" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

  <!-- SPEECH BUBBLE from hedgehog (empty) -->
  <ellipse cx="260" cy="310" rx="38" ry="22" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="252,330 247,340 258,330" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">라온의 새 친구는 어떤 모습인가요?</tspan>
    <tspan x="200" dy="18">그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
