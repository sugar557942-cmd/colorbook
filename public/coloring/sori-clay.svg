<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">찰흙 놀이하는 소리</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Table -->
  <rect x="28" y="380" width="344" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Table legs -->
  <rect x="40" y="396" width="14" height="54" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="346" y="396" width="14" height="54" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Clay pot/sculpture on table (center) -->
  <!-- Pot body -->
  <path d="M176,380 Q170,360 172,340 Q174,318 200,316 Q226,318 228,340 Q230,360 224,380 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Pot rim -->
  <ellipse cx="200" cy="316" rx="28" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pot neck detail lines (clay ridges) -->
  <path d="M178,345 Q200,342 222,345" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M176,356 Q200,353 224,356" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M177,367 Q200,364 223,367" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Clay pieces scattered on table -->
  <!-- Clay lump left -->
  <ellipse cx="100" cy="374" rx="24" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M82,370 Q100,362 118,370" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Clay lump right -->
  <ellipse cx="310" cy="374" rx="20" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M294,370 Q310,363 326,370" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small clay bits -->
  <ellipse cx="140" cy="376" rx="10" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="260" cy="377" rx="12" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="72" cy="378" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="330" cy="379" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Clay rolling tool -->
  <rect x="46" y="358" width="48" height="10" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="40" y="355" width="8" height="16" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="94" y="355" width="8" height="16" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Cat body (leaning over table, focused) -->
  <ellipse cx="200" cy="310" rx="46" ry="52" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Apron -->
  <path d="M168,285 Q164,300 168,332 Q180,352 200,354 Q220,352 232,332 Q236,300 232,285" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <rect x="188" y="315" width="24" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Clay on apron smudges -->
  <ellipse cx="178" cy="300" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="222" cy="308" rx="5" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Both arms reaching forward toward clay pot -->
  <!-- Left arm -->
  <path d="M162,295 Q138,310 128,330" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="125" cy="336" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Clay on left paw -->
  <ellipse cx="120" cy="333" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right arm -->
  <path d="M238,295 Q262,310 272,330" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="275" cy="336" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="280" cy="333" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Feet peeking below table level -->
  <ellipse cx="180" cy="362" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="220" cy="364" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail curling behind -->
  <path d="M246,330 Q286,348 284,328 Q282,308 264,300 Q252,294 258,284" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Head (tilted slightly, focused/tongue out) -->
  <circle cx="200" cy="230" r="52" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears -->
  <polygon points="155,198 146,164 178,188" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="158,195 152,176 173,189" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="245,198 254,164 222,188" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="242,195 248,176 227,189" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="200" cy="188" rx="37" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M163,188 Q166,160 200,158 Q234,160 237,188" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="186" cy="160" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (focused, squinting slightly) -->
  <!-- Left eye squint -->
  <path d="M172,228 Q183,218 194,228 Q183,238 172,228 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="183" cy="228" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="184" cy="227" r="1.5" fill="#2a2a2a"/>
  <!-- Right eye squint -->
  <path d="M206,228 Q217,218 228,228 Q217,238 206,228 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="217" cy="228" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="218" cy="227" r="1.5" fill="#2a2a2a"/>
  <!-- Eyebrows (focused) -->
  <path d="M174,218 Q183,214 192,218" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M208,218 Q217,214 226,218" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Muzzle with concentration tongue -->
  <ellipse cx="200" cy="248" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200,241 Q196,237 193,241 Q190,245 196,248 Q200,251 200,251 Q200,251 204,248 Q210,245 207,241 Q204,237 200,241 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Tongue poking out slightly -->
  <path d="M196,252 Q200,258 204,252" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="200" cy="256" rx="5" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Whiskers -->
  <line x1="215" y1="245" x2="255" y2="238" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="249" x2="256" y2="249" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="253" x2="254" y2="260" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="245" x2="145" y2="238" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="249" x2="144" y2="249" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="253" x2="146" y2="260" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">소리가 찰흙으로 만드는 것은</tspan>
    <tspan x="200" dy="18">무엇일까요?</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
