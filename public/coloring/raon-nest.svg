<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">라온의 나뭇가지 둥지</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- MOON top-right -->
  <path d="M340,82 Q358,90 358,108 Q358,126 340,134 Q360,126 366,108 Q368,90 340,82 Z" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>

  <!-- STARS scattered -->
  <!-- Star 1 -->
  <line x1="60" y1="90" x2="60" y2="100" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="55" y1="93" x2="65" y2="97" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="65" y1="93" x2="55" y2="97" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Star 2 -->
  <line x1="88" y1="120" x2="88" y2="128" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="84" y1="122" x2="92" y2="126" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="92" y1="122" x2="84" y2="126" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star 3 small -->
  <line x1="130" y1="85" x2="130" y2="91" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="127" y1="87" x2="133" y2="89" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="133" y1="87" x2="127" y2="89" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Star 4 -->
  <line x1="280" y1="82" x2="280" y2="90" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="276" y1="84" x2="284" y2="88" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="284" y1="84" x2="276" y2="88" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star 5 -->
  <line x1="160" y1="108" x2="160" y2="114" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="157" y1="110" x2="163" y2="112" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="163" y1="110" x2="157" y2="112" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Star 6 -->
  <line x1="240" y1="100" x2="240" y2="107" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="236" y1="102" x2="244" y2="105" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="244" y1="102" x2="236" y2="105" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star dots (small) -->
  <circle cx="200" cy="80" r="2" fill="#2a2a2a"/>
  <circle cx="310" cy="115" r="1.8" fill="#2a2a2a"/>
  <circle cx="50" cy="140" r="1.8" fill="#2a2a2a"/>
  <circle cx="370" cy="85" r="1.5" fill="#2a2a2a"/>

  <!-- MAIN TREE TRUNK + BRANCHES -->
  <!-- Trunk -->
  <path d="M180,460 Q178,380 190,310 Q200,280 200,200" fill="none" stroke="#2a2a2a" stroke-width="14" stroke-linecap="round"/>
  <!-- Make trunk hollow/outline feel by inner lighter path -->
  <path d="M185,460 Q183,385 194,318 Q202,285 202,205" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
  <!-- Bark texture lines -->
  <path d="M182,420 Q185,415 183,408" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M188,400 Q191,394 189,386" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M183,370 Q187,364 184,357" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Main branch LEFT (where nest sits) -->
  <path d="M195,280 Q150,260 80,270 Q50,275 34,285" fill="none" stroke="#2a2a2a" stroke-width="10" stroke-linecap="round"/>
  <path d="M197,283 Q155,264 85,274 Q54,279 36,288" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Branch RIGHT (upper) -->
  <path d="M200,230 Q245,210 300,220 Q330,225 360,215" fill="none" stroke="#2a2a2a" stroke-width="8" stroke-linecap="round"/>
  <path d="M201,233 Q247,214 302,223 Q332,228 362,218" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Sub-branch upper-left -->
  <path d="M155,270 Q135,240 110,220 Q90,205 72,195" fill="none" stroke="#2a2a2a" stroke-width="6" stroke-linecap="round"/>
  <!-- Sub-branch right up -->
  <path d="M290,222 Q305,195 315,170 Q322,150 328,130" fill="none" stroke="#2a2a2a" stroke-width="5" stroke-linecap="round"/>
  <!-- Twig branches -->
  <path d="M110,220 Q95,205 80,190" fill="none" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M100,215 Q88,222 72,218" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M315,170 Q330,158 345,148" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M320,158 Q310,145 305,132" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- LEAVES clusters -->
  <!-- Left branch leaves -->
  <ellipse cx="72" cy="192" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20,72,192)"/>
  <ellipse cx="84" cy="183" rx="13" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(10,84,183)"/>
  <ellipse cx="65" cy="208" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(30,65,208)"/>
  <ellipse cx="52" cy="198" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-10,52,198)"/>
  <!-- Right branch leaves -->
  <ellipse cx="344" cy="146" rx="13" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(15,344,146)"/>
  <ellipse cx="356" cy="137" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-5,356,137)"/>
  <ellipse cx="336" cy="136" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(25,336,136)"/>
  <ellipse cx="328" cy="128" rx="10" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-15,328,128)"/>
  <!-- Upper right leaves cluster -->
  <ellipse cx="348" cy="214" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-10,348,214)"/>
  <ellipse cx="360" cy="206" rx="13" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(5,360,206)"/>
  <ellipse cx="356" cy="222" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(20,356,222)"/>

  <!-- NEST on left branch fork -->
  <!-- Nest outer woven bowl -->
  <path d="M110,278 Q130,260 160,258 Q190,256 205,272 Q200,292 160,296 Q125,294 110,278 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Nest weave texture lines -->
  <path d="M114,282 Q140,270 175,270 Q195,272 202,278" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M112,288 Q138,276 172,276 Q194,278 203,284" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M115,294 Q140,284 168,284 Q190,285 201,290" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cross weave -->
  <path d="M130,296 Q135,274 140,260" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M155,296 Q158,272 162,259" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M178,294 Q180,272 184,260" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <!-- Nest inner items -->
  <!-- Mini pillow -->
  <rect x="125" y="270" width="28" height="18" rx="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="125" y1="279" x2="153" y2="279" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <!-- Mini map scroll -->
  <rect x="158" y="272" width="18" height="14" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M158,272 Q163,268 168,272" fill="white" stroke="#2a2a2a" stroke-width="1.3"/>
  <path d="M158,286 Q163,290 168,286" fill="white" stroke="#2a2a2a" stroke-width="1.3"/>
  <line x1="161" y1="276" x2="174" y2="276" stroke="#2a2a2a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="161" y1="279" x2="174" y2="279" stroke="#2a2a2a" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="161" y1="282" x2="174" y2="282" stroke="#2a2a2a" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Mini binoculars -->
  <circle cx="185" cy="280" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="194" cy="280" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="188" y="278" width="4" height="4" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ===== SPARROW RAON in nest, head peeking out ===== -->
  <!-- Body mostly in nest (just peeking) -->
  <ellipse cx="152" cy="268" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Head peeking above nest rim -->
  <circle cx="152" cy="252" r="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Beak -->
  <polygon points="162,249 171,247 163,255" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Eye sleepy/cozy but alert -->
  <circle cx="157" cy="248" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="158" cy="248" r="2.5" fill="#2a2a2a"/>
  <circle cx="159.5" cy="246.5" r="1" fill="white"/>
  <!-- Eyebrow soft -->
  <path d="M153,242 Q157,240 161,242" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Sleepy/content blush lines under eye -->
  <line x1="150" y1="253" x2="154" y2="255" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="148" y1="257" x2="152" y2="258" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Wing barely visible at nest edge -->
  <path d="M137,268 Q130,273 132,280 Q138,281 148,279 Q148,272 141,268 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">라온의 둥지를 더 예쁘게</tspan>
    <tspan x="200" dy="18">꾸며 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
