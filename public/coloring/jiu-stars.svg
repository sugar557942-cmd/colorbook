<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 달 -->
  <circle cx="320" cy="80" r="52" class="colorable" id="moon"/>
  <circle cx="342" cy="65" r="38" fill="#FFFFFF" stroke="none"/>

  <!-- 별들 (다양한 크기) -->
  <path d="M60 60 L63 50 L66 60 L76 63 L66 66 L63 76 L60 66 L50 63 Z" class="colorable" id="star-big-1"/>
  <path d="M150 40 L152 33 L154 40 L161 42 L154 44 L152 51 L150 44 L143 42 Z" class="colorable" id="star-2"/>
  <path d="M240 55 L242 48 L244 55 L251 57 L244 59 L242 66 L240 59 L233 57 Z" class="colorable" id="star-3"/>
  <path d="M35 130 L37 124 L39 130 L45 132 L39 134 L37 140 L35 134 L29 132 Z" class="colorable" id="star-4"/>
  <path d="M370 130 L372 124 L374 130 L380 132 L374 134 L372 140 L370 134 L364 132 Z" class="colorable" id="star-5"/>
  <path d="M110 100 L112 95 L114 100 L119 102 L114 104 L112 109 L110 104 L105 102 Z" class="colorable" id="star-6"/>
  <path d="M360 55 L362 50 L364 55 L369 57 L364 59 L362 64 L360 59 L355 57 Z" class="colorable" id="star-7"/>
  <path d="M280 38 L282 33 L284 38 L289 40 L284 42 L282 47 L280 42 L275 40 Z" class="colorable" id="star-8"/>
  <!-- 작은 별 점들 -->
  <circle cx="88" cy="48" r="4" class="colorable" id="dot-star-1"/>
  <circle cx="195" cy="32" r="3" class="colorable" id="dot-star-2"/>
  <circle cx="342" cy="38" r="3" class="colorable" id="dot-star-3"/>
  <circle cx="48" cy="88" r="3" class="colorable" id="dot-star-4"/>
  <circle cx="380" cy="85" r="4" class="colorable" id="dot-star-5"/>

  <!-- 구름 (별 사이) -->
  <ellipse cx="155" cy="115" rx="42" ry="22" class="colorable" id="cloud-1"/>
  <ellipse cx="130" cy="108" rx="28" ry="18" class="colorable" id="cloud-1l"/>
  <ellipse cx="178" cy="110" rx="25" ry="17" class="colorable" id="cloud-1r"/>

  <!-- 지우 몸통 -->
  <ellipse cx="200" cy="390" rx="68" ry="75" class="colorable" id="body"/>
  <ellipse cx="200" cy="395" rx="42" ry="55" class="colorable" id="belly"/>
  <!-- 배 깃털 -->
  <path d="M175 368 Q200 378 225 368" class="outline" stroke-width="1.5"/>
  <path d="M170 385 Q200 395 230 385" class="outline" stroke-width="1.5"/>
  <path d="M172 402 Q200 412 228 402" class="outline" stroke-width="1.5"/>

  <!-- 날개 (펼침) -->
  <path d="M132 345 Q88 310 72 350 Q82 390 132 385 Z" class="colorable" id="wing-l"/>
  <path d="M268 345 Q312 310 328 350 Q318 390 268 385 Z" class="colorable" id="wing-r"/>
  <!-- 날개 깃털 -->
  <path d="M132 350 Q105 330 90 348" class="outline" stroke-width="1.5"/>
  <path d="M132 365 Q100 348 85 365" class="outline" stroke-width="1.5"/>
  <path d="M268 350 Q295 330 310 348" class="outline" stroke-width="1.5"/>
  <path d="M268 365 Q300 348 315 365" class="outline" stroke-width="1.5"/>

  <!-- 발 -->
  <ellipse cx="178" cy="462" rx="26" ry="14" class="colorable" id="foot-l"/>
  <ellipse cx="222" cy="462" rx="26" ry="14" class="colorable" id="foot-r"/>
  <line x1="163" y1="467" x2="156" y2="477" class="outline" stroke-width="2"/>
  <line x1="178" y1="470" x2="178" y2="480" class="outline" stroke-width="2"/>
  <line x1="193" y1="467" x2="199" y2="477" class="outline" stroke-width="2"/>
  <line x1="207" y1="467" x2="201" y2="477" class="outline" stroke-width="2"/>
  <line x1="222" y1="470" x2="222" y2="480" class="outline" stroke-width="2"/>
  <line x1="237" y1="467" x2="244" y2="477" class="outline" stroke-width="2"/>

  <!-- 머리 -->
  <circle cx="200" cy="268" r="80" class="colorable" id="head"/>
  <!-- 귀 뿔 -->
  <polygon points="165,205 155,165 185,198" class="colorable" id="tuft-l"/>
  <polygon points="235,205 245,165 215,198" class="colorable" id="tuft-r"/>

  <!-- 안면 디스크 -->
  <ellipse cx="200" cy="275" rx="65" ry="60" class="colorable" id="face-disc"/>

  <!-- 눈 (올려다보는) -->
  <circle cx="178" cy="265" r="22" class="colorable" id="eye-l-outer"/>
  <circle cx="178" cy="265" r="15" class="colorable" id="eye-l-inner"/>
  <circle cx="178" cy="262" r="8" class="fixed"/>
  <circle cx="174" cy="258" r="3" fill="white"/>
  <circle cx="222" cy="265" r="22" class="colorable" id="eye-r-outer"/>
  <circle cx="222" cy="265" r="15" class="colorable" id="eye-r-inner"/>
  <circle cx="222" cy="262" r="8" class="fixed"/>
  <circle cx="218" cy="258" r="3" fill="white"/>

  <!-- 부리 -->
  <polygon points="200,280 192,295 208,295" class="colorable" id="beak"/>

  <!-- 망원경 -->
  <rect x="228" y="295" width="80" height="20" rx="8" transform="rotate(-35 228 295)" class="colorable" id="telescope-body"/>
  <ellipse cx="282" cy="264" rx="16" ry="16" transform="rotate(-35 282 264)" class="colorable" id="telescope-lens"/>
  <rect x="218" y="295" width="18" height="25" rx="5" transform="rotate(-35 218 295)" class="colorable" id="telescope-grip"/>
  <!-- 빛 -->
  <path d="M290 248 Q300 235 310 240" class="outline" stroke-width="1.5"/>
  <path d="M296 254 Q308 245 316 252" class="outline" stroke-width="1.5"/>

  <!-- 아래 장식: 별자리 선 -->
  <g opacity="0.4">
    <line x1="40" y1="185" x2="70" y2="168" stroke="#9B8ED6" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="70" y1="168" x2="100" y2="175" stroke="#9B8ED6" stroke-width="1" stroke-dasharray="4 3"/>
    <circle cx="40" cy="185" r="3" fill="#9B8ED6"/>
    <circle cx="70" cy="168" r="3" fill="#9B8ED6"/>
    <circle cx="100" cy="175" r="3" fill="#9B8ED6"/>
  </g>

  <text x="200" y="492" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#9B8ED6" font-weight="bold">지우의 별 관찰 🦉</text>
</svg>
