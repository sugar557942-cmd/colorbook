  <!-- Awning stripes -->
  <line x1="55" y1="130" x2="50" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <line x1="82" y1="130" x2="82" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <line x1="108" y1="130" x2="112" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <!-- Stall counter -->
  <rect x="28" y="230" width="107" height="14" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="30" y="244" width="103" height="120" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Goods: jars -->
  <ellipse cx="55" cy="220" rx="12" ry="16" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="55" cy="206" rx="9" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="46" y1="215" x2="64" y2="215" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="82" cy="218" rx="11" ry="14" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="82" cy="205" rx="8" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Goods: round fruits/vegetables -->
  <circle cx="48" cy="260" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="64" cy="258" r="9" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="80" cy="260" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="96" cy="259" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="64" y1="249" x2="62" y2="244" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Cloth rolls on shelf -->
  <ellipse cx="46" cy="300" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="34" y="300" width="24" height="28" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="46" cy="328" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="80" cy="300" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="68" y="300" width="24" height="28" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="80" cy="328" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Stall pillars -->
  <line x1="30" y1="130" x2="30" y2="370" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="133" y1="130" x2="133" y2="370" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- STALL 2 RIGHT -->
  <path d="M265,130 L265,155 L372,155 L372,130 Q319,144 265,130 Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M265,155 Q272,162 279,155 Q286,162 293,155 Q300,162 307,155 Q314,162 321,155 Q328,162 335,155 Q342,162 349,155 Q356,162 363,155 Q370,162 372,155" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="296" y1="130" x2="292" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <line x1="320" y1="130" x2="320" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <line x1="345" y1="130" x2="349" y2="155" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round" stroke-dasharray="2,2"/>
  <!-- Stall counter & body -->
  <rect x="265" y="230" width="107" height="14" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="267" y="244" width="103" height="120" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Goods: tall jars and baskets -->
  <ellipse cx="290" cy="218" rx="12" ry="16" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="290" cy="204" rx="9" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="281" y1="213" x2="299" y2="213" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="316" cy="216" rx="11" ry="14" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="316" cy="203" rx="8" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Baskets on shelf -->
  <path d="M278,260 Q285,252 292,260 Q292,270 278,270 Z" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="278" y1="263" x2="292" y2="263" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="285" y1="252" x2="285" y2="248" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M304,260 Q311,252 318,260 Q318,270 304,270 Z" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="304" y1="263" x2="318" y2="263" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Hanging chili peppers / garlic -->
  <line x1="345" y1="162" x2="345" y2="224" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <ellipse cx="341" cy="178" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="341" cy="192" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="341" cy="206" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="349" cy="182" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="349" cy="196" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="349" cy="210" rx="5" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Stall pillars -->
  <line x1="267" y1="130" x2="267" y2="370" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="370" y1="130" x2="370" y2="370" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Ground line -->
  <line x1="28" y1="370" x2="372" y2="370" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- COBBLE ground hints -->
  <ellipse cx="170" cy="380" rx="15" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="200" cy="385" rx="12" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="228" cy="379" rx="14" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="150" cy="390" rx="10" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="250" cy="390" rx="10" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- ===== SPARROW RAON flying/hovering between stalls, wide-eyed ===== -->
  <!-- Wings spread (flying slowly) -->
  <path d="M176,192 Q155,165 140,160 Q146,178 154,188 Q165,186 176,192" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="146" y1="164" x2="160" y2="183" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="140" y1="172" x2="155" y2="186" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <path d="M224,192 Q245,165 260,160 Q254,178 246,188 Q235,186 224,192" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="254" y1="164" x2="240" y2="183" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="260" y1="172" x2="245" y2="186" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="200" cy="200" rx="24" ry="19" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail -->
  <path d="M177,202 Q166,212 160,208 Q166,200 176,198 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="166" y1="203" x2="160" y2="209" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="168" y1="208" x2="162" y2="214" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="215" cy="184" r="15" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Beak slightly open in amazement -->
  <path d="M227,181 L236,178 L230,186 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <line x1="227" y1="184" x2="230" y2="186" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eyes VERY WIDE with surprise sparkle -->
  <circle cx="220" cy="179" r="7" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="221" cy="179" r="3.5" fill="#2a2a2a"/>
  <circle cx="223" cy="177" r="1.3" fill="white"/>
  <!-- Eyebrows raised high -->
  <path d="M214,172 Q220,168 224,171" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Surprise sparkles around eyes -->
  <line x1="213" y1="174" x2="210" y2="171" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="225" y1="172" x2="228" y2="169" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="228" y1="178" x2="232" y2="178" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">시장에서 라온이 제일 신기해할</tspan>
    <tspan x="200" dy="18">물건은 무엇일까요?</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
