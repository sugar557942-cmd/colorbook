  <line x1="68" y1="404" x2="68" y2="328" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M60,376 Q52,366 56,358" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

