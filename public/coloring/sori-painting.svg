<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">소리의 커다란 그림</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Floor -->
  <line x1="36" y1="450" x2="364" y2="450" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Large canvas (left side, most of page) -->
  <rect x="30" y="82" width="210" height="270" rx="6" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Canvas frame inner edge -->
  <rect x="36" y="88" width="198" height="258" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Splatter marks on canvas edges -->
  <circle cx="50" cy="100" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="220" cy="108" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="58" cy="330" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="210" cy="322" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="44" cy="200" r="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Easel for canvas -->
  <line x1="30" y1="352" x2="24" y2="450" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="352" x2="246" y2="450" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="450" x2="170" y2="450" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Splatter marks around (floor/wall) -->
  <circle cx="285" cy="430" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="298" cy="438" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="310" cy="426" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="320" cy="442" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="265" cy="445" r="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="336" cy="432" r="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="350" cy="420" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Paint bucket on floor -->
  <path d="M282,418 L286,450 L310,450 L314,418 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="298" cy="418" rx="16" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Bucket handle -->
  <path d="M284,418 Q284,404 298,404 Q312,404 312,418" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Paint drip from top of canvas -->
  <path d="M90,82 Q90,95 88,108 Q87,114 90,118" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="90" cy="122" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M155,82 Q155,92 154,104" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="154" cy="108" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Cat body (right side, facing canvas) -->
  <ellipse cx="312" cy="360" rx="44" ry="50" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Apron -->
  <path d="M280,336 Q277,352 280,384 Q292,402 312,404 Q332,402 344,384 Q347,352 344,336" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <rect x="300" y="368" width="24" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Paint stains -->
  <circle cx="290" cy="352" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="332" cy="358" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Left arm raised high with big brush -->
  <path d="M274,330 Q255,300 248,272" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="246" cy="267" rx="10" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Big paintbrush -->
  <line x1="244" y1="258" x2="220" y2="180" stroke="#2a2a2a" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="218" cy="175" rx="7" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 218 175)"/>
  <!-- Drip from brush tip -->
  <path d="M213,167 Q208,154 210,142" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="210" cy="138" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Right arm (down/relaxed) -->
  <path d="M350,348 Q365,368 362,388" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="360" cy="392" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Feet -->
  <ellipse cx="292" cy="410" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="332" cy="412" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail -->
  <path d="M356,380 Q384,398 380,378 Q376,358 358,352 Q346,346 352,338" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Head (cat facing slightly left toward canvas) -->
  <circle cx="310" cy="282" r="52" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears -->
  <polygon points="265,250 256,216 288,240" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="268,247 262,228 283,241" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="355,250 364,216 332,240" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="352,247 358,228 337,241" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="310" cy="240" rx="38" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M272,240 Q275,210 310,208 Q345,210 348,240" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="295" cy="210" r="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (focused/determined) -->
  <ellipse cx="293" cy="280" rx="10" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="293" cy="281" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M293,278 L294,281 L297,281 L295,283 L296,286 L293,284 L290,286 L291,283 L289,281 L292,281 Z" fill="#2a2a2a"/>
  <!-- Eyebrows (focused) -->
  <path d="M284,270 Q293,266 301,270" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="327" cy="280" rx="10" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="327" cy="281" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M327,278 L328,281 L331,281 L329,283 L330,286 L327,284 L324,286 L325,283 L323,281 L326,281 Z" fill="#2a2a2a"/>
  <path d="M318,270 Q327,266 335,270" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Muzzle -->
  <ellipse cx="310" cy="300" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M310,293 Q306,289 303,293 Q300,297 306,300 Q310,303 310,303 Q310,303 314,300 Q320,297 317,293 Q314,289 310,293 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M306,303 Q310,308 314,303" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="325" y1="297" x2="365" y2="290" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="325" y1="301" x2="366" y2="301" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="325" y1="305" x2="364" y2="312" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="295" y1="297" x2="255" y2="290" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="295" y1="301" x2="254" y2="301" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="295" y1="305" x2="256" y2="312" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">소리의 캔버스에 내가 그리고 싶은</tspan>
    <tspan x="200" dy="18">것을 추가해 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
