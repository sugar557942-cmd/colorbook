  <ellipse cx="200" cy="266" rx="37" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M163,266 Q166,238 200,236 Q234,238 237,266" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="214" cy="238" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

