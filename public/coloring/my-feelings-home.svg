<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
    .label { font-family: sans-serif; font-size: 10px; fill: #666; text-anchor: middle; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 제목 -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">내 마음의 집을 색칠해요</text>

  <!-- 집 벽 -->
  <rect x="55" y="195" width="290" height="245" rx="8" class="colorable" id="house-wall"/>

  <!-- 지붕 -->
  <polygon points="40,200 200,68 360,200" class="colorable" id="roof"/>
  <!-- 지붕 타일 선 -->
  <line x1="120" y1="134" x2="200" y2="68" class="outline" stroke-width="1.5"/>
  <line x1="280" y1="134" x2="200" y2="68" class="outline" stroke-width="1.5"/>
  <line x1="80" y1="167" x2="200" y2="68" class="outline" stroke-width="1.5"/>
  <line x1="320" y1="167" x2="200" y2="68" class="outline" stroke-width="1.5"/>

  <!-- 굴뚝 -->
  <rect x="265" y="90" width="35" height="60" rx="4" class="colorable" id="chimney"/>
  <!-- 연기 -->
  <path d="M275 88 Q270 72 280 60 Q290 48 282 35" class="outline" stroke-width="2"/>
  <path d="M290 85 Q285 68 295 55 Q305 42 298 28" class="outline" stroke-width="2"/>

  <!-- 현관문 (가운데 아래) -->
  <rect x="163" y="335" width="74" height="105" rx="8" class="colorable" id="front-door"/>
  <circle cx="230" cy="390" r="5" class="colorable" id="door-knob"/>
  <!-- 문 반원 위 -->
  <path d="M163 343 Q200 315 237 343" class="colorable" id="door-arch"/>

  <!-- 창문 왼쪽 위 (기쁨의 방) -->
  <rect x="75" y="220" width="88" height="75" rx="6" class="colorable" id="window-tl"/>
  <line x1="119" y1="220" x2="119" y2="295" class="outline" stroke-width="1.5"/>
  <line x1="75" y1="257" x2="163" y2="257" class="outline" stroke-width="1.5"/>
  <!-- 창문 꽃 장식 -->
  <circle cx="97" cy="238" r="7" class="colorable" id="win-flower-c"/>
  <circle cx="87" cy="230" r="5" class="colorable" id="win-flower-p1"/>
  <circle cx="97" cy="226" r="5" class="colorable" id="win-flower-p2"/>
  <circle cx="107" cy="230" r="5" class="colorable" id="win-flower-p3"/>
  <text x="119" y="278" class="label">기쁨의 방</text>

  <!-- 창문 오른쪽 위 (안정의 방) -->
  <rect x="237" y="220" width="88" height="75" rx="6" class="colorable" id="window-tr"/>
  <line x1="281" y1="220" x2="281" y2="295" class="outline" stroke-width="1.5"/>
  <line x1="237" y1="257" x2="325" y2="257" class="outline" stroke-width="1.5"/>
  <!-- 창문 별 장식 -->
  <path d="M281 238 L283 231 L285 238 L292 240 L285 242 L283 249 L281 242 L274 240 Z" class="colorable" id="win-star"/>
  <text x="281" y="278" class="label">안정의 방</text>

  <!-- 창문 왼쪽 아래 (슬픔의 방) -->
  <rect x="75" y="312" width="72" height="65" rx="6" class="colorable" id="window-bl"/>
  <line x1="111" y1="312" x2="111" y2="377" class="outline" stroke-width="1.5"/>
  <line x1="75" y1="344" x2="147" y2="344" class="outline" stroke-width="1.5"/>
  <!-- 빗방울 장식 -->
  <ellipse cx="93" cy="328" rx="5" ry="8" class="colorable" id="win-drop1"/>
  <ellipse cx="111" cy="324" rx="4" ry="6" class="colorable" id="win-drop2"/>
  <text x="111" y="368" class="label">슬픔의 방</text>

  <!-- 창문 오른쪽 아래 (용기의 방) -->
  <rect x="253" y="312" width="72" height="65" rx="6" class="colorable" id="window-br"/>
  <line x1="289" y1="312" x2="289" y2="377" class="outline" stroke-width="1.5"/>
  <line x1="253" y1="344" x2="325" y2="344" class="outline" stroke-width="1.5"/>
  <!-- 불꽃 장식 -->
  <path d="M289 322 Q282 330 286 338 Q289 333 292 338 Q296 330 289 322 Z" class="colorable" id="win-flame"/>
  <text x="289" y="368" class="label">용기의 방</text>

  <!-- 집 앞 잔디 -->
  <path d="M0 440 Q100 425 200 432 Q300 425 400 440 L400 500 L0 500 Z" class="colorable" id="grass"/>
  <!-- 꽃 경로 -->
  <circle cx="42" cy="438" r="8" class="colorable" id="yard-flower1"/>
  <line x1="42" y1="446" x2="42" y2="465" class="outline" stroke-width="2"/>
  <circle cx="358" cy="436" r="8" class="colorable" id="yard-flower2"/>
  <line x1="358" y1="444" x2="358" y2="462" class="outline" stroke-width="2"/>

  <!-- 우편함 -->
  <rect x="22" y="400" width="28" height="35" rx="5" class="colorable" id="mailbox"/>
  <path d="M22 408 Q36 398 50 408" class="colorable" id="mailbox-top"/>
  <rect x="26" y="412" width="18" height="6" rx="2" class="colorable" id="mailbox-slot"/>
  <rect x="33" y="435" width="6" height="30" rx="2" class="colorable" id="mailbox-post"/>

  <!-- 나무 -->
  <rect x="352" y="378" width="16" height="58" rx="5" class="colorable" id="yard-tree-trunk"/>
  <circle cx="360" cy="358" r="32" class="colorable" id="yard-tree-top"/>
  <circle cx="342" cy="370" r="20" class="colorable" id="yard-tree-l"/>
  <circle cx="378" cy="370" r="20" class="colorable" id="yard-tree-r"/>

  <text x="200" y="492" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#C4A77D" font-weight="bold">내 마음의 집 🏠</text>
</svg>
