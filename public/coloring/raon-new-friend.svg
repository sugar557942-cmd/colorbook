  <line x1="196" y1="264" x2="204" y2="272" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="204" y1="264" x2="196" y2="272" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

