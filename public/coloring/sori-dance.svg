  <path d="M42,260 L45,264 L48,260 L45,256 Z" fill="white" stroke="#2a2a2a" stroke-width="1.4"/>
  <!-- Sparkle dots -->
  <circle cx="100" cy="120" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="302" cy="140" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="350" cy="200" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="55" cy="250" r="2.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Music notes floating around -->
  <ellipse cx="80" cy="180" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20 80 180)"/>
  <line x1="86" y1="178" x2="86" y2="160" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M86,160 Q99,155 97,166" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <ellipse cx="330" cy="190" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-20 330 190)"/>
  <line x1="336" y1="188" x2="336" y2="170" stroke="#2a2a2a" stroke-width="1.8"/>

  <ellipse cx="360" cy="130" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-20 360 130)"/>
  <line x1="365" y1="128" x2="365" y2="114" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M365,114 Q376,110 374,119" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Floor line -->
  <line x1="36" y1="450" x2="364" y2="450" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Cat in energetic dance pose -->
  <!-- Body (tilted, dynamic) -->
  <ellipse cx="200" cy="350" rx="42" ry="50" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="rotate(-10 200 350)"/>
