  <path d="M63,155 L59,173" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M88,165 L84,183" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M113,158 L109,176" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
