  <path d="M245,130 L241,148" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M270,120 L266,138" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M300,128 L296,146" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M325,118 L321,136" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M352,132 L348,150" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M235,155 L231,173" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M258,162 L254,180" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M282,150 L278,168" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
