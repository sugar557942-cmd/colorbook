  <path d="M238,358 Q255,338 262,316" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="264" cy="312" rx="10" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Feet -->
  <ellipse cx="180" cy="432" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="220" cy="432" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail -->
  <path d="M244,400 Q284,420 288,400 Q293,378 274,368 Q260,362 265,353" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

