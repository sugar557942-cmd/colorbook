  <!-- Ears (animated) -->
  <polygon points="155,236 144,200 178,224" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="158,233 150,212 173,226" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="245,236 258,200 224,224" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="242,233 250,212 229,226" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="200" cy="226" rx="37" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M163,226 Q166,196 200,194 Q234,196 237,226" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="216" cy="196" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (happy curved) -->
  <!-- Left eye happy arc -->
  <path d="M170,264 Q183,254 196,264" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Right eye happy arc -->
  <path d="M204,264 Q217,254 230,264" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Eye sparkles -->
  <path d="M176,258 L177,254 L178,258 L182,258 L179,261 L180,265 L177,262 L174,265 L175,261 L172,258 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M210,258 L211,254 L212,258 L216,258 L213,261 L214,265 L211,262 L208,265 L209,261 L206,258 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Big happy smile muzzle -->
  <ellipse cx="200" cy="286" rx="20" ry="13" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200,279 Q196,275 193,279 Q190,283 196,286 Q200,289 200,289 Q200,289 204,286 Q210,283 207,279 Q204,275 200,279 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Big smile -->
  <path d="M186,291 Q193,302 200,304 Q207,302 214,291" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="217" y1="283" x2="256" y2="276" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="217" y1="287" x2="257" y2="287" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="217" y1="291" x2="255" y2="298" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="283" x2="144" y2="276" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="287" x2="143" y2="287" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="183" y1="291" x2="145" y2="298" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">소리 주변에 기쁨을 나타내는</tspan>
    <tspan x="200" dy="18">것들을 그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
