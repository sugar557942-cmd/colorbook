<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">소리의 무지개 노래</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Rainbow arcs (7 bands, outermost to innermost) -->
  <path d="M42,340 A162,162 0 0 1 358,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M54,340 A150,150 0 0 1 346,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M66,340 A138,138 0 0 1 334,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M78,340 A126,126 0 0 1 322,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M90,340 A114,114 0 0 1 310,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M102,340 A102,102 0 0 1 298,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M114,340 A90,90 0 0 1 286,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Stars at rainbow ends -->
  <!-- Left end stars -->
  <path d="M42,340 L40,334 L36,338 L38,332 L32,332 L37,328 L35,322 L40,326 L45,322 L43,328 L48,332 L42,332 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M30,310 L29,305 L25,308 L27,303 L22,303 L26,300 L24,295 L28,298 L32,295 L30,300 L35,303 L29,303 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right end stars -->
  <path d="M358,340 L356,334 L352,338 L354,332 L348,332 L353,328 L351,322 L356,326 L361,322 L359,328 L364,332 L358,332 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M370,310 L369,305 L365,308 L367,303 L362,303 L366,300 L364,295 L368,298 L372,295 L370,300 L375,303 L369,303 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Small clouds at base of rainbow -->
  <ellipse cx="52" cy="352" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="38" cy="356" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="66" cy="356" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="348" cy="352" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="334" cy="356" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="362" cy="356" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Musical notes floating -->
  <!-- Note 1 -->
  <ellipse cx="90" cy="220" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 90 220)"/>
  <line x1="96" y1="218" x2="96" y2="196" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Note 2 (eighth note) -->
  <ellipse cx="120" cy="190" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 120 190)"/>
  <line x1="126" y1="188" x2="126" y2="166" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M126,166 Q140,160 138,172" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Note 3 -->
  <ellipse cx="290" cy="195" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 290 195)"/>
  <line x1="296" y1="193" x2="296" y2="171" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Note 4 (eighth) -->
  <ellipse cx="318" cy="215" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 318 215)"/>
  <line x1="324" y1="213" x2="324" y2="191" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M324,191 Q338,185 336,197" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Note 5 (above) -->
  <ellipse cx="200" cy="165" rx="7" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20 200 165)"/>
  <line x1="206" y1="163" x2="206" y2="140" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M206,140 Q220,134 218,146" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Note 6 (whole note) -->
  <ellipse cx="163" cy="178" rx="9" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-15 163 178)"/>
  <!-- Sparkle stars -->
  <path d="M155,140 L156,135 L157,140 L162,141 L157,142 L156,147 L155,142 L150,141 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M248,150 L249,145 L250,150 L255,151 L250,152 L249,157 L248,152 L243,151 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Cat body -->
  <ellipse cx="200" cy="400" rx="42" ry="48" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arms wide open (singing gesture) -->
  <path d="M160,390 Q138,375 122,368" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="117" cy="366" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M240,390 Q262,375 278,368" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="283" cy="366" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Feet -->
  <ellipse cx="180" cy="448" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="220" cy="448" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail curling up -->
  <path d="M242,418 Q278,430 280,410 Q282,390 262,382 Q248,376 255,365" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="200" cy="320" r="52" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears -->
  <polygon points="155,288 146,254 178,278" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="158,285 152,266 173,279" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="245,288 254,254 222,278" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="242,285 248,266 227,279" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="200" cy="278" rx="36" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M164,278 Q167,250 200,248 Q233,250 236,278" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="213" cy="250" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (sparkly/happy) -->
  <ellipse cx="183" cy="316" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="183" cy="317" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M183,314 L184,317 L187,317 L185,319 L186,322 L183,320 L180,322 L181,319 L179,317 L182,317 Z" fill="#2a2a2a"/>
  <ellipse cx="217" cy="316" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="217" cy="317" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M217,314 L218,317 L221,317 L219,319 L220,322 L217,320 L214,322 L215,319 L213,317 L216,317 Z" fill="#2a2a2a"/>

  <!-- Muzzle with open mouth singing -->
  <ellipse cx="200" cy="336" rx="18" ry="13" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200,329 Q196,325 193,329 Q190,333 196,336 Q200,339 200,339 Q200,339 204,336 Q210,333 207,329 Q204,325 200,329 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Open singing mouth -->
  <path d="M192,340 Q196,350 200,352 Q204,350 208,340" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="215" y1="333" x2="255" y2="326" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="337" x2="256" y2="337" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="215" y1="341" x2="254" y2="348" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="333" x2="145" y2="326" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="337" x2="144" y2="337" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="185" y1="341" x2="146" y2="348" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Music notes from open mouth -->
  <ellipse cx="172" cy="360" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-20 172 360)"/>
  <line x1="177" y1="358" x2="177" y2="344" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="228" cy="360" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-20 228 360)"/>
  <line x1="233" y1="358" x2="233" y2="344" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M233,344 Q246,339 244,350" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="482" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">무지개 각 색깔에 나의 감정을</tspan>
    <tspan x="200" dy="18">연결해 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
