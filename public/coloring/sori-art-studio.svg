  <circle cx="52" cy="110" r="10" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="66" y="96" width="17" height="17" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="33" y1="131" x2="93" y2="131" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="63" y1="91" x2="63" y2="141" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Wall frame right top -->
  <rect x="302" y="82" width="64" height="74" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
