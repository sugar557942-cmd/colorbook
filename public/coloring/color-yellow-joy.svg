  <g transform="rotate(225,200,240)"><ellipse cx="200" cy="135" rx="18" ry="38" class="colorable" id="petal-225"/></g>
  <g transform="rotate(247.5,200,240)"><ellipse cx="200" cy="135" rx="18" ry="38" class="colorable" id="petal-247"/></g>
  <g transform="rotate(270,200,240)"><ellipse cx="200" cy="135" rx="18" ry="38" class="colorable" id="petal-270"/></g>
