<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">소리의 작은 전시회</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Gallery wall background -->
  <!-- Baseboard -->
  <rect x="25" y="420" width="350" height="20" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Floor -->
  <rect x="25" y="440" width="350" height="16" rx="0" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Wall line -->
  <line x1="25" y1="420" x2="375" y2="420" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Picture rail along top -->
  <rect x="25" y="76" width="350" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Frame 1 (top left) - WITH ART (landscape) -->
  <rect x="35" y="92" width="110" height="85" rx="4" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="41" y="98" width="98" height="73" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Art inside: simple landscape -->
  <line x1="41" y1="152" x2="139" y2="152" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Hills -->
  <path d="M41,152 Q60,130 80,145 Q100,130 120,145 Q130,140 139,145" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sun -->
  <circle cx="120" cy="112" r="10" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="120" y1="98" x2="120" y2="104" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="131" y1="101" x2="127" y2="106" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="134" y1="112" x2="128" y2="112" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Wire from rail -->
  <line x1="90" y1="84" x2="90" y2="92" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Name placard -->
  <rect x="52" y="181" width="76" height="14" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="90" y="192" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="8" fill="#2a2a2a">풍경화 No.1</text>

  <!-- Frame 2 (top right) - WITH ART (abstract circles) -->
  <rect x="255" y="92" width="110" height="85" rx="4" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="261" y="98" width="98" height="73" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Abstract art: overlapping circles -->
  <circle cx="290" cy="130" r="20" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="310" cy="120" r="18" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="300" cy="145" r="15" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="318" cy="140" r="12" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Wire -->
  <line x1="310" y1="84" x2="310" y2="92" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Placard -->
  <rect x="272" y="181" width="76" height="14" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="310" y="192" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="8" fill="#2a2a2a">추상화 No.2</text>

  <!-- Frame 3 (bottom left) - EMPTY for child to draw -->
  <rect x="35" y="208" width="130" height="110" rx="4" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="42" y="215" width="116" height="96" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Dashed inside hint -->
  <text x="100" y="263" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="9" fill="#bbb">나의 그림</text>
  <!-- Wire -->
  <line x1="100" y1="84" x2="100" y2="208" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Placard -->
  <rect x="52" y="322" width="96" height="14" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="100" y="333" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="8" fill="#2a2a2a">나의 작품</text>

  <!-- Frame 4 (bottom right) - EMPTY for child to draw -->
  <rect x="235" y="208" width="130" height="110" rx="4" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="242" y="215" width="116" height="96" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="300" y="263" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="9" fill="#bbb">나의 그림</text>
  <!-- Wire -->
  <line x1="300" y1="84" x2="300" y2="208" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Placard -->
  <rect x="252" y="322" width="96" height="14" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="300" y="333" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="8" fill="#2a2a2a">나의 작품</text>

  <!-- Frame 5 (center small) - WITH ART (cat face) -->
  <rect x="165" y="130" width="70" height="70" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="170" y="135" width="60" height="60" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Simple cat face inside -->
  <circle cx="200" cy="163" r="22" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="186,146 182,136 194,145" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="214,146 218,136 206,145" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="193" cy="162" rx="5" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="207" cy="162" rx="5" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="200" cy="172" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Wire -->
  <line x1="200" y1="84" x2="200" y2="130" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Placard -->
  <rect x="172" y="204" width="56" height="14" rx="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="200" y="215" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="8" fill="#2a2a2a">자화상</text>

  <!-- Cat standing proudly to right side of gallery, gesturing -->
  <!-- Body -->
  <ellipse cx="338" cy="380" rx="34" ry="40" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Apron -->
  <path d="M316,362 Q313,375 316,400 Q325,415 338,417 Q351,415 360,400 Q363,375 360,362" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Left arm gesturing outward toward frames -->
  <path d="M308,370 Q285,355 272,345" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="268" cy="343" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Right arm at side -->
  <path d="M368,374 Q378,388 374,402" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="372" cy="406" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Feet -->
  <ellipse cx="325" cy="419" rx="14" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="351" cy="420" rx="14" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Tail -->
  <path d="M372,395 Q392,408 390,392 Q388,377 374,372 Q364,368 368,360" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head small cat -->
  <circle cx="338" cy="344" r="38" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears -->
  <polygon points="312,322 306,300 328,316" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="314,320 310,304 326,316" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <polygon points="364,322 370,300 348,316" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="362,320 366,304 350,316" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Beret -->
  <ellipse cx="338" cy="314" rx="28" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M310,314 Q312,292 338,290 Q364,292 366,314" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="350" cy="292" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Eyes (proud happy) -->
  <ellipse cx="325" cy="342" rx="8" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="325" cy="343" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="326" cy="342" r="1.5" fill="#2a2a2a"/>
  <ellipse cx="351" cy="342" rx="8" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="351" cy="343" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="352" cy="342" r="1.5" fill="#2a2a2a"/>

  <!-- Muzzle -->
  <ellipse cx="338" cy="356" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M338,350 Q335,347 332,350 Q330,353 335,355 Q338,357 338,357 Q338,357 341,355 Q346,353 344,350 Q341,347 338,350 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M334,357 Q338,362 342,357" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="349" y1="353" x2="372" y2="348" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="349" y1="357" x2="373" y2="357" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="327" y1="353" x2="304" y2="348" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="327" y1="357" x2="303" y2="357" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">전시회 벽의 빈 액자에</tspan>
    <tspan x="200" dy="18">내 그림을 그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
