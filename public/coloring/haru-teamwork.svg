<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">힘을 합쳐요!</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Big box being pushed -->
  <rect x="140" y="310" width="160" height="120" rx="10" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Box star decoration -->
  <line x1="140" y1="310" x2="300" y2="430" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="300" y1="310" x2="140" y2="430" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="220" cy="370" r="20" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <text x="220" y="377" text-anchor="middle" font-family="Arial" font-size="18" fill="#2a2a2a">★</text>
  <!-- Box handle/rope -->
  <path d="M140,340 L115,340 Q105,340 105,350 Q105,360 115,360 L140,360" fill="none" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Ground -->
  <line x1="30" y1="435" x2="372" y2="435" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rabbit (하루) pushing from right -->
  <!-- Ears -->
  <ellipse cx="342" cy="230" rx="16" ry="45" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="342" cy="232" rx="9" ry="32" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="316" cy="225" rx="16" ry="45" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="316" cy="227" rx="9" ry="32" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="328" cy="278" r="45" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (determined squint) -->
  <path d="M312,270 Q318,264 324,270" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M332,270 Q338,264 344,270" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="318" cy="274" rx="3" ry="2" fill="#2a2a2a"/>
  <ellipse cx="338" cy="274" rx="3" ry="2" fill="#2a2a2a"/>
  <!-- Nose + big smile -->
  <ellipse cx="328" cy="288" rx="5" ry="4" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M320,292 Q328,300 336,292" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="340" cy="378" rx="42" ry="42" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Arms pushing box -->
  <path d="M302,362 Q295,355 302,345" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="304" cy="342" rx="13" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-60,304,342)"/>
  <path d="M303,376 Q296,374 300,362" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="324" cy="415" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="355" cy="416" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="377" cy="373" r="11" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Friend 1 (bear silhouette) pulling rope on left -->
  <!-- Head -->
  <circle cx="65" cy="278" r="38" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="45" cy="253" r="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="85" cy="253" r="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (effort face) -->
  <path d="M53,275 Q58,270 63,275" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M67,275 Q72,270 77,275" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M55,283 Q65,290 75,283" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="65" cy="370" rx="40" ry="42" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Arm pulling rope -->
  <path d="M100,352 Q108,345 106,337" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="106" cy="333" rx="13" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(30,106,333)"/>
  <!-- Legs -->
  <ellipse cx="48" cy="407" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="80" cy="408" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Speech bubbles "영차!" -->
  <ellipse cx="90" cy="180" rx="38" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M80,203 L75,218 L92,208" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <text x="90" y="186" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">영차!</text>
  <ellipse cx="320" cy="175" rx="38" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M330,198 L335,213 L318,203" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <text x="320" y="181" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="14" font-weight="bold" fill="#2a2a2a">영차!</text>

  <!-- Energy lines from effort -->
  <line x1="106" y1="340" x2="94" y2="328" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="110" y1="345" x2="95" y2="345" stroke="#2a2a2a" stroke-width="1.5"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">친구들과 함께 해서 즐거웠던 순간이</text>
  <text x="200" y="494" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">있나요?</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
