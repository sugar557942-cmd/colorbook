<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 제목 안내 -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#888">빗속에 서 있는 나를 색칠해요</text>

  <!-- 비구름 -->
  <ellipse cx="200" cy="75" rx="72" ry="40" class="colorable" id="rain-cloud-main"/>
  <ellipse cx="155" cy="85" rx="48" ry="35" class="colorable" id="rain-cloud-l"/>
  <ellipse cx="248" cy="82" rx="45" ry="32" class="colorable" id="rain-cloud-r"/>
  <ellipse cx="198" cy="55" rx="40" ry="28" class="colorable" id="rain-cloud-t"/>

  <!-- 빗줄기 -->
  <line x1="120" y1="125" x2="110" y2="165" class="outline" stroke-width="2"/>
  <line x1="145" y1="118" x2="135" y2="158" class="outline" stroke-width="2"/>
  <line x1="170" y1="120" x2="160" y2="160" class="outline" stroke-width="2"/>
  <line x1="230" y1="120" x2="220" y2="160" class="outline" stroke-width="2"/>
  <line x1="255" y1="118" x2="245" y2="158" class="outline" stroke-width="2"/>
  <line x1="280" y1="125" x2="270" y2="165" class="outline" stroke-width="2"/>
  <line x1="305" y1="130" x2="295" y2="170" class="outline" stroke-width="2"/>
  <line x1="95" y1="132" x2="85" y2="172" class="outline" stroke-width="2"/>

  <!-- 우산 -->
  <path d="M140 195 Q200 145 260 195" class="colorable" id="umbrella-top"/>
  <path d="M140 195 Q142 205 148 205 Q154 195 160 205 Q166 195 172 205 Q178 195 184 205 Q190 195 196 205 Q202 195 208 205 Q214 195 220 205 Q226 195 232 205 Q238 195 244 205 Q250 195 256 205 Q260 205 260 195" class="colorable" id="umbrella-edge"/>
  <!-- 우산 살 -->
  <line x1="200" y1="195" x2="200" y2="155" class="outline" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="165" y2="165" class="outline" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="235" y2="165" class="outline" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="148" y2="185" class="outline" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="252" y2="185" class="outline" stroke-width="1.5"/>
  <!-- 우산 손잡이 -->
  <path d="M200 195 L200 255 Q200 268 188 268 Q176 268 176 255" class="outline" stroke-width="3"/>

  <!-- 사람 몸 -->
  <!-- 머리 -->
  <circle cx="200" cy="295" r="38" class="colorable" id="person-head"/>
  <!-- 눈 -->
  <circle cx="188" cy="292" r="5" class="fixed"/>
  <circle cx="212" cy="292" r="5" class="fixed"/>
  <!-- 입 (표현 자유롭게) -->
  <path d="M190 306 Q200 314 210 306" class="outline" stroke-width="2"/>

  <!-- 몸통 -->
  <rect x="170" y="333" width="60" height="80" rx="15" class="colorable" id="person-body"/>

  <!-- 팔 왼쪽 -->
  <rect x="132" y="335" width="42" height="18" rx="9" class="colorable" id="person-arm-l"/>
  <!-- 팔 오른쪽 (우산 들기) -->
  <rect x="188" y="260" width="18" height="78" rx="9" class="colorable" id="person-arm-r"/>

  <!-- 다리 왼쪽 -->
  <rect x="172" y="413" width="22" height="55" rx="10" class="colorable" id="person-leg-l"/>
  <!-- 다리 오른쪽 -->
  <rect x="206" y="413" width="22" height="55" rx="10" class="colorable" id="person-leg-r"/>
  <!-- 발 -->
  <ellipse cx="183" cy="468" rx="20" ry="11" class="colorable" id="person-foot-l"/>
  <ellipse cx="217" cy="468" rx="20" ry="11" class="colorable" id="person-foot-r"/>

  <!-- 물웅덩이 -->
  <ellipse cx="200" cy="482" rx="55" ry="12" class="colorable" id="puddle-main"/>
  <ellipse cx="130" cy="488" rx="30" ry="8" class="colorable" id="puddle-l"/>
  <ellipse cx="270" cy="486" rx="28" ry="8" class="colorable" id="puddle-r"/>
  <!-- 물결 -->
  <path d="M165 478 Q175 474 185 478" class="outline" stroke-width="1.5"/>
  <path d="M215 478 Q225 474 235 478" class="outline" stroke-width="1.5"/>

  <!-- 배경 빗줄기 (멀리) -->
  <line x1="50" y1="150" x2="40" y2="200" stroke="#CCC" stroke-width="1.5"/>
  <line x1="75" y1="145" x2="65" y2="195" stroke="#CCC" stroke-width="1.5"/>
  <line x1="325" y1="148" x2="315" y2="198" stroke="#CCC" stroke-width="1.5"/>
  <line x1="350" y1="145" x2="340" y2="195" stroke="#CCC" stroke-width="1.5"/>
  <line x1="370" y1="155" x2="360" y2="205" stroke="#CCC" stroke-width="1.5"/>
  <line x1="30" y1="162" x2="20" y2="212" stroke="#CCC" stroke-width="1.5"/>

  <!-- 풀잎 (바닥) -->
  <path d="M40 470 Q45 450 50 465" class="outline" stroke-width="2"/>
  <path d="M55 468 Q58 448 63 462" class="outline" stroke-width="2"/>
  <path d="M335 470 Q340 450 345 465" class="outline" stroke-width="2"/>
  <path d="M350 468 Q355 448 360 462" class="outline" stroke-width="2"/>

  <text x="200" y="498" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7AAED6" font-weight="bold">빗속의 나 ☂️</text>
</svg>
