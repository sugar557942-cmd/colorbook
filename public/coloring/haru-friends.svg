<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 풍선들 -->
  <ellipse cx="80" cy="80" rx="28" ry="34" class="colorable" id="balloon1"/>
  <line x1="80" y1="114" x2="95" y2="160" class="outline" stroke-width="1.5"/>
  <ellipse cx="200" cy="55" rx="32" ry="38" class="colorable" id="balloon2"/>
  <line x1="200" y1="93" x2="200" y2="160" class="outline" stroke-width="1.5"/>
  <ellipse cx="320" cy="78" rx="28" ry="34" class="colorable" id="balloon3"/>
  <line x1="320" y1="112" x2="308" y2="158" class="outline" stroke-width="1.5"/>
  <ellipse cx="140" cy="68" rx="22" ry="27" class="colorable" id="balloon4"/>
  <line x1="140" y1="95" x2="148" y2="160" class="outline" stroke-width="1.5"/>
  <ellipse cx="268" cy="65" rx="22" ry="27" class="colorable" id="balloon5"/>
  <line x1="268" y1="92" x2="258" y2="158" class="outline" stroke-width="1.5"/>

  <!-- 왼쪽 캐릭터: 다온 (곰) -->
  <ellipse cx="88" cy="390" rx="52" ry="58" class="colorable" id="daon-body"/>
  <circle cx="88" cy="310" r="58" class="colorable" id="daon-head"/>
  <circle cx="65" cy="265" r="20" class="colorable" id="daon-ear-l"/>
  <circle cx="65" cy="265" r="12" class="colorable" id="daon-ear-l-in"/>
  <circle cx="111" cy="265" r="20" class="colorable" id="daon-ear-r"/>
  <circle cx="111" cy="265" r="12" class="colorable" id="daon-ear-r-in"/>
  <ellipse cx="88" cy="326" rx="22" ry="16" class="colorable" id="daon-snout"/>
  <circle cx="75" cy="305" r="8" class="fixed"/>
  <circle cx="75" cy="305" r="4" class="fixed"/>
  <circle cx="101" cy="305" r="8" class="fixed"/>
  <circle cx="101" cy="305" r="4" class="fixed"/>
  <ellipse cx="88" cy="322" rx="6" ry="4" class="colorable" id="daon-nose"/>
  <!-- 팔 -->
  <ellipse cx="38" cy="372" rx="18" ry="42" transform="rotate(15 38 372)" class="colorable" id="daon-arm-l"/>
  <ellipse cx="138" cy="368" rx="18" ry="42" transform="rotate(-20 138 368)" class="colorable" id="daon-arm-r"/>

  <!-- 오른쪽 캐릭터: 나리 (여우) -->
  <rect x="270" y="335" width="80" height="95" rx="18" class="colorable" id="nari-body"/>
  <ellipse cx="310" cy="308" rx="58" ry="62" class="colorable" id="nari-head"/>
  <polygon points="262,272 248,225 285,258" class="colorable" id="nari-ear-l"/>
  <polygon points="358,272 372,225 335,258" class="colorable" id="nari-ear-r"/>
  <ellipse cx="310" cy="322" rx="24" ry="16" class="colorable" id="nari-snout"/>
  <circle cx="296" cy="302" r="8" class="colorable" id="nari-eye-l"/>
  <circle cx="296" cy="302" r="4" class="fixed"/>
  <circle cx="324" cy="302" r="8" class="colorable" id="nari-eye-r"/>
  <circle cx="324" cy="302" r="4" class="fixed"/>
  <ellipse cx="310" cy="318" rx="6" ry="4" class="colorable" id="nari-nose"/>
  <!-- 팔 -->
  <ellipse cx="258" cy="358" rx="16" ry="38" transform="rotate(18 258 358)" class="colorable" id="nari-arm-l"/>
  <ellipse cx="362" cy="355" rx="16" ry="38" transform="rotate(-18 362 355)" class="colorable" id="nari-arm-r"/>

  <!-- 가운데 하루 (토끼) - 더 크게 -->
  <ellipse cx="200" cy="390" rx="62" ry="68" class="colorable" id="haru-body"/>
  <ellipse cx="200" cy="395" rx="40" ry="50" class="colorable" id="haru-belly"/>
  <circle cx="200" cy="290" r="68" class="colorable" id="haru-head"/>
  <!-- 토끼 귀 -->
  <ellipse cx="168" cy="205" rx="20" ry="50" class="colorable" id="haru-ear-l"/>
  <ellipse cx="168" cy="207" rx="11" ry="38" class="colorable" id="haru-ear-l-in"/>
  <ellipse cx="232" cy="205" rx="20" ry="50" class="colorable" id="haru-ear-r"/>
  <ellipse cx="232" cy="207" rx="11" ry="38" class="colorable" id="haru-ear-r-in"/>
  <!-- 눈 -->
  <circle cx="183" cy="285" r="12" class="colorable" id="haru-eye-l"/>
  <circle cx="183" cy="285" r="5.5" class="fixed"/>
  <circle cx="180" cy="282" r="2.5" fill="white"/>
  <circle cx="217" cy="285" r="12" class="colorable" id="haru-eye-r"/>
  <circle cx="217" cy="285" r="5.5" class="fixed"/>
  <circle cx="214" cy="282" r="2.5" fill="white"/>
  <!-- 코/입 -->
  <ellipse cx="200" cy="302" rx="20" ry="14" class="colorable" id="haru-snout"/>
  <ellipse cx="200" cy="298" rx="5.5" ry="4" class="colorable" id="haru-nose"/>
  <path d="M192 308 Q200 316 208 308" class="outline"/>
  <!-- 볼 -->
  <ellipse cx="167" cy="296" rx="12" ry="7" class="colorable" id="haru-blush-l"/>
  <ellipse cx="233" cy="296" rx="12" ry="7" class="colorable" id="haru-blush-r"/>
  <!-- 팔 -->
  <ellipse cx="130" cy="372" rx="22" ry="50" transform="rotate(20 130 372)" class="colorable" id="haru-arm-l"/>
  <ellipse cx="270" cy="372" rx="22" ry="50" transform="rotate(-20 270 372)" class="colorable" id="haru-arm-r"/>

  <!-- 선물 상자 -->
  <rect x="150" y="440" width="100" height="52" rx="6" class="colorable" id="gift-box"/>
  <rect x="150" y="432" width="100" height="14" rx="4" class="colorable" id="gift-lid"/>
  <line x1="200" y1="432" x2="200" y2="492" class="outline" stroke-width="2.5"/>
  <path d="M200 432 Q185 418 175 428" class="outline" stroke-width="2"/>
  <path d="M200 432 Q215 418 225 428" class="outline" stroke-width="2"/>

  <!-- 별 반짝 장식 -->
  <path d="M350 140 L353 132 L356 140 L364 143 L356 146 L353 154 L350 146 L342 143 Z" class="colorable" id="star1"/>
  <path d="M45 145 L47 139 L49 145 L55 147 L49 149 L47 155 L45 149 L39 147 Z" class="colorable" id="star2"/>

  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#7EC8A0" font-weight="bold">하루와 친구들 🎈</text>
</svg>
