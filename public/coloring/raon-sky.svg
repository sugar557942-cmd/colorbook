<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- Background -->
  <rect width="400" height="560" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">라온의 하늘 전망대</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- CLOUDS -->
  <ellipse cx="78" cy="118" rx="34" ry="17" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="105" cy="108" rx="26" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="58" cy="113" rx="22" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="315" cy="105" rx="36" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="344" cy="94" rx="26" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="290" cy="100" rx="22" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="200" cy="90" rx="28" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="220" cy="82" rx="19" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="182" cy="84" rx="17" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- TOWER PILLARS -->
  <rect x="181" y="305" width="13" height="148" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="206" y="305" width="13" height="148" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Cross braces -->
  <line x1="181" y1="380" x2="219" y2="330" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="219" y1="380" x2="181" y2="330" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="181" y1="435" x2="219" y2="400" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="219" y1="435" x2="181" y2="400" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- PLATFORM FLOOR -->
  <rect x="128" y="292" width="144" height="15" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- RAILING POSTS -->
  <line x1="143" y1="292" x2="143" y2="257" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="173" y1="292" x2="173" y2="257" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="227" y1="292" x2="227" y2="257" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="257" y1="292" x2="257" y2="257" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top rail -->
  <line x1="138" y1="257" x2="262" y2="257" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mid rail -->
  <line x1="138" y1="274" x2="262" y2="274" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- STAIRS at base -->
  <rect x="179" y="450" width="42" height="7" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="169" y="457" width="62" height="7" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- VILLAGE BELOW: houses, trees, ground -->
  <!-- Ground -->
  <line x1="34" y1="445" x2="366" y2="445" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hill bumps -->
  <path d="M34,445 Q90,410 150,438 Q200,420 260,438 Q310,415 366,445" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- House left -->
  <rect x="42" y="404" width="52" height="38" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="42,404 68,380 94,404" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <rect x="60" y="420" width="12" height="22" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="47" y="410" width="10" height="9" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- House right -->
  <rect x="292" y="408" width="56" height="34" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="292,408 320,384 348,408" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <rect x="308" y="422" width="12" height="20" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Trees -->
  <line x1="112" y1="444" x2="112" y2="413" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <ellipse cx="112" cy="404" rx="13" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="132" y1="444" x2="132" y2="418" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <ellipse cx="132" cy="410" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <line x1="264" y1="444" x2="264" y2="412" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <ellipse cx="264" cy="403" rx="13" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="282" y1="444" x2="282" y2="420" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <ellipse cx="282" cy="412" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- ===== SPARROW RAON on railing ===== -->
  <!-- Body oval -->
  <ellipse cx="200" cy="272" rx="21" ry="17" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail feathers -->
  <path d="M180,275 Q170,284 163,280 Q169,273 179,271 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="170" y1="276" x2="164" y2="281" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="172" y1="280" x2="165" y2="285" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="214" cy="255" r="14" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Explorer hat brim -->
  <ellipse cx="214" cy="243" rx="17" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Hat crown -->
  <path d="M201,243 Q203,232 214,230 Q225,232 227,243" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Hat band line -->
  <path d="M202,240 Q214,238 226,240" fill="none" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Beak (small triangle, forward) -->
  <polygon points="226,251 236,248 228,256" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Eye wide with sparkle -->
  <circle cx="219" cy="251" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="220" cy="251" r="2.5" fill="#2a2a2a"/>
  <circle cx="221.5" cy="249.5" r="1" fill="white"/>
  <!-- Eyebrow raised with curiosity -->
  <path d="M215,245 Q219,242 223,244" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Wing folded D-shape -->
  <path d="M197,265 Q187,271 189,281 Q197,283 210,281 Q209,271 200,265 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="191" y1="272" x2="207" y2="274" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="190" y1="277" x2="207" y2="279" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Feet on railing top -->
  <line x1="202" y1="289" x2="202" y2="296" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="199" y1="296" x2="202" y2="296" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="205" y1="296" x2="202" y2="296" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="202" y1="296" x2="202" y2="299" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="209" y1="289" x2="209" y2="296" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="206" y1="296" x2="209" y2="296" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="212" y1="296" x2="209" y2="296" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="209" y1="296" x2="209" y2="299" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- BINOCULARS held up to beak -->
  <circle cx="233" cy="245" r="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="247" cy="245" r="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="236" y="242" width="8" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Binocular strap -->
  <path d="M228,252 Q228,256 226,258" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Sun top right corner -->
  <circle cx="345" cy="82" r="16" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="345" y1="60" x2="345" y2="56" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="363" y1="68" x2="366" y2="65" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="367" y1="82" x2="371" y2="82" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="363" y1="96" x2="366" y2="99" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="327" y1="68" x2="324" y2="65" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="323" y1="82" x2="319" y2="82" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="327" y1="96" x2="324" y2="99" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">전망대에서 보이는 세상,</tspan>
    <tspan x="200" dy="18">어떤 것들이 있나요?</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
