  <line x1="125" y1="393" x2="128" y2="393" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="131" y1="393" x2="128" y2="393" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="128" y1="393" x2="128" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="140" y1="383" x2="140" y2="393" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="137" y1="393" x2="140" y2="393" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="143" y1="393" x2="140" y2="393" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="140" y1="393" x2="140" y2="396" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- SPEECH BUBBLE from Raon (empty) -->
  <ellipse cx="140" cy="305" rx="38" ry="22" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="150,325 158,336 162,325" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>

  <!-- ===== NEW FRIEND: HEDGEHOG right side ===== -->
  <!-- Hedgehog body (round with spiky back) -->
  <!-- Belly/body smooth -->
  <ellipse cx="272" cy="370" rx="32" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Spiky back overlay -->
  <path d="M242,362 Q248,340 258,330 Q265,342 272,348 Q280,340 290,330 Q298,342 302,362" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spines -->
  <line x1="252" y1="346" x2="248" y2="332" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="259" y1="338" x2="256" y2="323" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="267" y1="335" x2="265" y2="320" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="275" y1="336" x2="274" y2="321" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="283" y1="338" x2="283" y2="323" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="291" y1="344" x2="294" y2="330" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Hedgehog head -->
  <ellipse cx="248" cy="368" rx="18" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
