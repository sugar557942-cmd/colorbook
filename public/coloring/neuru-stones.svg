<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">돌탑 쌓는 느루</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Ground -->
  <path d="M30,440 Q200,425 370,440 L370,460 Q200,450 30,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Ground texture lines -->
  <path d="M40,447 Q120,440 200,444 Q280,448 360,444" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,4"/>
  <path d="M40,453 Q130,448 200,451 Q280,454 360,450" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="3,4"/>

  <!-- STONE TOWER (leaning slightly right) -->
  <!-- Base stone - widest -->
  <ellipse cx="178" cy="430" rx="48" ry="18" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <path d="M178,430 q8,-4 0,-8" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- Stone 2 -->
  <ellipse cx="183" cy="398" rx="40" ry="16" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <path d="M183,398 q7,-3 0,-7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- Stone 3 -->
  <ellipse cx="188" cy="368" rx="33" ry="14" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <path d="M188,368 q6,-3 0,-6" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- Stone 4 -->
  <ellipse cx="192" cy="342" rx="26" ry="12" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <path d="M192,342 q5,-2 0,-5" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- Stone 5 - top (being placed by turtle) -->
  <ellipse cx="195" cy="320" rx="20" ry="10" fill="white" stroke="#2a2a2a" stroke-width="3"/>

  <!-- Stones on ground waiting -->
  <ellipse cx="310" cy="440" rx="20" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="340" cy="432" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="325" cy="422" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="60" cy="440" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="80" cy="430" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- TURTLE (standing upright, focused, placing stone) -->
  <!-- Shell -->
  <ellipse cx="260" cy="335" rx="60" ry="50" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="260" cy="348" rx="60" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Shell hex pattern -->
  <polygon points="260,293 277,302 277,318 260,327 243,318 243,302" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="282,305 298,313 298,328 282,336 266,328 266,313" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="238,305 254,313 254,328 238,336 222,328 222,313" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="260,320 276,328 276,342 260,350 244,342 244,328" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower on shell -->
  <circle cx="260" cy="309" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="260" cy="302" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="266" cy="305" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60,266,305)"/>
  <ellipse cx="266" cy="313" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120,266,313)"/>
  <ellipse cx="254" cy="313" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240,254,313)"/>
  <ellipse cx="254" cy="305" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300,254,305)"/>

  <!-- Back legs (ground) -->
  <ellipse cx="298" cy="372" rx="17" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(15,298,372)"/>
  <ellipse cx="222" cy="372" rx="17" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-15,222,372)"/>

  <!-- Neck (extended upward) -->
  <ellipse cx="240" cy="300" rx="13" ry="22" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-10,240,300)"/>
  <!-- Head (looking up at stone) -->
  <circle cx="225" cy="282" r="22" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Eyes - focused/concentrated -->
  <circle cx="216" cy="276" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="215" cy="276" r="2.5" fill="#2a2a2a"/>
  <circle cx="214" cy="274" r="1" fill="white"/>
  <circle cx="230" cy="277" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="230" cy="277" r="2" fill="#2a2a2a"/>
  <!-- Concentrated brow lines -->
  <path d="M211,270 Q215,267 219,270" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M226,270 Q230,268 234,271" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Focused mouth (small o) -->
  <circle cx="223" cy="290" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Arms raised holding stone -->
  <!-- Left arm up -->
  <path d="M222,308 Q200,295 195,312" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="200" cy="295" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-50,200,295)"/>
  <!-- Right arm up -->
  <path d="M258,308 Q270,295 215,318" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="270" cy="295" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(50,270,295)"/>

  <!-- Small sweat drop (concentration) -->
  <path d="M207,270 Q204,262 207,258 Q210,262 207,270" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">돌탑에 내가 쌓고 싶은</tspan>
    <tspan x="200" dy="18">꿈을 써 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
