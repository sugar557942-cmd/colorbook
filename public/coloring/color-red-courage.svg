  <path d="M62 200 Q62 188 70 188 Q78 188 78 200 Q78 212 62 220 Q46 212 46 200 Q46 188 54 188 Q62 188 62 200 Z" class="colorable" id="heart1"/>
  <path d="M338 200 Q338 188 346 188 Q354 188 354 200 Q354 212 338 220 Q322 212 322 200 Q322 188 330 188 Q338 188 338 200 Z" class="colorable" id="heart2"/>
  <path d="M35 280 Q35 272 41 272 Q47 272 47 280 Q47 288 35 294 Q23 288 23 280 Q23 272 29 272 Q35 272 35 280 Z" class="colorable" id="heart3"/>
  <path d="M365 280 Q365 272 371 272 Q377 272 377 280 Q377 288 365 294 Q353 288 353 280 Q353 272 359 272 Q365 272 365 280 Z" class="colorable" id="heart4"/>

  <!-- 별 장식 -->
  <path d="M68 130 L71 121 L74 130 L83 132 L74 134 L71 143 L68 134 L59 132 Z" class="colorable" id="star1"/>
  <path d="M328 130 L331 121 L334 130 L343 132 L334 134 L331 143 L328 134 L319 132 Z" class="colorable" id="star2"/>
  <path d="M200 68 L203 59 L206 68 L215 70 L206 72 L203 81 L200 72 L191 70 Z" class="colorable" id="star3"/>

  <!-- 색채치료 텍스트 -->
  <text x="200" y="468" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">빨간색으로 색칠하면 용기가 생겨요!</text>
  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#E85858" font-weight="bold">빨간색의 용기 🦁</text>
</svg>
