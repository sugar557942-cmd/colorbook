  <line x1="210" y1="274" x2="218" y2="278" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="218" y1="274" x2="210" y2="278" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

