<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">새벽을 맞이하는 느루</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Horizon line -->
  <line x1="30" y1="350" x2="370" y2="350" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Rising sun (half-risen on horizon) -->
  <!-- Sun semicircle -->
  <path d="M110,350 A90,90 0 0,1 290,350" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Sun rays spreading outward -->
  <!-- Long rays -->
  <line x1="200" y1="260" x2="200" y2="230" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="244" y1="270" x2="264" y2="246" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="278" y1="300" x2="304" y2="282" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="156" y1="270" x2="136" y2="246" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="122" y1="300" x2="96" y2="282" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Shorter rays -->
  <line x1="225" y1="262" x2="237" y2="236" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="260" y1="285" x2="280" y2="265" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="288" y1="325" x2="315" y2="315" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="262" x2="163" y2="236" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="285" x2="120" y2="265" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="325" x2="85" y2="315" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Very short rays near horizon -->
  <line x1="295" y1="340" x2="322" y2="337" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="340" x2="78" y2="337" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Radial light arcs -->
  <path d="M128,350 A72,72 0 0,1 272,350" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="6,5"/>
  <path d="M148,350 A52,52 0 0,1 252,350" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,5"/>
  <!-- Sun face (wonder-wide eyes) -->
  <circle cx="178" cy="330" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="176" cy="330" r="3.5" fill="#2a2a2a"/>
  <circle cx="175" cy="328" r="1.2" fill="white"/>
  <circle cx="222" cy="330" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="224" cy="330" r="3.5" fill="#2a2a2a"/>
  <circle cx="225" cy="328" r="1.2" fill="white"/>
  <path d="M186,343 Q200,352 214,343" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Hills in background -->
  <path d="M30,350 Q80,290 140,350" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M260,350 Q320,295 370,350" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Far hill (smaller) -->
  <path d="M90,350 Q150,308 210,350" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M190,350 Q250,312 310,350" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Birds (V shapes) flying -->
  <path d="M48,150 Q54,144 60,150" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M68,138 Q74,132 80,138" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92,155 Q97,149 102,155" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M320,148 Q326,142 332,148" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M340,162 Q345,156 350,162" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M356,140 Q361,134 366,140" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M120,128 Q125,122 130,128" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M280,135 Q285,129 290,135" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Hilltop ground / turtle standing on -->
  <path d="M110,430 Q200,395 290,430 L290,455 Q200,445 110,455 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Grass tufts on hilltop -->
  <path d="M125,420 Q128,410 131,420" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M140,416 Q143,406 146,416" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M258,416 Q261,406 264,416" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M272,420 Q275,410 278,420" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- TURTLE on hilltop, facing sun, eyes wide open -->
  <!-- Shell -->
  <ellipse cx="200" cy="380" rx="62" ry="49" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="200" cy="394" rx="62" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Hex pattern -->
  <polygon points="200,338 216,347 216,363 200,372 184,363 184,347" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="221,350 236,358 236,373 221,381 206,373 206,358" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="179,350 194,358 194,373 179,381 164,373 164,358" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="200,364 215,372 215,386 200,394 185,386 185,372" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower on shell -->
  <circle cx="200" cy="354" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="200" cy="347" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="206" cy="350" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60,206,350)"/>
  <ellipse cx="206" cy="358" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120,206,358)"/>
  <ellipse cx="194" cy="358" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240,194,358)"/>
  <ellipse cx="194" cy="350" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300,194,350)"/>

  <!-- Legs -->
  <ellipse cx="248" cy="404" rx="17" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-15,248,404)"/>
  <ellipse cx="152" cy="404" rx="17" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(15,152,404)"/>
  <ellipse cx="240" cy="416" rx="15" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(10,240,416)"/>
  <ellipse cx="160" cy="416" rx="15" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-10,160,416)"/>

  <!-- Neck (looking up at sunrise) -->
  <ellipse cx="233" cy="368" rx="13" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-15,233,368)"/>
  <!-- Head (facing sun, looking up/forward) -->
  <circle cx="253" cy="352" r="22" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- WIDE OPEN eyes (taking in new day) -->
  <circle cx="260" cy="345" r="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="261" cy="345" r="3.5" fill="#2a2a2a"/>
  <circle cx="262" cy="343" r="1.5" fill="white"/>
  <circle cx="246" cy="347" r="6" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="246" cy="347" r="2.5" fill="#2a2a2a"/>
  <circle cx="247" cy="345" r="1" fill="white"/>
  <!-- Eyebrows raised (wonder) -->
  <path d="M242,339 Q246,335 250,339" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M256,337 Q261,333 266,337" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Gentle smile -->
  <path d="M244,358 Q253,365 262,359" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M140,390 Q128,397 126,407" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">해돋이 하늘을 보며</tspan>
    <tspan x="200" dy="18">오늘의 다짐을 써 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
