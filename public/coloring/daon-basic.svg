<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- White background -->
  <rect width="400" height="560" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">다온이를 색칠해요</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === BEAR ILLUSTRATION === -->

  <!-- Left ear outer -->
  <circle cx="155" cy="107" r="24" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left ear inner -->
  <circle cx="158" cy="110" r="13" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear outer -->
  <circle cx="245" cy="107" r="24" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right ear inner -->
  <circle cx="242" cy="110" r="13" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Head -->
  <circle cx="200" cy="158" r="62" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Eyes -->
  <circle cx="179" cy="148" r="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="181" cy="146" r="3.5" fill="#2a2a2a"/>
  <circle cx="183" cy="144" r="1.5" fill="white"/>
  <circle cx="221" cy="148" r="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="223" cy="146" r="3.5" fill="#2a2a2a"/>
  <circle cx="225" cy="144" r="1.5" fill="white"/>

  <!-- Muzzle -->
  <ellipse cx="200" cy="176" rx="28" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Nose -->
  <ellipse cx="200" cy="168" rx="8" ry="5.5" fill="#2a2a2a"/>
  <!-- Mouth - happy smile -->
  <path d="M188,182 Q200,195 212,182" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Cheek blush circles (dashed outline for coloring) -->
  <ellipse cx="165" cy="176" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2.5,2.5"/>
  <ellipse cx="235" cy="176" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="2.5,2.5"/>

  <!-- Scarf (drawn before body so it overlaps neck area) -->
  <!-- Scarf wrap around neck -->
  <path d="M148,210 Q200,228 252,210 Q252,222 200,240 Q148,222 148,210 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scarf stripe details -->
  <path d="M158,212 Q200,230 242,212" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Scarf knot/hanging end -->
  <rect x="184" y="226" width="32" height="36" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fringe at scarf end -->
  <line x1="188" y1="262" x2="186" y2="274" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="195" y1="262" x2="194" y2="276" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="202" y1="262" x2="202" y2="276" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="209" y1="262" x2="210" y2="276" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="216" y1="262" x2="218" y2="274" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="200" cy="340" rx="72" ry="84" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly oval -->
  <ellipse cx="200" cy="345" rx="42" ry="52" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Left arm (slightly out) -->
  <path d="M135,278 Q112,295 115,340 Q118,360 132,368" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left paw -->
  <ellipse cx="126" cy="372" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- paw toes -->
  <ellipse cx="113" cy="368" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="126" cy="364" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="139" cy="368" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Right arm (slightly out) -->
  <path d="M265,278 Q288,295 285,340 Q282,360 268,368" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right paw -->
  <ellipse cx="274" cy="372" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- paw toes -->
  <ellipse cx="261" cy="368" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="274" cy="364" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="287" cy="368" rx="6" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Left leg -->
  <ellipse cx="170" cy="412" rx="30" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left foot -->
  <ellipse cx="163" cy="430" rx="24" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right leg -->
  <ellipse cx="230" cy="412" rx="30" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right foot -->
  <ellipse cx="237" cy="430" rx="24" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative small stars -->
  <path d="M100,200 L103,193 L106,200 L113,200 L108,205 L110,212 L103,208 L96,212 L98,205 L93,200 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290,230 L293,223 L296,230 L303,230 L298,235 L300,242 L293,238 L286,242 L288,235 L283,230 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M310,160 L312,155 L314,160 L319,160 L315,163 L316,168 L312,165 L308,168 L309,163 L305,160 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Activity prompt -->
  <text x="200" y="478" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">다온이는 오늘 어떤 마음일까요?</tspan>
    <tspan x="200" dy="18">색깔로 표현해 보세요.</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
