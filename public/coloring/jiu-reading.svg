  <line x1="122" y1="430" x2="186" y2="426" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="122" y1="437" x2="186" y2="433" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Book text lines right page -->
