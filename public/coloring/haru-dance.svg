<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">봄날의 춤</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Musical notes floating -->
  <text x="60" y="130" font-family="Arial" font-size="28" fill="none" stroke="#2a2a2a" stroke-width="1.5">♪</text>
  <text x="290" y="110" font-family="Arial" font-size="22" fill="none" stroke="#2a2a2a" stroke-width="1.5">♫</text>
  <text x="320" y="180" font-family="Arial" font-size="18" fill="none" stroke="#2a2a2a" stroke-width="1.5">♪</text>
  <text x="50" y="230" font-family="Arial" font-size="16" fill="none" stroke="#2a2a2a" stroke-width="1.5">♫</text>

  <!-- Flowers on ground -->
  <!-- Flower 1 -->
  <circle cx="70" cy="420" r="8" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="70" cy="405" rx="6" ry="10" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="70" cy="435" rx="6" ry="10" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="55" cy="420" rx="10" ry="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="85" cy="420" rx="10" ry="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="70" y1="445" x2="70" y2="460" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower 2 -->
  <circle cx="140" cy="435" r="7" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="140" cy="422" rx="5" ry="9" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="140" cy="448" rx="5" ry="9" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="127" cy="435" rx="9" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="153" cy="435" rx="9" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="140" y1="455" x2="140" y2="465" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower 3 -->
  <circle cx="310" cy="428" r="8" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="310" cy="413" rx="6" ry="10" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="310" cy="443" rx="6" ry="10" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="295" cy="428" rx="10" ry="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="325" cy="428" rx="10" ry="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="310" y1="448" x2="310" y2="462" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rabbit dancing - dynamic pose -->
  <!-- Right ear (tilted with dance) -->
  <ellipse cx="228" cy="155" rx="17" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(15,228,155)"/>
  <ellipse cx="228" cy="157" rx="9" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(15,228,157)"/>
  <!-- Left ear (tilted) -->
  <ellipse cx="175" cy="148" rx="17" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-10,175,148)"/>
  <ellipse cx="175" cy="150" rx="9" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-10,175,150)"/>
  <!-- Head -->
  <circle cx="200" cy="205" r="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (bright happy) -->
  <circle cx="184" cy="196" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="216" cy="196" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="186" cy="198" r="4" fill="#2a2a2a"/>
  <circle cx="218" cy="198" r="4" fill="#2a2a2a"/>
  <circle cx="183" cy="194" r="2" fill="white"/>
  <circle cx="215" cy="194" r="2" fill="white"/>
  <!-- Nose + big smile -->
  <ellipse cx="200" cy="215" rx="6" ry="4.5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M190,220 Q200,232 210,220" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Body (slightly tilted) -->
  <ellipse cx="200" cy="318" rx="52" ry="55" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Left arm up -->
  <path d="M152,295 Q128,268 138,248" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="142" cy="240" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,142,240)"/>
  <!-- Right arm out -->
  <path d="M248,305 Q278,305 285,320" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="292" cy="326" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Left leg up (kicked) -->
  <path d="M175,368 Q158,395 140,400" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="128" cy="403" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Right leg (standing) -->
  <ellipse cx="225" cy="372" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Tail -->
  <circle cx="248" cy="312" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Wind lines (movement) -->
  <path d="M115,310 Q100,305 95,315" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M112,325 Q95,322 90,332" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">하루처럼 춤을 출 때 어떤 기분이 드나요?</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
