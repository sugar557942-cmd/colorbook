<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">나리의 로봇 만들기</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === ROBOT (left side) === -->
  <!-- Robot head -->
  <rect x="52" y="115" width="80" height="65" rx="10" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Antennae -->
  <line x1="75" y1="115" x2="70" y2="90" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="70" cy="87" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="109" y1="115" x2="114" y2="90" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="114" cy="87" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Robot eyes (two square eyes) -->
  <rect x="64" y="128" width="22" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="75" cy="137" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="75" cy="137" r="2" fill="#2a2a2a"/>
  <rect x="98" y="128" width="22" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="109" cy="137" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="109" cy="137" r="2" fill="#2a2a2a"/>
  <!-- Robot mouth (grid of squares) -->
  <rect x="66" y="152" width="52" height="18" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="79" y1="152" x2="79" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="92" y1="152" x2="92" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="105" y1="152" x2="105" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Robot neck (cylinder) -->
  <rect x="78" y="180" width="28" height="18" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Neck bolts -->
  <circle cx="82" cy="189" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="102" cy="189" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Robot body (square) -->
  <rect x="42" y="198" width="100" height="100" rx="8" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Body panel details -->
  <rect x="54" y="210" width="38" height="28" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Power button on panel -->
  <circle cx="73" cy="224" r="10" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <path d="M73 218 L73 224" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M68 220 Q63 224 65 230 Q68 235 73 235 Q78 235 81 230 Q83 224 78 220" fill="none" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Chest panel buttons -->
  <circle cx="110" cy="214" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="122" cy="214" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="110" cy="228" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="122" cy="228" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Chest display screen -->
  <rect x="54" y="248" width="76" height="38" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Screen bars -->
  <rect x="58" y="254" width="28" height="6" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="58" y="264" width="42" height="6" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="58" y="274" width="20" height="6" rx="2" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Robot arms (rectangles) -->
  <rect x="22" y="202" width="22" height="72" rx="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Left hand -->
  <rect x="20" y="272" width="26" height="22" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Fingers on left hand -->
  <line x1="26" y1="272" x2="26" y2="265" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="272" x2="33" y2="263" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="272" x2="40" y2="265" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="140" y="202" width="22" height="72" rx="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Right hand -->
  <rect x="138" y="272" width="26" height="22" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Fingers on right hand -->
  <line x1="144" y1="272" x2="144" y2="265" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="151" y1="272" x2="151" y2="263" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="158" y1="272" x2="158" y2="265" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Robot legs -->
  <rect x="56" y="298" width="34" height="62" rx="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="94" y="298" width="34" height="62" rx="8" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Knee joints -->
  <circle cx="73" cy="330" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="111" cy="330" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Robot feet -->
  <rect x="48" y="358" width="50" height="20" rx="7" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="86" y="358" width="50" height="20" rx="7" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Name tag on robot -->
  <rect x="57" y="175" width="70" height="22" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="92" y="191" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">이름: ____</text>

  <!-- === NARI FOX (right side, presenting pose) === -->
  <!-- Tail -->
  <path d="M348 310 Q375 285 368 255 Q360 228 342 228 Q330 226 328 240 Q342 244 340 260 Q336 280 320 295 Q310 305 318 318 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="290" cy="335" rx="38" ry="52" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Apron -->
  <path d="M258 305 Q258 360 262 388 Q290 398 318 388 Q322 360 322 305 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Apron bib -->
  <rect x="272" y="282" width="36" height="40" rx="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Legs -->
  <ellipse cx="275" cy="392" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="305" cy="392" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="273" cy="402" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="307" cy="402" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Left arm (pointing at robot) -->
  <path d="M260 300 Q232 280 200 275" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="197" cy="274" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Right arm (down at side) -->
  <path d="M320 308 Q338 318 342 330" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="343" cy="334" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- NECK -->
  <rect x="283" y="265" width="14" height="16" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- HEAD -->
  <ellipse cx="290" cy="242" rx="42" ry="38" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Ears -->
  <path d="M256 223 L244 183 L278 210Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M260 221 L251 188 L276 212Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M324 223 L336 183 L302 210Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M320 221 L329 188 L304 212Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Goggles on forehead -->
  <rect x="264" y="218" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="297" y="218" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="284" y1="224" x2="297" y2="224" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Eyes (proud/happy expression, curved up) -->
  <path d="M273 243 Q281 236 289 243" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M291 243 Q299 236 307 243" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eye pupils -->
  <circle cx="281" cy="244" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="280" cy="243" r="1.5" fill="#2a2a2a"/>
  <circle cx="299" cy="244" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="298" cy="243" r="1.5" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="290" cy="256" rx="22" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="290" cy="250" rx="5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Big proud smile -->
  <path d="M278 260 Q290 271 302 260" fill="none" stroke="#2a2a2a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cheeks (happy) -->
  <circle cx="270" cy="255" r="5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="310" cy="255" r="5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- SPARKLE stars near presentation -->
  <path d="M216 235 L219 228 L222 235 L229 238 L222 241 L219 248 L216 241 L209 238 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M200 210 L202 205 L204 210 L209 212 L204 214 L202 219 L200 214 L195 212 Z" fill="none" stroke="#2a2a2a" stroke-width="1.3"/>

  <!-- Activity prompt -->
  <text x="200" y="440" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">나리의 로봇에게 이름을 지어 주세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
