  <ellipse cx="119" cy="350" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Feet -->
  <ellipse cx="180" cy="438" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="220" cy="440" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail -->
