  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">봄 꽃밭의 다온이</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === SUN in corner === -->
  <circle cx="60" cy="100" r="28" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Sun rays -->
  <line x1="60" y1="64" x2="60" y2="56" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="82" y1="72" x2="87" y2="65" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="94" y1="94" x2="102" y2="90" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="72" x2="33" y2="65" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="94" x2="18" y2="90" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="134" x2="60" y2="142" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="124" x2="22" y2="130" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92" y1="124" x2="98" y2="130" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sun face -->
  <circle cx="53" cy="95" r="3.5" fill="#2a2a2a"/>
  <circle cx="67" cy="95" r="3.5" fill="#2a2a2a"/>
  <path d="M52,107 Q60,115 68,107" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- === BUTTERFLY === -->
  <ellipse cx="315" cy="120" rx="18" ry="10" transform="rotate(-35,315,120)" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="335" cy="112" rx="14" ry="8" transform="rotate(20,335,112)" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="318" cy="136" rx="15" ry="9" transform="rotate(-10,318,136)" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="336" cy="128" rx="12" ry="7" transform="rotate(30,336,128)" fill="white" stroke="#2a2a2a" stroke-width="2"/>
