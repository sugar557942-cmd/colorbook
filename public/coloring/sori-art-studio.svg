  <line x1="157" y1="442" x2="184" y2="258" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="243" y1="442" x2="216" y2="258" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="442" x2="200" y2="294" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="165" y1="370" x2="235" y2="370" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

