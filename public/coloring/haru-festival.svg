<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">어울림 축제의 하루</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Bunting flags across top -->
  <line x1="30" y1="95" x2="370" y2="95" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Flag triangles -->
  <polygon points="50,95 70,95 60,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="85,95 105,95 95,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="120,95 140,95 130,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="155,95 175,95 165,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="190,95 210,95 200,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="225,95 245,95 235,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="260,95 280,95 270,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="295,95 315,95 305,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="330,95 350,95 340,118" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Stage platform -->
  <rect x="80" y="370" width="240" height="25" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="70" y="390" width="260" height="15" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stage front decorative dots -->
  <circle cx="110" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="150" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="190" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="230" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="270" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="310" cy="398" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Rabbit on stage (하루) -->
  <!-- Right ear -->
  <ellipse cx="222" cy="218" rx="18" ry="48" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="222" cy="220" rx="10" ry="34" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Left ear -->
  <ellipse cx="178" cy="218" rx="18" ry="48" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="178" cy="220" rx="10" ry="34" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="266" r="48" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (happy wide) -->
  <circle cx="184" cy="257" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="216" cy="257" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="186" cy="259" r="3.5" fill="#2a2a2a"/>
  <circle cx="218" cy="259" r="3.5" fill="#2a2a2a"/>
  <circle cx="183" cy="255" r="1.5" fill="white"/>
  <circle cx="215" cy="255" r="1.5" fill="white"/>
  <!-- Nose + mouth -->
  <ellipse cx="200" cy="276" rx="6" ry="4.5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M196,280 Q200,287 204,280" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="200" cy="350" rx="50" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Arms spread wide (performing) -->
  <path d="M152,338 Q128,325 118,340" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="112" cy="344" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M248,338 Q272,325 282,340" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="288" cy="344" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Legs on stage -->
  <ellipse cx="182" cy="370" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="218" cy="370" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Tail -->
  <circle cx="245" cy="345" r="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Stars and sparkles around -->
  <text x="85" y="200" font-size="22" fill="none" stroke="#2a2a2a" stroke-width="1">★</text>
  <text x="295" y="200" font-size="18" fill="none" stroke="#2a2a2a" stroke-width="1">★</text>
  <text x="60" y="300" font-size="14" fill="none" stroke="#2a2a2a" stroke-width="1">✦</text>
  <text x="320" y="300" font-size="14" fill="none" stroke="#2a2a2a" stroke-width="1">✦</text>
  <!-- Sparkle lines -->
  <line x1="90" y1="165" x2="90" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="85" y1="170" x2="75" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="87" y1="162" x2="80" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="93" y1="162" x2="100" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="310" y1="165" x2="310" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="315" y1="170" x2="325" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="313" y1="162" x2="320" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="307" y1="162" x2="300" y2="155" stroke="#2a2a2a" stroke-width="1.5"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">축제에서 내가 가장 하고 싶은 것은</text>
  <text x="200" y="494" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">무엇인가요?</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
