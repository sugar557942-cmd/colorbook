  <line x1="284" y1="82" x2="281" y2="79" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="306" y1="82" x2="309" y2="79" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
