  <line x1="215" y1="408" x2="215" y2="425" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="215" cy="401" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="215" cy="392" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="223" cy="397" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(60,223,397)"/>
  <ellipse cx="207" cy="397" rx="4" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-60,207,397)"/>

