  <ellipse cx="85" cy="100" rx="28" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <ellipse cx="295" cy="105" rx="50" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="322" cy="92" rx="38" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="270" cy="95" rx="32" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

