  <ellipse cx="110" cy="157" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="116" y1="162" x2="116" y2="178" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="116" cy="160" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

