<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: fill 0.2s; }
    .colorable:hover { opacity: 0.85; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>

  <!-- 배경 -->
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 몸통 -->
  <ellipse cx="200" cy="340" rx="90" ry="100" class="colorable" data-colorable="true" id="body"/>

  <!-- 팔 (왼쪽) -->
  <ellipse cx="110" cy="330" rx="28" ry="60" transform="rotate(-15 110 330)" class="colorable" data-colorable="true" id="arm-left"/>

  <!-- 팔 (오른쪽) -->
  <ellipse cx="290" cy="330" rx="28" ry="60" transform="rotate(15 290 330)" class="colorable" data-colorable="true" id="arm-right"/>

  <!-- 다리 (왼쪽) -->
  <ellipse cx="165" cy="445" rx="35" ry="22" class="colorable" data-colorable="true" id="leg-left"/>

  <!-- 다리 (오른쪽) -->
  <ellipse cx="235" cy="445" rx="35" ry="22" class="colorable" data-colorable="true" id="leg-right"/>

  <!-- 머리 -->
  <circle cx="200" cy="200" r="95" class="colorable" data-colorable="true" id="head"/>

  <!-- 귀 (왼쪽) -->
  <circle cx="128" cy="130" r="30" class="colorable" data-colorable="true" id="ear-left"/>
  <circle cx="128" cy="130" r="18" class="colorable" data-colorable="true" id="ear-left-inner"/>

  <!-- 귀 (오른쪽) -->
  <circle cx="272" cy="130" r="30" class="colorable" data-colorable="true" id="ear-right"/>
  <circle cx="272" cy="130" r="18" class="colorable" data-colorable="true" id="ear-right-inner"/>

  <!-- 얼굴 코 -->
  <ellipse cx="200" cy="215" rx="30" ry="22" class="colorable" data-colorable="true" id="snout"/>

  <!-- 눈 (왼쪽) -->
  <circle cx="174" cy="190" r="12" class="colorable" data-colorable="true" id="eye-left"/>
  <circle cx="174" cy="190" r="6" class="fixed" id="pupil-left"/>
  <circle cx="171" cy="187" r="2.5" fill="white"/>

  <!-- 눈 (오른쪽) -->
  <circle cx="226" cy="190" r="12" class="colorable" data-colorable="true" id="eye-right"/>
  <circle cx="226" cy="190" r="6" class="fixed" id="pupil-right"/>
  <circle cx="223" cy="187" r="2.5" fill="white"/>

  <!-- 코 -->
  <ellipse cx="200" cy="210" rx="9" ry="7" class="colorable" data-colorable="true" id="nose"/>

  <!-- 입 -->
  <path d="M186 224 Q200 236 214 224" class="outline"/>

  <!-- 배 -->
  <ellipse cx="200" cy="340" rx="52" ry="60" class="colorable" data-colorable="true" id="belly"/>

  <!-- 발바닥 패드 왼쪽 -->
  <ellipse cx="158" cy="458" rx="18" ry="10" class="colorable" data-colorable="true" id="paw-left"/>
  <!-- 발바닥 패드 오른쪽 -->
  <ellipse cx="242" cy="458" rx="18" ry="10" class="colorable" data-colorable="true" id="paw-right"/>

  <!-- 꿀단지 (소품) -->
  <path d="M275 390 Q272 370 280 355 Q288 340 295 355 Q303 370 300 390 Z" class="colorable" data-colorable="true" id="honey-jar"/>
  <ellipse cx="287" cy="390" rx="13" ry="6" class="colorable" data-colorable="true" id="jar-bottom"/>
  <rect x="279" y="348" width="17" height="8" rx="3" class="colorable" data-colorable="true" id="jar-lid"/>
  <!-- 꿀 줄무늬 -->
  <path d="M278 370 Q287 365 297 370" class="outline" stroke-width="1.5"/>
  <path d="M277 380 Q287 375 298 380" class="outline" stroke-width="1.5"/>

  <!-- 이름 장식 -->
  <text x="200" y="490" text-anchor="middle" font-family="'Cafe24Ssurround', sans-serif" font-size="18" fill="#C4A77D" font-weight="bold">다온이 🐻</text>
</svg>
