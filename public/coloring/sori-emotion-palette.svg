<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">소리의 감정 팔레트</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Large artist palette shape -->
  <!-- Main palette body - organic kidney/palette shape -->
  <path d="M60,200 Q55,140 100,110 Q145,80 200,85 Q270,88 320,130 Q360,168 355,220 Q350,270 320,300 Q290,330 250,340 Q220,348 200,345 Q140,342 95,310 Q55,278 60,200 Z" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Thumb hole of palette -->
  <ellipse cx="105" cy="270" rx="26" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Inner hole (empty space) -->
  <ellipse cx="105" cy="270" rx="18" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- 7 emotion paint wells around palette edge -->
  <!-- 1. 기쁨 (Joy) - top center -->
  <circle cx="200" cy="105" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="200" y="101" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">기쁨</text>
  <!-- Small face hint -->
  <path d="M193,108 Q200,114 207,108" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 2. 슬픔 (Sadness) - upper left -->
  <circle cx="100" cy="140" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="100" y="136" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">슬픔</text>
  <!-- Tear drop -->
  <path d="M96,144 Q100,152 104,144" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M100,147 Q98,153 100,155 Q102,153 100,147" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- 3. 화남 (Anger) - upper right -->
  <circle cx="310" cy="150" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="310" y="146" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">화남</text>
  <!-- Angry brow line -->
  <path d="M303,154 Q310,150 317,154" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M304,158 Q310,162 316,158" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 4. 설렘 (Excitement) - right side -->
  <circle cx="345" cy="220" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="345" y="216" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">설렘</text>
  <!-- Heart -->
  <path d="M345,224 Q342,220 339,224 Q336,228 342,231 Q345,233 345,233 Q345,233 348,231 Q354,228 351,224 Q348,220 345,224 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- 5. 무서움 (Fear) - right lower -->
  <circle cx="320" cy="296" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="320" y="292" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#2a2a2a">무서움</text>
  <!-- Shaky lines -->
  <path d="M313,300 Q316,298 319,300 Q322,302 325,300 Q328,298 320,300" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 6. 놀람 (Surprise) - bottom center -->
  <circle cx="218" cy="338" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="218" y="334" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">놀람</text>
  <!-- O mouth -->
  <circle cx="218" cy="344" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- 7. 사랑 (Love) - left lower -->
  <circle cx="72" cy="210" r="22" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <text x="72" y="206" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" fill="#2a2a2a">사랑</text>
  <!-- Heart -->
  <path d="M72,214 Q69,210 66,214 Q63,218 69,221 Q72,223 72,223 Q72,223 75,221 Q81,218 78,214 Q75,210 72,214 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Cat sitting in corner of palette (lower left area, on the thumb hole) -->
  <!-- Small cat version sitting inside palette -->
  <!-- Body -->
  <ellipse cx="140" cy="295" rx="30" ry="35" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arms on lap -->
  <ellipse cx="120" cy="310" rx="10" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="160" cy="310" rx="10" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Feet -->
  <ellipse cx="128" cy="328" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="152" cy="328" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Tail curling around -->
  <path d="M170,310 Q188,322 186,308 Q184,296 170,292" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head small -->
  <circle cx="140" cy="262" r="34" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears small -->
  <polygon points="115,242 109,221 130,237" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="117,240 113,225 128,237" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <polygon points="165,242 171,221 150,237" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="163,240 167,225 152,237" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Beret small -->
  <ellipse cx="140" cy="236" rx="26" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M114,236 Q116,216 140,214 Q164,216 166,236" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="150" cy="215" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Eyes -->
  <ellipse cx="128" cy="260" rx="7" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="128" cy="261" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="129" cy="260" r="1.5" fill="#2a2a2a"/>
  <ellipse cx="152" cy="260" rx="7" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="152" cy="261" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="153" cy="260" r="1.5" fill="#2a2a2a"/>

  <!-- Muzzle small -->
  <ellipse cx="140" cy="272" rx="12" ry="8" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M140,268 Q137,265 135,268 Q133,271 137,273 Q140,275 140,275 Q140,275 143,273 Q147,271 145,268 Q143,265 140,268 Z" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M137,275 Q140,279 143,275" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whiskers small -->
  <line x1="149" y1="270" x2="170" y2="266" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="149" y1="273" x2="170" y2="273" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="131" y1="270" x2="110" y2="266" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="131" y1="273" x2="110" y2="273" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <text x="200" y="480" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">팔레트 빈 칸에 나의 감정을</tspan>
    <tspan x="200" dy="18">색으로 표현해 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
