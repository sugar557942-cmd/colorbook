<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">이야기 만드는 소리</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Night window (top right) -->
  <rect x="296" y="80" width="72" height="90" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Window panes -->
  <line x1="332" y1="80" x2="332" y2="170" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="296" y1="125" x2="368" y2="125" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Moon through window -->
  <path d="M318,95 Q325,90 334,96 Q325,114 318,110 Q310,104 318,95 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Stars through window -->
  <circle cx="350" cy="92" r="2" fill="#2a2a2a"/>
  <circle cx="344" cy="108" r="1.5" fill="#2a2a2a"/>
  <circle cx="356" cy="118" r="2" fill="#2a2a2a"/>
  <circle cx="306" cy="138" r="2" fill="#2a2a2a"/>
  <circle cx="352" cy="145" r="1.5" fill="#2a2a2a"/>
  <circle cx="316" cy="155" r="2" fill="#2a2a2a"/>
  <!-- Window sill -->
  <rect x="290" y="170" width="84" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Curtain left -->
  <path d="M296,80 Q285,100 284,125 Q283,150 290,170" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Curtain right -->
  <path d="M368,80 Q379,100 380,125 Q381,150 374,170" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Desk -->
  <rect x="30" y="380" width="340" height="20" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Desk legs -->
  <rect x="44" y="400" width="14" height="50" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="342" y="400" width="14" height="50" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Candle on desk (right side) -->
  <rect x="328" y="344" width="14" height="36" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Candle drips -->
  <path d="M328,352 Q325,356 326,362" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="326" cy="364" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Flame -->
  <path d="M335,344 Q338,334 335,326 Q332,334 335,344 Z" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Flame inner -->
  <path d="M335,342 Q337,336 335,330 Q333,336 335,342 Z" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Candlestick holder -->
  <ellipse cx="335" cy="380" rx="14" ry="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="328" y="375" width="14" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Candle glow rays -->
  <line x1="335" y1="322" x2="335" y2="316" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="342" y1="326" x2="346" y2="322" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="328" y1="326" x2="324" y2="322" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="345" y1="332" x2="352" y2="330" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="325" y1="332" x2="318" y2="330" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Open storybook on desk -->
  <path d="M60,358 Q60,348 70,346 L200,340 L330,346 Q340,348 340,358 L340,380 Q340,390 330,390 L200,384 L70,390 Q60,390 60,380 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Book spine center crease -->
  <line x1="200" y1="340" x2="200" y2="390" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Left page lines (text) -->
  <line x1="80" y1="352" x2="188" y2="348" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <line x1="80" y1="360" x2="188" y2="356" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <line x1="80" y1="368" x2="188" y2="364" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <line x1="80" y1="376" x2="160" y2="373" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <!-- Right page small illustration: castle -->
  <rect x="235" y="356" width="28" height="24" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="231" y="350" width="8" height="12" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="257" y="350" width="8" height="12" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M231,350 L232,344 L235,350" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M261,350 L262,344 L265,350" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="212" y1="356" x2="312" y2="352" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <line x1="212" y1="376" x2="312" y2="380" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>

  <!-- Story bubbles floating out of book -->
  <!-- Bubble 1 (left, star scene) -->
  <ellipse cx="90" cy="270" rx="52" ry="40" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Bubble tail toward book -->
  <path d="M80,308 Q75,330 100,342" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Scene inside bubble 1: night sky with star -->
  <path d="M70,270 L72,262 L74,270 L82,270 L76,276 L78,284 L72,278 L66,284 L68,276 L62,270 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="110" cy="268" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M102,276 Q108,285 116,276" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="100" cy="252" r="2" fill="#2a2a2a"/>
  <circle cx="120" cy="248" r="1.5" fill="#2a2a2a"/>
  <circle cx="130" cy="258" r="2" fill="#2a2a2a"/>

  <!-- Bubble 2 (right, dragon scene) -->
  <ellipse cx="300" cy="255" rx="52" ry="40" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Bubble tail -->
  <path d="M306,294 Q310,320 290,342" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Scene inside bubble 2: cute dragon -->
  <!-- Dragon body -->
  <ellipse cx="298" cy="260" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Dragon head -->
  <circle cx="316" cy="248" r="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Dragon eye -->
  <circle cx="320" cy="246" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="321" cy="246" r="1.2" fill="#2a2a2a"/>
  <!-- Dragon wing -->
  <path d="M290,252 Q278,238 275,248 Q278,258 290,255" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Dragon tail -->
  <path d="M278,265 Q265,272 268,280 Q275,274 278,268" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Fire breath dots -->
  <circle cx="327" cy="244" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="334" cy="240" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="341" cy="236" r="3" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Quill/pen -->
  <line x1="218" y1="300" x2="248" y2="348" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feather shape -->
  <path d="M218,300 Q205,282 212,270 Q220,260 230,272 Q240,282 228,300" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Feather details -->
  <path d="M218,300 Q214,286 216,278" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M223,295 Q221,283 222,275" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>

  <!-- Cat body (sitting at desk) -->
  <ellipse cx="195" cy="312" rx="44" ry="48" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right arm holding quill -->
  <path d="M235,300 Q248,285 248,268" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="248" cy="264" rx="10" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Left arm on book/desk -->
  <path d="M155,308 Q132,322 118,340" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="114" cy="344" rx="14" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Feet -->
  <ellipse cx="175" cy="362" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="215" cy="364" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail -->
  <path d="M238,332 Q272,348 270,330 Q268,314 252,308 Q240,303 244,293" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="195" cy="234" r="50" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ears -->
  <polygon points="152,204 143,170 174,196" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="155,201 149,182 170,196" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <polygon points="238,204 247,170 216,196" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="235,201 241,182 220,196" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="195" cy="193" rx="36" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M159,193 Q162,164 195,162 Q228,164 231,193" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="210" cy="164" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes (wide, imaginative, slightly upward looking) -->
  <ellipse cx="180" cy="232" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="180" cy="230" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M180,227 L181.5,230 L185,230 L182,232 L183,236 L180,233 L177,236 L178,232 L175,230 L178.5,230 Z" fill="#2a2a2a"/>
  <ellipse cx="210" cy="232" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="210" cy="230" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M210,227 L211.5,230 L215,230 L212,232 L213,236 L210,233 L207,236 L208,232 L205,230 L208.5,230 Z" fill="#2a2a2a"/>

  <!-- Muzzle (small smile, focused) -->
  <ellipse cx="195" cy="250" rx="17" ry="11" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M195,244 Q191,240 188,244 Q185,248 191,250 Q195,253 195,253 Q195,253 199,250 Q205,248 202,244 Q199,240 195,244 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M191,253 Q195,258 199,253" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="210" y1="248" x2="248" y2="241" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="210" y1="252" x2="249" y2="252" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="210" y1="256" x2="247" y2="263" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="180" y1="248" x2="142" y2="241" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="180" y1="252" x2="141" y2="252" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="180" y1="256" x2="143" y2="263" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <text x="200" y="482" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">소리가 만드는 이야기의</tspan>
    <tspan x="200" dy="18">제목을 지어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
