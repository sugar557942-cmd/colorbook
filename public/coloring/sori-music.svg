  <polygon points="245,276 254,242 222,266" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="242,273 248,254 227,267" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

