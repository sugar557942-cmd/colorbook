<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">느루의 천천히 걸어가기</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Sun -->
  <circle cx="325" cy="105" r="28" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="325" y1="68" x2="325" y2="78" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="325" y1="132" x2="325" y2="142" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="288" y1="105" x2="298" y2="105" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="352" y1="105" x2="362" y2="105" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="299" y1="79" x2="306" y2="86" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="344" y1="124" x2="351" y2="131" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="351" y1="79" x2="344" y2="86" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="306" y1="124" x2="299" y2="131" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Clouds -->
  <ellipse cx="85" cy="95" rx="26" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="104" cy="87" rx="19" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="67" cy="90" rx="17" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Winding path ground area -->
  <path d="M30,430 Q90,400 150,415 Q220,432 280,405 Q325,385 370,398 L370,465 Q325,455 280,468 Q220,480 150,462 Q90,450 30,465 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Path dotted center line -->
  <path d="M38,447 Q100,425 158,440 Q228,456 285,432 Q328,416 368,426" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="6,5"/>

