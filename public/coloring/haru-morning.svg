<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">하루의 맑은 아침</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Rising sun on horizon -->
  <line x1="30" y1="380" x2="372" y2="380" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M200,380 Q200,340 200,320" fill="none" stroke="none"/>
  <!-- Sun (half circle on horizon) -->
  <path d="M140,380 Q140,320 200,320 Q260,320 260,380Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Sun rays -->
  <line x1="200" y1="316" x2="200" y2="300" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="240" y1="326" x2="252" y2="314" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="260" y1="355" x2="276" y2="350" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="160" y1="326" x2="148" y2="314" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="140" y1="355" x2="124" y2="350" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="225" y1="320" x2="232" y2="306" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="175" y1="320" x2="168" y2="306" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Clouds -->
  <ellipse cx="80" cy="150" rx="35" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="102" cy="138" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="60" cy="143" rx="18" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="305" cy="145" rx="38" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="328" cy="132" rx="24" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="282" cy="140" rx="20" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Birds (V shapes flying) -->
  <path d="M130,200 Q136,194 142,200" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M150,190 Q156,184 162,190" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M265,195 Q271,189 277,195" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M280,205 Q286,199 292,205" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M295,193 Q301,187 307,193" fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rabbit stretching arms (morning stretch) -->
  <!-- Left ear -->
  <ellipse cx="174" cy="228" rx="18" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="174" cy="230" rx="10" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear -->
  <ellipse cx="226" cy="228" rx="18" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="226" cy="230" rx="10" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="278" r="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (one open wide, one mid-open - just waking up) -->
  <circle cx="183" cy="270" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="185" cy="272" r="4" fill="#2a2a2a"/>
  <!-- Other eye half-squint (sleepy) -->
  <path d="M207,270 Q217,264 222,270" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M207,273 Q217,270 222,273" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Nose + yawning mouth -->
  <ellipse cx="200" cy="288" rx="6" ry="4.5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M188,295 Q200,310 212,295" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- ZZZ departing (just woke up) -->
  <text x="228" y="262" font-family="Arial" font-size="12" fill="#2a2a2a" font-weight="bold">z</text>
  <text x="238" y="252" font-family="Arial" font-size="14" fill="#2a2a2a" font-weight="bold">z</text>
  <text x="250" y="240" font-family="Arial" font-size="16" fill="#2a2a2a" font-weight="bold">z</text>
  <!-- Body -->
  <ellipse cx="200" cy="372" rx="52" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Arms stretching up and out -->
  <path d="M150,348 Q120,318 118,295" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="114" cy="287" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-50,114,287)"/>
  <path d="M250,348 Q280,318 282,295" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="286" cy="287" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(50,286,287)"/>
  <!-- Legs -->
  <ellipse cx="177" cy="416" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="223" cy="416" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Tail -->
  <circle cx="248" cy="365" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">아침에 제일 먼저 무엇을 하고 싶나요?</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
