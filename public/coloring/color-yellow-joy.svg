  <g transform="rotate(180,62,345)"><ellipse cx="62" cy="312" rx="10" ry="18" class="colorable" id="sm-p-l180"/></g>
  <g transform="rotate(240,62,345)"><ellipse cx="62" cy="312" rx="10" ry="18" class="colorable" id="sm-p-l240"/></g>
  <g transform="rotate(300,62,345)"><ellipse cx="62" cy="312" rx="10" ry="18" class="colorable" id="sm-p-l300"/></g>

  <!-- 오른쪽 작은 꽃 -->
