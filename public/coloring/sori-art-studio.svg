  <polygon points="245,266 254,232 222,256" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linejoin="round"/>
  <polygon points="242,263 248,244 227,257" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Beret -->
  <ellipse cx="200" cy="256" rx="38" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M162,256 Q165,226 200,224 Q235,226 238,256" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="214" cy="228" r="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Eyes -->
  <ellipse cx="183" cy="296" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="183" cy="297" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M183,294 L184,297 L187,297 L185,299 L186,302 L183,300 L180,302 L181,299 L179,297 L182,297 Z" fill="#2a2a2a"/>
  <ellipse cx="217" cy="296" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
