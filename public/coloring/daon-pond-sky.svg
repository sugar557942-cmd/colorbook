<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- White background -->
  <rect width="400" height="560" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">연못가에서 하늘 보는 다온이</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === SKY AREA (top section) === -->
  <!-- Clouds (large outlines for coloring) -->
  <!-- Cloud 1 left -->
  <ellipse cx="95" cy="108" rx="38" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="68" cy="118" rx="24" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="122" cy="116" rx="22" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Cloud 2 right -->
  <ellipse cx="300" cy="95" rx="42" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="272" cy="106" rx="26" ry="19" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="330" cy="104" rx="24" ry="17" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Cloud 3 center-top small -->
  <ellipse cx="200" cy="82" rx="28" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="183" cy="88" rx="16" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="217" cy="88" rx="16" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- === DRAGONFLY === -->
  <!-- Body -->
  <ellipse cx="310" cy="200" rx="5" ry="18" transform="rotate(-30,310,200)" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Head -->
  <circle cx="302" cy="190" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Wings -->
  <ellipse cx="292" cy="196" rx="18" ry="8" transform="rotate(-20,292,196)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="314" cy="194" rx="16" ry="7" transform="rotate(15,314,194)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="296" cy="204" rx="16" ry="7" transform="rotate(-25,296,204)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="316" cy="202" rx="14" ry="6" transform="rotate(10,316,202)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Dragonfly eyes -->
  <circle cx="300" cy="188" r="2.5" fill="#2a2a2a"/>
  <circle cx="304" cy="188" r="2.5" fill="#2a2a2a"/>

  <!-- === GRASSY BANK === -->
  <!-- Grass mounds -->
  <path d="M24,400 Q60,380 100,392 Q140,404 180,388 Q220,372 260,388 Q300,404 340,392 Q370,384 376,400 L376,460 L24,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Grass blades -->
  <path d="M50,390 L46,375 L52,388" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M62,386 L60,370 L66,384" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M120,385 L118,370 L124,382" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M340,386 L338,371 L344,384" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M356,390 L354,375 L360,388" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === POND (bottom) === -->
  <!-- Pond wavy edge -->
  <path d="M24,432 Q60,420 100,430 Q140,440 180,428 Q220,416 260,428 Q300,440 340,430 Q365,424 376,432 L376,460 L24,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ripple rings in pond -->
  <ellipse cx="120" cy="448" rx="18" ry="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="120" cy="448" rx="10" ry="3.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="280" cy="446" rx="16" ry="5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="280" cy="446" rx="9" ry="3" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- === BEAR LYING ON BACK === -->
  <!-- Body (lying down horizontally) -->
  <ellipse cx="200" cy="340" rx="90" ry="50" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly -->
  <ellipse cx="200" cy="340" rx="55" ry="30" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Head (to the right, tilted back looking up) -->
  <!-- Right ear outer -->
  <circle cx="304" cy="326" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="302" cy="328" r="10" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Left ear outer -->
  <circle cx="296" cy="296" r="18" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="294" cy="298" r="10" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="284" cy="318" r="46" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes looking up (tilted) -->
  <circle cx="276" cy="306" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="276" cy="304" r="2.8" fill="#2a2a2a"/>
  <circle cx="295" cy="304" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="295" cy="302" r="2.8" fill="#2a2a2a"/>
  <!-- Relaxed smile -->
  <path d="M273,322 Q284,332 295,322" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="284" cy="318" rx="20" ry="15" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Nose -->
  <ellipse cx="284" cy="312" rx="6" ry="4" fill="#2a2a2a"/>

  <!-- Arms behind head -->
  <path d="M200,298 Q220,278 252,282 Q270,285 276,296" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left arm/paw behind head (left side) -->
  <path d="M110,340 Q95,310 108,290 Q118,278 140,290" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="140" cy="294" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Legs stretched out -->
  <!-- Left leg -->
  <ellipse cx="130" cy="360" rx="24" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="110" cy="372" rx="20" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Right leg -->
  <ellipse cx="165" cy="375" rx="24" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="148" cy="388" rx="20" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Activity prompt -->
  <text x="200" y="478" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">하늘에 어떤 구름이 떠 있나요?</tspan>
    <tspan x="200" dy="18">구름에 그림을 그려 보세요.</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
