<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 책장 배경 -->
  <rect x="20" y="50" width="80" height="360" rx="6" class="colorable" id="shelf-l"/>
  <rect x="300" y="50" width="80" height="360" rx="6" class="colorable" id="shelf-r"/>
  <!-- 책장 선반 -->
  <rect x="20" y="168" width="80" height="10" rx="3" class="colorable" id="shelf-bar-l1"/>
  <rect x="20" y="285" width="80" height="10" rx="3" class="colorable" id="shelf-bar-l2"/>
  <rect x="300" y="168" width="80" height="10" rx="3" class="colorable" id="shelf-bar-r1"/>
  <rect x="300" y="285" width="80" height="10" rx="3" class="colorable" id="shelf-bar-r2"/>

  <!-- 책들 (왼쪽 선반) -->
  <rect x="28" y="80" width="16" height="82" rx="3" class="colorable" id="book-l1"/>
  <rect x="46" y="90" width="14" height="72" rx="3" class="colorable" id="book-l2"/>
  <rect x="62" y="75" width="18" height="87" rx="3" class="colorable" id="book-l3"/>
  <rect x="28" y="198" width="15" height="80" rx="3" class="colorable" id="book-l4"/>
  <rect x="45" y="205" width="18" height="73" rx="3" class="colorable" id="book-l5"/>
  <rect x="65" y="192" width="14" height="86" rx="3" class="colorable" id="book-l6"/>

  <!-- 책들 (오른쪽 선반) -->
  <rect x="308" y="82" width="16" height="80" rx="3" class="colorable" id="book-r1"/>
  <rect x="326" y="72" width="18" height="90" rx="3" class="colorable" id="book-r2"/>
  <rect x="346" y="88" width="15" height="74" rx="3" class="colorable" id="book-r3"/>
  <rect x="308" y="200" width="18" height="78" rx="3" class="colorable" id="book-r4"/>
  <rect x="328" y="195" width="15" height="83" rx="3" class="colorable" id="book-r5"/>
  <rect x="345" y="205" width="16" height="73" rx="3" class="colorable" id="book-r6"/>

  <!-- 지우 몸통 (부엉이) -->
  <ellipse cx="200" cy="368" rx="68" ry="78" class="colorable" id="body"/>
  <!-- 배 깃털 패턴 -->
  <ellipse cx="200" cy="372" rx="42" ry="55" class="colorable" id="belly"/>
  <path d="M175 345 Q200 355 225 345" class="outline" stroke-width="1.5"/>
  <path d="M170 362 Q200 372 230 362" class="outline" stroke-width="1.5"/>
  <path d="M172 378 Q200 388 228 378" class="outline" stroke-width="1.5"/>

  <!-- 날개 -->
  <ellipse cx="128" cy="370" rx="30" ry="55" transform="rotate(12 128 370)" class="colorable" id="wing-l"/>
  <ellipse cx="272" cy="370" rx="30" ry="55" transform="rotate(-12 272 370)" class="colorable" id="wing-r"/>

  <!-- 발 -->
  <ellipse cx="178" cy="446" rx="28" ry="15" class="colorable" id="foot-l"/>
  <ellipse cx="222" cy="446" rx="28" ry="15" class="colorable" id="foot-r"/>
  <!-- 발톱 -->
  <line x1="162" y1="452" x2="155" y2="462" class="outline" stroke-width="2"/>
  <line x1="178" y1="455" x2="178" y2="466" class="outline" stroke-width="2"/>
  <line x1="194" y1="452" x2="200" y2="462" class="outline" stroke-width="2"/>
  <line x1="206" y1="452" x2="200" y2="462" class="outline" stroke-width="2"/>
  <line x1="222" y1="455" x2="222" y2="466" class="outline" stroke-width="2"/>
  <line x1="238" y1="452" x2="245" y2="462" class="outline" stroke-width="2"/>

  <!-- 머리 -->
  <circle cx="200" cy="248" r="80" class="colorable" id="head"/>
  <!-- 귀 뿔 (부엉이) -->
  <polygon points="165,185 155,148 185,178" class="colorable" id="tuft-l"/>
  <polygon points="235,185 245,148 215,178" class="colorable" id="tuft-r"/>

  <!-- 안면 디스크 (부엉이 특징) -->
  <ellipse cx="200" cy="255" rx="65" ry="60" class="colorable" id="face-disc"/>

  <!-- 큰 눈 (부엉이) -->
  <circle cx="178" cy="248" r="22" class="colorable" id="eye-l-outer"/>
  <circle cx="178" cy="248" r="15" class="colorable" id="eye-l-inner"/>
  <circle cx="178" cy="248" r="8" class="fixed"/>
  <circle cx="174" cy="244" r="3" fill="white"/>
  <circle cx="222" cy="248" r="22" class="colorable" id="eye-r-outer"/>
  <circle cx="222" cy="248" r="15" class="colorable" id="eye-r-inner"/>
  <circle cx="222" cy="248" r="8" class="fixed"/>
  <circle cx="218" cy="244" r="3" fill="white"/>

  <!-- 부리 -->
  <polygon points="200,262 192,278 208,278" class="colorable" id="beak"/>

  <!-- 안경 (독서용) -->
  <circle cx="178" cy="248" r="25" class="outline" stroke-width="2"/>
  <circle cx="222" cy="248" r="25" class="outline" stroke-width="2"/>
  <line x1="203" y1="248" x2="197" y2="248" class="outline" stroke-width="2"/>
  <path d="M153 245 Q142 238 138 242" class="outline" stroke-width="2"/>
  <path d="M247 245 Q258 238 262 242" class="outline" stroke-width="2"/>

  <!-- 든 책 -->
  <rect x="118" y="330" width="62" height="80" rx="5" class="colorable" id="open-book-l"/>
  <rect x="220" y="330" width="62" height="80" rx="5" class="colorable" id="open-book-r"/>
  <line x1="200" y1="328" x2="200" y2="412" class="outline" stroke-width="3"/>
  <!-- 책 줄 -->
  <line x1="124" y1="348" x2="175" y2="348" class="outline" stroke-width="1.2"/>
  <line x1="124" y1="358" x2="175" y2="358" class="outline" stroke-width="1.2"/>
  <line x1="124" y1="368" x2="175" y2="368" class="outline" stroke-width="1.2"/>
  <line x1="225" y1="348" x2="276" y2="348" class="outline" stroke-width="1.2"/>
  <line x1="225" y1="358" x2="276" y2="358" class="outline" stroke-width="1.2"/>
  <line x1="225" y1="368" x2="276" y2="368" class="outline" stroke-width="1.2"/>

  <!-- 별 장식 -->
  <path d="M355 310 L357 303 L359 310 L366 312 L359 314 L357 321 L355 314 L348 312 Z" class="colorable" id="star-r"/>
  <path d="M45 310 L47 303 L49 310 L56 312 L49 314 L47 321 L45 314 L38 312 Z" class="colorable" id="star-l"/>

  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#9B8ED6" font-weight="bold">지우의 도서관 🦉</text>
</svg>
