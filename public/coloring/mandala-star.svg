  <text x="200" y="435" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9E9E9E">별처럼 반짝이는 내 모습을 색칠해요</text>
  <text x="200" y="458" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#9B8ED6" font-weight="bold">별 만다라 ⭐</text>
