  <circle cx="216" cy="260" r="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="177" cy="261" r="7" fill="#2a2a2a"/>
  <circle cx="217" cy="261" r="7" fill="#2a2a2a"/>
  <circle cx="180" cy="257" r="2.5" fill="white"/>
  <circle cx="220" cy="257" r="2.5" fill="white"/>
