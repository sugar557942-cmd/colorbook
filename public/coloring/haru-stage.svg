<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">무대 위 하루</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Stage curtains -->
  <!-- Left curtain -->
  <path d="M28,75 Q28,120 45,200 Q55,270 48,360 L28,360 L28,75Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Left curtain swag waves -->
  <path d="M28,75 Q55,100 45,130 Q35,160 60,180 Q80,198 48,220" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M28,130 L48,130" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M28,180 L55,180" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M28,230 L50,230" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Curtain tieback left -->
  <ellipse cx="52" cy="240" rx="12" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Right curtain -->
  <path d="M372,75 Q372,120 355,200 Q345,270 352,360 L372,360 L372,75Z" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <path d="M372,75 Q345,100 355,130 Q365,160 340,180 Q320,198 352,220" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M372,130 L352,130" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M372,180 L345,180" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <path d="M372,230 L350,230" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Curtain tieback right -->
  <ellipse cx="348" cy="240" rx="12" ry="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Stage platform -->
  <rect x="60" y="370" width="280" height="30" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Footlights row -->
  <circle cx="90" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="120" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="150" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="180" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="210" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="240" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="270" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="300" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="330" cy="378" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Spotlight beam from top -->
  <path d="M200,78 L130,370 L270,370Z" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Rabbit (하루) center stage -->
  <!-- Left ear -->
  <ellipse cx="174" cy="198" rx="18" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="174" cy="200" rx="10" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear -->
  <ellipse cx="226" cy="198" rx="18" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="226" cy="200" rx="10" ry="36" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="248" r="50" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Eyes (bright stars) -->
  <circle cx="183" cy="238" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="217" cy="238" r="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="185" cy="240" r="4.5" fill="#2a2a2a"/>
  <circle cx="219" cy="240" r="4.5" fill="#2a2a2a"/>
  <circle cx="182" cy="237" r="2" fill="white"/>
  <circle cx="216" cy="237" r="2" fill="white"/>
  <!-- Star shine in eyes -->
  <line x1="183" y1="228" x2="183" y2="222" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="178" y1="233" x2="172" y2="233" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Nose + big smile -->
  <ellipse cx="200" cy="258" rx="6" ry="4.5" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M188,263 Q200,278 212,263" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Body (bow/performance pose) -->
  <ellipse cx="200" cy="340" rx="52" ry="35" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- One arm out to side -->
  <path d="M150,330 Q120,322 108,330" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="100" cy="333" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Other arm up -->
  <path d="M250,328 Q275,308 278,290" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="280" cy="284" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,280,284)"/>
  <!-- Legs -->
  <ellipse cx="178" cy="370" rx="22" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="222" cy="370" rx="22" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Tail -->
  <circle cx="248" cy="335" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Stars above -->
  <polygon points="90,110 96,128 115,128 100,140 106,158 90,147 74,158 80,140 65,128 84,128" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="310,105 315,120 331,120 318,129 323,144 310,135 297,144 302,129 289,120 305,120" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="200,82 203,92 214,92 206,98 209,108 200,103 191,108 194,98 186,92 197,92" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">무대 위 하루 뒤로 어떤 배경이 펼쳐질까요?</text>
  <text x="200" y="494" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">그려 보세요.</text>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
