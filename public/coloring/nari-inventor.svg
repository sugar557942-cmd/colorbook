<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">발명가 나리</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- TAIL (behind body, right side) -->
  <path d="M240 355 Q295 330 300 285 Q305 248 272 238 Q252 232 248 255 Q265 262 262 290 Q258 318 232 335 Q220 342 222 358 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M232 335 Q242 345 237 357" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M247 328 Q258 340 251 354" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- BODY with apron -->
  <ellipse cx="200" cy="320" rx="45" ry="60" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Apron bib -->
  <rect x="182" y="272" width="36" height="44" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Apron skirt -->
  <path d="M163 312 Q160 350 165 375 Q200 385 235 375 Q240 350 237 312 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Apron pocket -->
  <rect x="185" y="338" width="30" height="22" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Pencil in pocket -->
  <line x1="200" y1="338" x2="200" y2="328" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Apron neck strings -->
  <path d="M182 272 Q172 260 168 250" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M218 272 Q228 260 232 250" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- LEGS -->
  <ellipse cx="183" cy="382" rx="17" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="217" cy="382" rx="17" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="181" cy="393" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="219" cy="393" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>

  <!-- LEFT ARM (down, holding wrench) -->
  <path d="M163 295 Q145 305 136 325 Q133 335 137 342" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="138" cy="347" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- RIGHT ARM (up, raised triumphantly) -->
  <path d="M237 290 Q255 275 262 258 Q266 250 261 244" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="259" cy="241" rx="10" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- WRENCH (in left hand) -->
  <g transform="translate(120,345) rotate(-35)">
    <rect x="-4" y="-2" width="9" height="30" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <path d="M-8,-2 Q-4,-12 4,-10 Q6,-6 4,-2Z" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-6" y="27" width="13" height="6" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  </g>

  <!-- NECK -->
  <rect x="192" y="215" width="16" height="18" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- HEAD -->
  <ellipse cx="200" cy="188" rx="44" ry="40" fill="white" stroke="#2a2a2a" stroke-width="3"/>

  <!-- EARS -->
  <path d="M166 170 L155 128 L190 155Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M170 167 L162 133 L186 157Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M234 170 L245 128 L210 155Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M230 167 L238 133 L214 157Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- GOGGLES on forehead -->
  <rect x="172" y="158" width="22" height="15" rx="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="206" y="158" width="22" height="15" rx="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="194" y1="165" x2="206" y2="165" stroke="#2a2a2a" stroke-width="2.2"/>
  <path d="M172 165 Q164 165 161 170" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M228 165 Q236 165 239 170" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

  <!-- EYES (satisfied, slightly squinted) -->
  <path d="M176 187 Q184 180 192 187" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="184" cy="188" rx="8" ry="6" fill="white" stroke="#2a2a2a" stroke-width="0"/>
  <path d="M208 187 Q216 180 224 187" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="216" cy="188" rx="8" ry="6" fill="white" stroke="#2a2a2a" stroke-width="0"/>
  <!-- Eye pupils -->
  <circle cx="184" cy="190" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="183" cy="189" r="1.5" fill="#2a2a2a"/>
  <circle cx="216" cy="190" r="3.5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="215" cy="189" r="1.5" fill="#2a2a2a"/>

  <!-- MUZZLE -->
  <ellipse cx="200" cy="205" rx="24" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Nose triangle -->
  <polygon points="200,198 195,205 205,205" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Smile -->
  <path d="M191 210 Q200 218 209 210" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="177" cy="204" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="223" cy="204" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- FLOATING GEARS -->
  <!-- Large gear top-left -->
  <g transform="translate(68,112)">
    <circle cx="0" cy="0" r="24" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
    <circle cx="0" cy="0" r="13" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-4" y="-28" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-4" y="20" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-28" y="-4" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="20" y="-4" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="-22" y="-22" width="8" height="8" rx="2" transform="rotate(45)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <rect x="14" y="-22" width="8" height="8" rx="2" transform="rotate(45)" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  </g>
  <!-- Small gear top-right -->
  <g transform="translate(332,105)">
    <circle cx="0" cy="0" r="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <circle cx="0" cy="0" r="9" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="-22" width="6" height="7" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="15" width="6" height="7" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-22" y="-3" width="7" height="6" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="15" y="-3" width="7" height="6" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  </g>
  <!-- Tiny gear lower-left -->
  <g transform="translate(75,435)">
    <circle cx="0" cy="0" r="15" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="-19" width="6" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-3" y="13" width="6" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="-19" y="-3" width="6" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="13" y="-3" width="6" height="6" rx="1" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  </g>
  <!-- Bolt hexagon -->
  <polygon points="325,80 334,85 334,95 325,100 316,95 316,85" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="325" cy="90" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Sparkle near wrench area -->
  <path d="M105,362 L108,355 L111,362 L118,365 L111,368 L108,375 L105,368 L98,365 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Activity prompt -->
  <text x="200" y="478" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">나리의 발명품에 이름을 붙여주세요.</tspan>
    <tspan x="200" dy="18">어떤 쓸모가 있나요?</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
