  <line x1="206" y1="419" x2="270" y2="423" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="206" y1="426" x2="270" y2="430" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="206" y1="433" x2="270" y2="437" stroke="#2a2a2a" stroke-width="1.2"/>

