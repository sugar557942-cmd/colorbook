  <path d="M162,368 Q145,360 132,352" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="127" cy="350" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

