  <path d="M30,195 L31,189 L32,195 L38,195 L34,199 L35,205 L31,201 L27,205 L28,199 L24,195 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M365,300 L366,294 L367,300 L373,300 L369,304 L370,310 L366,306 L362,310 L363,304 L359,300 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
