  <circle cx="312" cy="118" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="334" cy="110" r="3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === GRASSY GROUND === -->
  <path d="M24,420 Q100,408 200,412 Q300,416 376,408 L376,460 L24,460 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ground details/texture -->
