  <ellipse cx="206" cy="406" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="230" cy="408" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>

