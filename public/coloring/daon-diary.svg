<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <!-- White background -->
  <rect width="400" height="560" fill="white"/>
  <!-- Outer border -->
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">일기 쓰는 다온이</text>
  <!-- Dashed divider -->
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- === BOOKSHELF (background) === -->
  <!-- Shelf board top -->
  <rect x="50" y="88" width="300" height="12" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Book 1 (tall) -->
  <rect x="62" y="100" width="22" height="60" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Book 2 (shorter) -->
  <rect x="86" y="112" width="18" height="48" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Book 3 (medium, leaning slightly) -->
  <rect x="106" y="106" width="20" height="54" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Book 4 (tall, spine line) -->
  <rect x="128" y="98" width="24" height="62" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="140" y1="100" x2="140" y2="158" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Book 5 -->
  <rect x="154" y="110" width="18" height="50" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Shelf board bottom -->
  <rect x="50" y="158" width="300" height="10" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small plant/pot on shelf -->
  <rect x="296" y="136" width="28" height="22" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M310,136 Q304,120 308,110" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M310,136 Q316,118 312,108" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="310" cy="107" rx="8" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Vertical shelf divider -->
  <line x1="282" y1="88" x2="282" y2="168" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- === LAMP === -->
  <!-- Lamp base -->
  <ellipse cx="315" cy="355" rx="20" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lamp pole -->
  <rect x="312" y="270" width="6" height="85" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lamp arm curve -->
  <path d="M315,270 Q315,245 288,240" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Lamp shade -->
  <path d="M268,240 L276,262 L300,262 L308,240 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Light glow rays (dashed) -->
  <line x1="284" y1="264" x2="275" y2="278" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
  <line x1="288" y1="265" x2="284" y2="282" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>
  <line x1="293" y1="264" x2="295" y2="280" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,2" stroke-linecap="round"/>

  <!-- === DIARY/BOOK (open) === -->
  <!-- Left page -->
  <path d="M88,268 L88,378 Q88,386 96,386 L196,386 L196,268 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left page lines -->
  <line x1="100" y1="290" x2="186" y2="290" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="100" y1="306" x2="186" y2="306" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="100" y1="322" x2="186" y2="322" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="100" y1="338" x2="186" y2="338" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="100" y1="354" x2="186" y2="354" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="100" y1="370" x2="186" y2="370" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Right page -->
  <path d="M204,268 L204,386 L296,386 Q304,386 304,378 L304,268 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right page lines -->
  <line x1="214" y1="290" x2="294" y2="290" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="214" y1="306" x2="294" y2="306" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="214" y1="322" x2="294" y2="322" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="214" y1="338" x2="294" y2="338" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="214" y1="354" x2="294" y2="354" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="214" y1="370" x2="294" y2="370" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Spine/binding -->
  <rect x="194" y="268" width="12" height="118" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Diary clasp/star deco -->
  <circle cx="196" cy="280" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === PENCIL in right paw === -->
  <rect x="81" y="252" width="8" height="40" rx="2" transform="rotate(40,85,272)" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pencil tip -->
  <path d="M97,258 L104,248 L108,262 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Pencil eraser end -->
  <rect x="70" y="282" width="8" height="6" rx="1" transform="rotate(40,74,285)" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- === BEAR SEATED CROSS-LEGGED === -->
  <!-- Left ear outer -->
  <circle cx="155" cy="198" r="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="158" cy="201" r="11" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Right ear outer -->
  <circle cx="245" cy="198" r="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="242" cy="201" r="11" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="200" cy="244" r="56" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes (looking slightly down at book) -->
  <circle cx="182" cy="238" r="7" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="184" cy="240" r="3" fill="#2a2a2a"/>
  <circle cx="218" cy="238" r="7" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="220" cy="240" r="3" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="200" cy="258" rx="24" ry="17" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Nose -->
  <ellipse cx="200" cy="251" rx="7" ry="5" fill="#2a2a2a"/>
  <!-- Concentrating mouth -->
  <path d="M191,265 Q200,272 209,265" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Body (compact seated) -->
  <ellipse cx="200" cy="348" rx="65" ry="55" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly -->
  <ellipse cx="200" cy="352" rx="38" ry="34" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Right arm holding pencil area -->
  <path d="M140,308 Q112,316 100,285" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left arm holding book left side -->
  <path d="M260,308 Q278,316 290,296" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cross-legged lower body -->
  <path d="M142,388 Q156,406 200,408 Q244,406 258,388" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left leg -->
  <ellipse cx="155" cy="400" rx="30" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right leg -->
  <ellipse cx="245" cy="400" rx="30" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Activity prompt -->
  <text x="200" y="478" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">다온이의 일기장에 오늘</tspan>
    <tspan x="200" dy="18">나의 감정을 써 보세요.</tspan>
  </text>
  <!-- Footer -->
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
