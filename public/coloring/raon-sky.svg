  <path d="M125 280 Q92 252 72 265" class="outline" stroke-width="1.5"/>
  <path d="M125 292 Q88 268 65 278" class="outline" stroke-width="1.5"/>
  <path d="M125 303 Q90 288 58 296" class="outline" stroke-width="1.5"/>

