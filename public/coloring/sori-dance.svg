  <ellipse cx="290" cy="306" rx="12" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Left leg kicked out forward -->
  <path d="M180,395 Q160,420 145,440" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="138" cy="444" rx="16" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Right foot planted -->
  <ellipse cx="228" cy="448" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- Tail swirling dramatically -->
  <path d="M242,370 Q290,358 300,336 Q310,314 286,306 Q268,300 272,284" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Tail tip curl -->
  <path d="M272,284 Q278,270 270,264 Q262,258 258,268" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Head (big joyful smile, tilted) -->
