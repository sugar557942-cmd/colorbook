  <circle cx="216" cy="228" r="6" class="colorable" id="seed2"/>
  <circle cx="220" cy="246" r="6" class="colorable" id="seed3"/>
  <circle cx="210" cy="260" r="6" class="colorable" id="seed4"/>
  <circle cx="194" cy="262" r="6" class="colorable" id="seed5"/>
