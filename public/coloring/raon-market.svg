  <path d="M40,75 Q100,88 160,80 Q220,88 280,80 Q330,88 375,78" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lantern 1 -->
  <line x1="75" y1="80" x2="75" y2="86" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <rect x="69" y="86" width="12" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="75" y1="104" x2="75" y2="108" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lantern 2 -->
  <line x1="130" y1="82" x2="130" y2="88" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <rect x="124" y="88" width="12" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="130" y1="106" x2="130" y2="110" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lantern 3 -->
  <line x1="190" y1="83" x2="190" y2="89" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <ellipse cx="190" cy="99" rx="8" ry="13" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="186" y1="88" x2="194" y2="88" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="186" y1="110" x2="194" y2="110" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="190" y1="112" x2="190" y2="116" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lantern 4 -->
  <line x1="250" y1="82" x2="250" y2="88" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <rect x="244" y="88" width="12" height="18" rx="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="250" y1="106" x2="250" y2="110" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Lantern 5 -->
  <line x1="315" y1="81" x2="315" y2="87" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <ellipse cx="315" cy="97" rx="8" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="311" y1="87" x2="319" y2="87" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="311" y1="107" x2="319" y2="107" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="315" y1="109" x2="315" y2="113" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

