<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">하늘을 나는 라온</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- SUN top-left -->
  <circle cx="65" cy="105" r="24" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="65" y1="75" x2="65" y2="68" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="88" x2="94" y2="83" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="95" y1="105" x2="102" y2="105" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="122" x2="94" y2="127" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="65" y1="129" x2="65" y2="136" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="122" x2="36" y2="127" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="105" x2="28" y2="105" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="41" y1="88" x2="36" y2="83" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- CLOUDS -->
  <ellipse cx="290" cy="105" rx="42" ry="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="320" cy="93" rx="30" ry="17" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="268" cy="100" rx="26" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <ellipse cx="85" cy="175" rx="35" ry="16" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="112" cy="165" rx="24" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="64" cy="170" rx="21" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <ellipse cx="330" cy="220" rx="32" ry="15" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="354" cy="210" rx="22" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="310" cy="215" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <ellipse cx="70" cy="280" rx="28" ry="13" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="94" cy="270" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="52" cy="276" rx="18" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>

  <!-- WIND LINES -->
  <path d="M30,230 Q60,225 90,232" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4" stroke-linecap="round"/>
  <path d="M30,248 Q55,242 80,249" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4" stroke-linecap="round"/>
  <path d="M310,300 Q340,294 365,300" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4" stroke-linecap="round"/>
  <path d="M315,316 Q345,310 365,316" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4" stroke-linecap="round"/>

  <!-- DISTANT ROLLING HILLS -->
  <path d="M28,390 Q60,340 100,360 Q140,380 180,345 Q220,310 260,350 Q300,375 340,345 Q365,330 372,370 L372,450 L28,450 Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Small tree clusters on hills -->
  <line x1="80" y1="358" x2="80" y2="338" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="80" cy="330" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="92" y1="360" x2="92" y2="344" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="92" cy="337" rx="8" ry="10" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="240" y1="350" x2="240" y2="330" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="240" cy="322" rx="10" ry="12" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="252" y1="353" x2="252" y2="337" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <ellipse cx="252" cy="330" rx="8" ry="10" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- ===== SPARROW RAON in full flight, center of page ===== -->
  <!-- LEFT WING spread wide and up -->
  <path d="M162,218 Q130,175 110,168 Q118,188 128,202 Q140,200 162,218" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing feather lines left -->
  <line x1="130" y1="172" x2="148" y2="197" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="118" y1="180" x2="138" y2="203" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="112" y1="190" x2="132" y2="208" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- RIGHT WING spread wide and up -->
  <path d="M238,218 Q270,175 290,168 Q282,188 272,202 Q260,200 238,218" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing feather lines right -->
  <line x1="270" y1="172" x2="252" y2="197" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="282" y1="180" x2="262" y2="203" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="288" y1="190" x2="268" y2="208" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Body (elongated oval in flight) -->
  <ellipse cx="200" cy="228" rx="38" ry="22" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tail fan spread -->
  <path d="M163,228 Q150,245 145,240 Q150,230 163,224" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M162,232 Q148,252 142,248" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M162,220 Q150,236 146,232" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="150" y1="235" x2="145" y2="240" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="152" y1="242" x2="146" y2="248" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="226" cy="211" r="17" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Beak OPEN (joyful) -->
  <path d="M240,207 L250,204 L244,212 Z" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Lower beak open -->
  <path d="M240,210 Q244,214 244,212" fill="white" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Eye wide joyful -->
  <circle cx="232" cy="207" r="6" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <circle cx="233" cy="207" r="3" fill="#2a2a2a"/>
  <circle cx="235" cy="205" r="1.2" fill="white"/>
  <!-- Eyebrow raised happy -->
  <path d="M227,200 Q232,197 236,199" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Small cheek happy lines -->
  <line x1="222" y1="214" x2="218" y2="216" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="223" y1="217" x2="219" y2="220" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Speed/wind lines behind sparrow -->
  <line x1="128" y1="225" x2="115" y2="225" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="126" y1="233" x2="112" y2="235" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="130" y1="217" x2="118" y2="215" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">라온 주변 하늘에 무엇이 보이나요?</tspan>
    <tspan x="200" dy="18">그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
