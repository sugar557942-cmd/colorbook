<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">나리의 뚝딱 작업실</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- PEGBOARD WALL (back) -->
  <rect x="28" y="78" width="340" height="200" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pegboard holes (grid of dots) -->
  <circle cx="50" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="70" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="90" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="110" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="50" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="70" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="90" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="110" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="50" cy="135" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="70" cy="135" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="90" cy="135" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="110" cy="135" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- More dots right side -->
  <circle cx="295" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="315" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="335" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="355" cy="95" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="295" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="315" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="335" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>
  <circle cx="355" cy="115" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- HAMMER outline on pegboard -->
  <g transform="translate(145,120)">
    <rect x="-6" y="0" width="12" height="42" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
    <rect x="-18" y="-22" width="36" height="24" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
    <!-- Outline/shadow hint where tool should hang -->
    <rect x="-20" y="-24" width="40" height="28" rx="5" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- SAW outline on pegboard -->
  <g transform="translate(200,135)">
    <rect x="-5" y="-55" width="10" height="55" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Saw blade -->
    <path d="M5,-55 L45,-55 L45,-45" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Saw teeth -->
    <path d="M5,-45 L10,-52 L15,-45 L20,-52 L25,-45 L30,-52 L35,-45 L40,-52 L45,-45" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linejoin="round"/>
    <!-- Dashed outline -->
    <path d="M-8,-58 L48,-58 L48,-42 L-8,-42 Z" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- SCREWDRIVER outline on pegboard -->
  <g transform="translate(270,120)">
    <rect x="-4" y="-50" width="8" height="50" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Handle -->
    <rect x="-8" y="-65" width="16" height="20" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Tip -->
    <polygon points="-3,0 3,0 1,15 -1,15" fill="white" stroke="#2a2a2a" stroke-width="2"/>
    <rect x="-10" y="-68" width="20" height="86" rx="6" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="3,3"/>
  </g>

  <!-- WORKBENCH -->
  <rect x="28" y="295" width="340" height="20" rx="5" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Bench legs -->
  <rect x="40" y="315" width="16" height="85" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="344" y="315" width="16" height="85" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Cross brace -->
  <line x1="56" y1="370" x2="344" y2="370" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- UNFINISHED PROJECT on bench (wooden birdhouse shape) -->
  <!-- Base board -->
  <rect x="80" y="260" width="90" height="36" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- House walls -->
  <rect x="90" y="225" width="70" height="38" rx="2" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <!-- Roof (incomplete - only one side drawn) -->
  <path d="M88 225 L125 198 L162 225" fill="white" stroke="#2a2a2a" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Door hole -->
  <circle cx="125" cy="244" r="10" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Perch stick -->
  <rect x="121" y="254" width="8" height="10" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Wood grain lines on base -->
  <line x1="82" y1="268" x2="168" y2="268" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="82" y1="278" x2="168" y2="278" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Nails visible -->
  <circle cx="95" cy="263" r="2" fill="#2a2a2a"/>
  <circle cx="155" cy="263" r="2" fill="#2a2a2a"/>

  <!-- WOOD SHAVINGS on floor -->
  <path d="M60 400 Q70 395 80 402 Q75 408 65 405 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M90 408 Q105 402 112 410 Q105 416 95 412 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M130 395 Q142 390 148 398 Q140 404 133 400 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M50 415 Q58 412 64 418 Q58 423 53 419 Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Small wood chips -->
  <path d="M75 420 Q80 418 83 422" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M110 425 Q116 422 120 426" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M140 418 Q145 416 149 420" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === NARI FOX working at bench === -->
  <!-- Tail -->
  <path d="M248 320 Q308 298 312 258 Q315 222 284 215 Q264 210 260 228 Q278 232 275 255 Q270 282 244 300 Q230 310 234 325 Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Body -->
  <ellipse cx="210" cy="350" rx="38" ry="50" fill="white" stroke="#2a2a2a" stroke-width="2.8"/>
  <!-- Tool belt -->
  <rect x="175" y="342" width="70" height="12" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Belt buckle -->
  <rect x="206" y="340" width="10" height="16" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <!-- Tool belt pockets -->
  <rect x="178" y="354" width="16" height="18" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="198" y="358" width="14" height="14" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="216" y="354" width="16" height="18" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Screwdriver in pocket -->
  <line x1="185" y1="354" x2="185" y2="344" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Arms at bench -->
  <path d="M180 320 Q162 308 148 295" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="145" cy="292" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M240 318 Q255 308 263 296" fill="none" stroke="#2a2a2a" stroke-width="2.8" stroke-linecap="round"/>
  <ellipse cx="265" cy="292" rx="11" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- NECK -->
  <rect x="203" y="282" width="14" height="15" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- HEAD -->
  <ellipse cx="210" cy="260" rx="42" ry="38" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Ears -->
  <path d="M177 242 L165 202 L200 228Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M181 240 L172 207 L197 229Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M243 242 L255 202 L220 228Z" fill="white" stroke="#2a2a2a" stroke-width="2.8" stroke-linejoin="round"/>
  <path d="M239 240 L248 207 L223 229Z" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Goggles up on head -->
  <rect x="183" y="234" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="217" y="234" width="20" height="13" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="203" y1="240" x2="217" y2="240" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Eyes (concentrated look) -->
  <ellipse cx="197" cy="258" rx="9" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="197" cy="259" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="197" cy="259" r="2" fill="#2a2a2a"/>
  <ellipse cx="223" cy="258" rx="9" ry="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="223" cy="259" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="223" cy="259" r="2" fill="#2a2a2a"/>
  <!-- Muzzle -->
  <ellipse cx="210" cy="272" rx="22" ry="14" fill="white" stroke="#2a2a2a" stroke-width="2.2"/>
  <ellipse cx="210" cy="266" rx="5" ry="3.5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Tongue out (concentrated) -->
  <path d="M205 276 Q210 282 215 276" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="210" cy="281" rx="5" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>

  <!-- Floor line -->
  <line x1="28" y1="438" x2="368" y2="438" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Activity prompt -->
  <text x="200" y="472" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">작업실 선반에 내가 좋아하는</tspan>
    <tspan x="200" dy="18">도구를 그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
