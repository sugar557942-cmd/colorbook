  <path d="M305,100 L307,93 L309,100 L316,100 L310,105 L312,112 L307,107 L302,112 L304,105 L298,100 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M338,130 L339,125 L340,130 L345,130 L341,134 L342,139 L339,135 L336,139 L337,134 L333,130 Z" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
