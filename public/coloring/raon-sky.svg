  <circle cx="177" cy="212" r="3" fill="white"/>
  <circle cx="220" cy="215" r="14" class="colorable" id="eye-r"/>
  <circle cx="220" cy="215" r="7" class="fixed"/>
  <circle cx="217" cy="212" r="3" fill="white"/>

  <!-- 부리 -->
