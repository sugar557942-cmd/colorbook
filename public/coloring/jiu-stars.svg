<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">지우의 별자리 관측</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Moon (top right) -->
  <path d="M335,80 Q370,105 355,145 Q320,130 320,100 Q320,80 335,80Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Moon craters -->
  <circle cx="338" cy="108" r="6" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="350" cy="128" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Stars scattered various sizes -->
  <!-- 4-point stars -->
  <path d="M55,85 L58,95 L68,95 L60,102 L63,112 L55,106 L47,112 L50,102 L42,95 L52,95Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M160,78 L162,84 L168,84 L163,88 L165,95 L160,91 L155,95 L157,88 L152,84 L158,84Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M290,88 L292,94 L298,94 L293,98 L295,104 L290,100 L285,104 L287,98 L282,94 L288,94Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small sparkle stars -->
  <path d="M38,140 L39,143 L42,144 L39,145 L38,148 L37,145 L34,144 L37,143Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M100,105 L101,108 L104,109 L101,110 L100,113 L99,110 L96,109 L99,108Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M230,95 L231,98 L234,99 L231,100 L230,103 L229,100 L226,99 L229,98Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M370,130 L371,133 L374,134 L371,135 L370,138 L369,135 L366,134 L369,133Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M308,128 L309,131 L312,132 L309,133 L308,136 L307,133 L304,132 L307,131Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Dot stars -->
  <circle cx="80" cy="160" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="185" cy="108" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="252" cy="83" r="2.5" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="374" cy="88" r="2" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="130" cy="147" r="2" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Sample constellation (Big Dipper-like, top area) -->
  <circle cx="44" cy="188" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="68" cy="180" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="92" cy="176" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="116" cy="182" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="136" cy="173" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="154" cy="160" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="166" cy="178" r="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Constellation lines -->
  <line x1="44" y1="188" x2="68" y2="180" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="68" y1="180" x2="92" y2="176" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="92" y1="176" x2="116" y2="182" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="116" y1="182" x2="136" y2="173" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="136" y1="173" x2="154" y2="160" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="154" y1="160" x2="166" y2="178" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hill (ground) -->
  <path d="M28,440 Q120,370 200,375 Q280,380 372,440Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Hill texture grass -->
  <path d="M80,415 Q85,408 90,415" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M130,400 Q135,393 140,400" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M260,392 Q265,385 270,392" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M310,405 Q315,398 320,405" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Telescope tripod -->
  <line x1="200" y1="340" x2="175" y2="420" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="340" x2="200" y2="422" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="340" x2="225" y2="420" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Tripod feet -->
  <line x1="175" y1="420" x2="165" y2="425" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="175" y1="420" x2="182" y2="426" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="225" y1="420" x2="218" y2="426" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="225" y1="420" x2="232" y2="425" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Telescope tube -->
  <rect x="186" y="270" width="28" height="80" rx="8" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-30 200 310)"/>
  <!-- Eyepiece end -->
  <ellipse cx="230" cy="255" rx="10" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-30 230 255)"/>
  <!-- Objective end (wider) -->
  <ellipse cx="170" cy="345" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-30 170 345)"/>
  <!-- Focuser knob -->
  <rect x="197" y="298" width="14" height="10" rx="3" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30 204 303)"/>

  <!-- OWL beside telescope -->
  <!-- Body -->
  <ellipse cx="298" cy="382" rx="38" ry="46" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing left -->
  <path d="M262,368 Q242,382 257,408 Q272,398 272,374Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing right -->
  <path d="M334,368 Q354,382 339,408 Q324,398 324,374Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly -->
  <ellipse cx="298" cy="392" rx="22" ry="28" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M288,384 Q298,387 308,384" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M286,394 Q298,397 310,394" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>

  <!-- HEAD -->
  <circle cx="298" cy="312" r="50" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ear tufts -->
  <polygon points="272,268 265,244 282,264" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="324,268 331,244 314,264" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="280" cy="310" r="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="316" cy="310" r="20" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="280" cy="310" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="316" cy="310" r="13" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="281" cy="311" r="6" fill="#2a2a2a"/>
  <circle cx="317" cy="311" r="6" fill="#2a2a2a"/>
  <circle cx="284" cy="307" r="2" fill="white"/>
  <circle cx="320" cy="307" r="2" fill="white"/>
  <path d="M264,296 Q272,291 282,294" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M298,294 Q308,290 318,293" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M294,323 L298,332 L302,323 Q298,320 294,323Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Scarf -->
  <path d="M258,342 Q298,358 338,342" fill="none" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round"/>
  <path d="M338,342 L342,360 L335,364 L330,350" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scarf fringe -->
  <line x1="335" y1="364" x2="332" y2="372" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="339" y1="363" x2="337" y2="371" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="342" y1="360" x2="341" y2="368" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Talon pointing at telescope -->
  <path d="M262,420 L255,430 M262,420 L260,433 M262,420 L268,431" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M332,420 L325,430 M332,420 L330,433 M332,420 L338,431" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="473" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">내가 만든 별자리의 이름과</tspan>
    <tspan x="200" dy="18">이야기를 써 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
