<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">생각에 잠긴 지우</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Stool / perch that owl sits on -->
  <rect x="162" y="402" width="76" height="12" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <rect x="172" y="414" width="10" height="38" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="218" y="414" width="10" height="38" rx="4" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Foot rest bar -->
  <line x1="172" y1="432" x2="228" y2="432" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- LARGE THOUGHT BUBBLE (upper 2/3 of page) -->
  <!-- Small rising bubbles from chin area (owl chin ~y=330) -->
  <circle cx="200" cy="330" r="5" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="202" cy="315" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="205" cy="296" r="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Main thought cloud (large, takes up top area) -->
  <!-- Cloud is composed of overlapping circles -->
  <ellipse cx="220" cy="190" rx="106" ry="88" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <ellipse cx="165" cy="162" rx="42" ry="36" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="140" cy="200" rx="36" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="155" cy="238" rx="38" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="198" cy="252" rx="40" ry="24" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="250" cy="246" rx="38" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="292" cy="222" rx="36" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="306" cy="180" rx="34" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="288" cy="148" rx="34" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="250" cy="128" rx="38" ry="28" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="206" cy="120" rx="36" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="168" cy="130" rx="34" ry="26" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Inside thought cloud: smaller empty bubbles for drawing -->
  <!-- Empty bubble 1 (left side of cloud) -->
  <circle cx="160" cy="185" r="30" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Empty bubble 2 (center) -->
  <circle cx="222" cy="178" r="36" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Empty bubble 3 (right side) -->
  <circle cx="284" cy="185" r="28" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Empty bubble 4 (bottom center) -->
  <circle cx="210" cy="232" r="22" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Empty bubble 5 (bottom right) -->
  <circle cx="265" cy="226" r="20" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Gear/cogwheel icons floating near cloud -->
  <!-- Cogwheel 1 (top left of page, outside cloud) -->
  <circle cx="44" cy="105" r="18" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="44" cy="105" r="11" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Gear teeth -->
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(0 44 105)"/>
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60 44 105)"/>
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120 44 105)"/>
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(180 44 105)"/>
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240 44 105)"/>
  <rect x="40" y="84" width="8" height="8" rx="2" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300 44 105)"/>

  <!-- Cogwheel 2 (right side) -->
  <circle cx="358" cy="110" r="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="358" cy="110" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(0 358 110)"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(60 358 110)"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(120 358 110)"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(180 358 110)"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(240 358 110)"/>
  <rect x="354" y="93" width="8" height="6" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(300 358 110)"/>

  <!-- Small cogwheel bottom right -->
  <circle cx="355" cy="330" r="11" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="355" cy="330" r="6" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(0 355 330)"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(60 355 330)"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(120 355 330)"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(180 355 330)"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(240 355 330)"/>
  <rect x="351" y="316" width="8" height="5" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.2" transform="rotate(300 355 330)"/>

  <!-- OWL in "thinking" pose (chin on talon) -->
  <!-- Body -->
  <ellipse cx="193" cy="370" rx="44" ry="52" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing left (tucked) -->
  <path d="M151,356 Q132,368 146,394 Q162,384 162,360Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing right (raised, talon to chin) -->
  <path d="M235,340 Q258,330 260,350 Q252,370 235,360Z" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Talon at chin (thinking pose) -->
  <path d="M248,348 Q252,336 262,330" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Claw tips under chin -->
  <path d="M248,348 L242,340 M248,348 L250,338 M248,348 L256,342" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Belly -->
  <ellipse cx="193" cy="382" rx="26" ry="33" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M181,372 Q193,376 205,372" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M179,383 Q193,387 207,383" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>
  <path d="M181,394 Q193,398 205,394" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-linecap="round"/>

  <!-- HEAD (slightly tilted, resting on talon) -->
  <circle cx="200" cy="308" r="54" fill="white" stroke="#2a2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ear tufts -->
  <polygon points="174,262 167,238 185,258" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="226,262 233,238 215,258" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes (slightly dreamy/contemplative - looking upward) -->
  <circle cx="182" cy="305" r="21" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="218" cy="305" r="21" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <circle cx="182" cy="305" r="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="218" cy="305" r="14" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Pupils looking slightly upward -->
  <circle cx="183" cy="302" r="7" fill="#2a2a2a"/>
  <circle cx="219" cy="302" r="7" fill="#2a2a2a"/>
  <circle cx="186" cy="299" r="2.5" fill="white"/>
  <circle cx="222" cy="299" r="2.5" fill="white"/>
  <!-- Eyelash lines -->
  <path d="M165,291 Q174,285 185,289" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M202,289 Q213,284 224,288" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Half-lidded dreamy top of eye -->
  <path d="M161,305 Q182,295 203,305" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M197,305 Q218,295 239,305" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Beak -->
  <path d="M196,321 L200,330 L204,321 Q200,318 196,321Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spectacles -->
  <circle cx="182" cy="305" r="23" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="218" cy="305" r="23" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="205" y1="305" x2="195" y2="305" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="159" y1="301" x2="149" y2="297" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <line x1="241" y1="301" x2="251" y2="297" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Left talon on stool -->
  <path d="M162,418 L155,428 M162,418 L161,432 M162,418 L170,429" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="476" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">지우의 생각 풍선에 내가 고민하는</tspan>
    <tspan x="200" dy="18">것을 그려 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
