<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" stroke="#2a2a2a" stroke-width="3" fill="none"/>
  <rect x="16" y="16" width="368" height="528" rx="10" stroke="#2a2a2a" stroke-width="1" fill="none"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">느루의 작은 정원</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Ground / soil rows -->
  <rect x="35" y="390" width="330" height="55" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Soil furrow lines -->
  <path d="M45,405 Q200,400 355,405" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M45,420 Q200,415 355,420" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <path d="M45,435 Q200,430 355,435" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Plant sprouts in soil - row of 6 -->
  <!-- Sprout 1 -->
  <line x1="60" y1="390" x2="60" y2="360" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="52" cy="370" rx="10" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,52,370)"/>
  <ellipse cx="68" cy="368" rx="10" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(30,68,368)"/>

  <!-- Sprout 2 - flower -->
  <line x1="105" y1="390" x2="105" y2="350" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="105" cy="343" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="105" cy="332" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="114" cy="337" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(60,114,337)"/>
  <ellipse cx="114" cy="349" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(120,114,349)"/>
  <ellipse cx="105" cy="354" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="96" cy="349" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(240,96,349)"/>
  <ellipse cx="96" cy="337" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(300,96,337)"/>

  <!-- Sprout 3 - tall -->
  <line x1="155" y1="390" x2="155" y2="340" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="143" cy="352" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20,143,352)"/>
  <ellipse cx="167" cy="348" rx="12" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(20,167,348)"/>
  <ellipse cx="155" cy="338" rx="8" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Sprout 4 - small -->
  <line x1="250" y1="390" x2="250" y2="368" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="243" cy="373" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(-25,243,373)"/>
  <ellipse cx="257" cy="371" rx="8" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8" transform="rotate(25,257,371)"/>

  <!-- Sprout 5 - flower -->
  <line x1="300" y1="390" x2="300" y2="352" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="300" cy="345" r="8" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="300" cy="334" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="309" cy="339" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(60,309,339)"/>
  <ellipse cx="309" cy="351" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(120,309,351)"/>
  <ellipse cx="291" cy="351" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(240,291,351)"/>
  <ellipse cx="291" cy="339" rx="5" ry="7" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(300,291,339)"/>

  <!-- Sprout 6 -->
  <line x1="348" y1="390" x2="348" y2="363" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="338" cy="370" rx="10" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,338,370)"/>
  <ellipse cx="358" cy="368" rx="10" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(30,358,368)"/>

  <!-- Butterfly -->
  <ellipse cx="330" cy="155" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-30,330,155)"/>
  <ellipse cx="358" cy="148" rx="20" ry="12" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(30,358,148)"/>
  <ellipse cx="330" cy="170" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(20,330,170)"/>
  <ellipse cx="355" cy="165" rx="14" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2" transform="rotate(-20,355,165)"/>
  <line x1="343" y1="158" x2="343" y2="168" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Butterfly antennae -->
  <path d="M343,158 Q337,147 333,142" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="333" cy="142" r="2" fill="#2a2a2a"/>
  <path d="M343,158 Q349,147 353,142" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="353" cy="142" r="2" fill="#2a2a2a"/>

  <!-- Snail -->
  <ellipse cx="55" cy="383" rx="18" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Snail shell spiral -->
  <circle cx="62" cy="375" r="11" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <path d="M62,375 m5,0 a5,5 0 1,1 -5,5 a3,3 0 1,0 3,-3" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Snail head -->
  <ellipse cx="40" cy="382" rx="8" ry="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <line x1="38" y1="376" x2="36" y2="370" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="36" cy="370" r="2" fill="#2a2a2a"/>
  <line x1="42" y1="376" x2="40" y2="370" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="370" r="2" fill="#2a2a2a"/>
  <!-- Snail eye -->
  <circle cx="38" cy="382" r="2" fill="#2a2a2a"/>

  <!-- TURTLE with watering can -->
  <!-- Shell -->
  <ellipse cx="195" cy="290" rx="68" ry="54" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <ellipse cx="195" cy="306" rx="68" ry="19" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Hex pattern -->
  <polygon points="195,244 213,253 213,271 195,280 177,271 177,253" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="218,258 235,266 235,283 218,291 201,283 201,266" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="172,258 189,266 189,283 172,291 155,283 155,266" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="195,273 212,281 212,297 195,305 178,297 178,281" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Flower decoration on shell -->
  <circle cx="195" cy="260" r="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="195" cy="253" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="201" cy="256" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(60,201,256)"/>
  <ellipse cx="201" cy="264" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(120,201,264)"/>
  <ellipse cx="195" cy="267" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <ellipse cx="189" cy="264" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(240,189,264)"/>
  <ellipse cx="189" cy="256" rx="3" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(300,189,256)"/>

  <!-- Legs -->
  <ellipse cx="246" cy="320" rx="18" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-20,246,320)"/>
  <ellipse cx="145" cy="320" rx="18" ry="11" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(20,145,320)"/>
  <ellipse cx="238" cy="334" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(10,238,334)"/>
  <ellipse cx="153" cy="334" rx="16" ry="10" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-10,153,334)"/>

  <!-- Neck -->
  <ellipse cx="250" cy="292" rx="14" ry="19" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Head -->
  <circle cx="267" cy="274" r="22" fill="white" stroke="#2a2a2a" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="274" cy="268" r="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="276" cy="268" r="2.5" fill="#2a2a2a"/>
  <circle cx="277" cy="266" r="1" fill="white"/>
  <circle cx="260" cy="270" r="4" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <circle cx="260" cy="270" r="1.5" fill="#2a2a2a"/>
  <!-- Smile -->
  <path d="M258,279 Q266,286 274,280" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M129,308 Q117,315 114,325" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Watering can (held by raised front leg) -->
  <rect x="274" y="295" width="38" height="28" rx="5" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Watering can spout -->
  <path d="M312,305 Q330,298 340,308 L336,314 Q325,308 314,313 Z" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Watering can handle -->
  <path d="M274,300 Q264,292 268,308" fill="none" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Water drops -->
  <path d="M337,314 Q339,320 337,324" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M342,318 Q344,324 342,328" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M347,322 Q349,328 347,332" fill="none" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Raised front leg holding can -->
  <ellipse cx="278" cy="313" rx="15" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2.5" transform="rotate(-60,278,313)"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">느루의 정원에 내가 심고 싶은</tspan>
    <tspan x="200" dy="18">식물을 그려 넣어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
