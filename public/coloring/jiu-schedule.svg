<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <rect width="400" height="560" fill="white"/>
  <rect x="8" y="8" width="384" height="544" rx="14" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="16" y="16" width="368" height="528" rx="10" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="50" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="20" font-weight="bold" fill="#2a2a2a">하루 계획 세우기</text>
  <line x1="40" y1="62" x2="360" y2="62" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Owl (small, top-left corner) -->
  <!-- Body -->
  <ellipse cx="62" cy="118" rx="26" ry="30" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing left small -->
  <path d="M38,110 Q26,118 36,134 Q48,128 46,114Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wing right small -->
  <path d="M86,110 Q98,118 88,134 Q76,128 78,114Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Belly -->
  <ellipse cx="62" cy="124" rx="14" ry="18" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- HEAD small -->
  <circle cx="62" cy="82" r="30" fill="white" stroke="#2a2a2a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ear tufts small -->
  <polygon points="47,60 43,44 54,57" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="77,60 81,44 70,57" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes small -->
  <circle cx="51" cy="80" r="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="73" cy="80" r="12" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="51" cy="80" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="73" cy="80" r="8" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="52" cy="81" r="4" fill="#2a2a2a"/>
  <circle cx="74" cy="81" r="4" fill="#2a2a2a"/>
  <circle cx="54" cy="78" r="1.5" fill="white"/>
  <circle cx="76" cy="78" r="1.5" fill="white"/>
  <path d="M43,70 Q49,66 56,69" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M62,68 Q70,64 78,67" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Beak small -->
  <path d="M59,90 L62,96 L65,90 Q62,88 59,90Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Specs small -->
  <circle cx="51" cy="80" r="13" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <circle cx="73" cy="80" r="13" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="64" y1="80" x2="60" y2="80" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Talon small with pencil -->
  <line x1="62" y1="146" x2="62" y2="152" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M52,150 L58,158 M62,148 L62,158 M62,148 L70,158" fill="none" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Pencil in right talon -->
  <rect x="86" y="130" width="5" height="22" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(25 88 141)"/>
  <polygon points="85,152 90,152 87,159" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" transform="rotate(25 88 155)"/>

  <!-- Daily schedule table -->
  <!-- Outer frame -->
  <rect x="28" y="158" width="344" height="278" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Table header -->
  <rect x="28" y="158" width="344" height="28" rx="6" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <text x="65" y="177" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" font-weight="bold" fill="#2a2a2a">시간</text>
  <text x="210" y="177" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="11" font-weight="bold" fill="#2a2a2a">할 일 / 계획</text>

  <!-- Vertical divider (time col | activity col) -->
  <line x1="100" y1="158" x2="100" y2="436" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Rows: 8 time slots -->
  <!-- Row 1: 6 AM -->
  <line x1="28" y1="220" x2="372" y2="220" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 2: 8 AM -->
  <line x1="28" y1="253" x2="372" y2="253" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 3: 10 AM -->
  <line x1="28" y1="286" x2="372" y2="286" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 4: 12 PM -->
  <line x1="28" y1="319" x2="372" y2="319" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 5: 2 PM -->
  <line x1="28" y1="352" x2="372" y2="352" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 6: 4 PM -->
  <line x1="28" y1="385" x2="372" y2="385" stroke="#2a2a2a" stroke-width="1.2"/>
  <!-- Row 7: 7 PM -->
  <line x1="28" y1="418" x2="372" y2="418" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- Time labels -->
  <text x="64" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오전 6시</text>
  <text x="64" y="239" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오전 8시</text>
  <text x="64" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오전10시</text>
  <text x="64" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오후 12시</text>
  <text x="64" y="338" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오후 2시</text>
  <text x="64" y="371" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">오후 4시</text>
  <text x="64" y="404" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">저녁 7시</text>
  <text x="64" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2a2a2a">밤 9시</text>

  <!-- Row icons (right side, in activity area) -->
  <!-- 6AM: sunrise icon -->
  <circle cx="115" cy="203" r="7" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="115" y1="193" x2="115" y2="190" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="108" y1="196" x2="106" y2="194" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="196" x2="124" y2="194" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M108,212 Q115,208 122,212" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 8AM: fork & knife (breakfast) -->
  <line x1="112" y1="230" x2="112" y2="248" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M109,230 L109,237 Q112,239 115,237 L115,230" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="120" y1="230" x2="120" y2="248" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M117,230 Q120,234 123,230" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="235" x2="120" y2="237" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 10AM: open book (study) -->
  <path d="M108,269 Q116,265 124,269 L124,282 Q116,278 108,282Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="116" y1="265" x2="116" y2="282" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="110" y1="272" x2="114" y2="271" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="118" y1="271" x2="122" y2="272" stroke="#2a2a2a" stroke-width="1"/>

  <!-- 12PM: bowl (lunch) -->
  <path d="M108,302 Q116,296 124,302 Q122,310 108,310Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="106" y1="310" x2="126" y2="310" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Steam -->
  <path d="M112,300 Q113,295 112,291" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M116" y1="298" Q117,293 116,289" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M116,298 Q117,293 116,289" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M120,300 Q121,295 120,291" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 2PM: pencil (homework) -->
  <rect x="110" y="332" width="5" height="20" rx="1.5" fill="white" stroke="#2a2a2a" stroke-width="1.5" transform="rotate(-15 112 342)"/>
  <polygon points="109,352 114,352 111,358" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" transform="rotate(-15 112 355)"/>

  <!-- 4PM: running figure (exercise/play) -->
  <circle cx="116" cy="365" r="4" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <path d="M116,369 L114,378 L110,386" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M114,374 L120,376" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M114,378 L118,385" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 7PM: TV / free time star -->
  <path d="M112,401 L114,407 L120,407 L115,411 L117,417 L112,413 L107,417 L109,411 L104,407 L110,407Z" fill="white" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 9PM: moon (sleep) -->
  <path d="M110,422 Q118,424 116,432 Q106,430 107,422 Q108,419 110,422Z" fill="white" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Activity prompt -->
  <text x="200" y="450" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">오늘 하루 계획을 지우처럼</tspan>
    <tspan x="200" dy="18">시간표로 만들어 보세요.</tspan>
  </text>
  <text x="200" y="540" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="10" fill="#aaa">마음마을 © 색칠공부</text>
</svg>
