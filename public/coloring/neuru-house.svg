  <path d="M228,390 Q233,395 238,391" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Activity prompt -->
  <text x="200" y="490" text-anchor="middle" font-family="'Noto Sans KR',Arial,sans-serif" font-size="13" fill="#555">
    <tspan x="200" dy="0">느루의 집 창문에 무엇이 보이나요?</tspan>
    <tspan x="200" dy="18">그려 보세요.</tspan>
