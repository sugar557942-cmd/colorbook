  <circle cx="270" cy="392" r="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="270" cy="379" rx="5" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="270" cy="405" rx="5" ry="9" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="257" cy="392" rx="9" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="283" cy="392" rx="9" ry="5" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <line x1="270" y1="399" x2="270" y2="418" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>

  <!-- Tulip 3 right -->
  <line x1="328" y1="412" x2="328" y2="358" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round"/>
  <path d="M320,358 Q320,335 328,325 Q336,335 336,358 Z" fill="white" stroke="#2a2a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M336,382 Q346,370 340,360" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-linecap="round"/>

