<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <style>
    .colorable { fill: white; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; }
    .outline { fill: none; stroke: #333; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .fixed { fill: #333; }
  </style>
  <rect width="400" height="500" fill="#FFFFFF"/>

  <!-- 몸통 -->
  <rect x="150" y="280" width="100" height="110" rx="20" class="colorable" id="body"/>
  <!-- 앞치마 -->
  <path d="M158 285 Q200 295 242 285 L238 390 Q200 400 162 390 Z" class="colorable" id="apron"/>
  <!-- 앞치마 주머니 -->
  <rect x="182" y="340" width="36" height="30" rx="6" class="colorable" id="pocket"/>

  <!-- 팔 왼쪽 -->
  <rect x="108" y="278" width="46" height="22" rx="11" class="colorable" id="arm-l"/>
  <!-- 팔 오른쪽 - 들고있음 -->
  <rect x="246" y="260" width="22" height="55" rx="11" class="colorable" id="arm-r"/>

  <!-- 다리 -->
  <rect x="162" y="390" width="30" height="50" rx="12" class="colorable" id="leg-l"/>
  <rect x="208" y="390" width="30" height="50" rx="12" class="colorable" id="leg-r"/>
  <!-- 발 -->
  <ellipse cx="177" cy="440" rx="20" ry="12" class="colorable" id="foot-l"/>
  <ellipse cx="223" cy="440" rx="20" ry="12" class="colorable" id="foot-r"/>

  <!-- 머리 -->
  <ellipse cx="200" cy="195" rx="80" ry="88" class="colorable" id="head"/>
  <!-- 귀 (뾰족한 여우 귀) -->
  <polygon points="130,145 115,90 158,128" class="colorable" id="ear-l"/>
  <polygon points="135,150 122,97 163,132" fill="white" stroke="#333" stroke-width="1.5"/>
  <polygon points="270,145 285,90 242,128" class="colorable" id="ear-r"/>
  <polygon points="265,150 278,97 237,132" fill="white" stroke="#333" stroke-width="1.5"/>

  <!-- 주둥이 -->
  <ellipse cx="200" cy="215" rx="32" ry="22" class="colorable" id="snout"/>
  <!-- 눈 -->
  <circle cx="176" cy="190" r="13" class="colorable" id="eye-l"/>
  <circle cx="176" cy="190" r="6" class="fixed"/>
  <circle cx="173" cy="187" r="2.5" fill="white"/>
  <circle cx="224" cy="190" r="13" class="colorable" id="eye-r"/>
  <circle cx="224" cy="190" r="6" class="fixed"/>
  <circle cx="221" cy="187" r="2.5" fill="white"/>
  <!-- 코 -->
  <ellipse cx="200" cy="210" rx="7" ry="5" class="colorable" id="nose"/>
  <!-- 입 -->
  <path d="M187 222 Q200 234 213 222" class="outline"/>
  <!-- 수염 -->
  <line x1="160" y1="218" x2="135" y2="212" class="outline" stroke-width="1.5"/>
  <line x1="160" y1="224" x2="133" y2="224" class="outline" stroke-width="1.5"/>
  <line x1="240" y1="218" x2="265" y2="212" class="outline" stroke-width="1.5"/>
  <line x1="240" y1="224" x2="267" y2="224" class="outline" stroke-width="1.5"/>
  <!-- 볼터치 -->
  <ellipse cx="162" cy="208" rx="14" ry="9" class="colorable" id="blush-l"/>
  <ellipse cx="238" cy="208" rx="14" ry="9" class="colorable" id="blush-r"/>

  <!-- 고글 (발명가) -->
  <ellipse cx="176" cy="168" rx="22" ry="16" class="colorable" id="goggle-l"/>
  <ellipse cx="224" cy="168" rx="22" ry="16" class="colorable" id="goggle-r"/>
  <line x1="198" y1="168" x2="202" y2="168" class="outline" stroke-width="3"/>
  <path d="M132 162 Q154 155 154 168" class="outline" stroke-width="2.5"/>
  <path d="M268 162 Q246 155 246 168" class="outline" stroke-width="2.5"/>

  <!-- 오른손에 든 렌치 -->
  <rect x="255" y="240" width="14" height="45" rx="5" class="colorable" id="wrench-body"/>
  <ellipse cx="262" cy="232" rx="12" ry="10" class="colorable" id="wrench-head"/>
  <rect x="256" y="226" width="12" height="8" rx="3" class="colorable" id="wrench-gap"/>

  <!-- 왼손 연장통 -->
  <rect x="65" y="295" width="52" height="38" rx="8" class="colorable" id="toolbox"/>
  <rect x="82" y="287" width="18" height="12" rx="4" class="colorable" id="toolbox-handle"/>
  <!-- 볼트 장식 -->
  <circle cx="78" cy="310" r="5" class="colorable" id="bolt1"/>
  <circle cx="104" cy="310" r="5" class="colorable" id="bolt2"/>
  <!-- 십자 -->
  <line x1="75" y1="310" x2="81" y2="310" class="outline" stroke-width="1.5"/>
  <line x1="78" y1="307" x2="78" y2="313" class="outline" stroke-width="1.5"/>
  <line x1="101" y1="310" x2="107" y2="310" class="outline" stroke-width="1.5"/>
  <line x1="104" y1="307" x2="104" y2="313" class="outline" stroke-width="1.5"/>

  <!-- 톱니바퀴 배경 장식 -->
  <g opacity="0.25" transform="translate(310,420)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF8B4A" stroke-width="8" stroke-dasharray="18 8"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#FF8B4A" stroke-width="4"/>
  </g>
  <g opacity="0.2" transform="translate(55,430)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#FF8B4A" stroke-width="6" stroke-dasharray="13 6"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#FF8B4A" stroke-width="3"/>
  </g>

  <text x="200" y="490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#FF8B4A" font-weight="bold">나리 🦊</text>
</svg>
