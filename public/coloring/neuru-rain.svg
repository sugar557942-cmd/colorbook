  <path d="M350,195 L346,213" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M370,210 L366,228" stroke="#2a2a2a" stroke-width="1.8" stroke-linecap="round"/>

