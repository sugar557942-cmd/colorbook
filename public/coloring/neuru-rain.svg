  <ellipse cx="80" cy="440" rx="20" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="80" cy="440" rx="10" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <ellipse cx="320" cy="442" rx="28" ry="9" fill="white" stroke="#2a2a2a" stroke-width="2"/>
  <ellipse cx="320" cy="442" rx="18" ry="6" fill="white" stroke="#2a2a2a" stroke-width="1.2"/>
  <ellipse cx="320" cy="442" rx="9" ry="3" fill="white" stroke="#2a2a2a" stroke-width="1"/>
  <ellipse cx="200" cy="438" rx="22" ry="7" fill="white" stroke="#2a2a2a" stroke-width="1.8"/>
  <ellipse cx="200" cy="438" rx="12" ry="4" fill="white" stroke="#2a2a2a" stroke-width="1"/>

