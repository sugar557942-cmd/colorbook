  <!-- Central stars -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial" font-size="18" fill="none" stroke="#2a2a2a" stroke-width="1.5">✦</text>
  <text x="200" y="260" text-anchor="middle" font-family="Arial" font-size="12" fill="none" stroke="#2a2a2a" stroke-width="1.2">✦</text>
  <text x="192" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="none" stroke="#2a2a2a" stroke-width="1">✦</text>
  <text x="208" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="none" stroke="#2a2a2a" stroke-width="1">✦</text>
  <!-- Star dots drawn as small asterisks / 6-pointed shapes -->
