  <line x1="182" y1="274" x2="190" y2="278" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="190" y1="274" x2="182" y2="278" stroke="#2a2a2a" stroke-width="1.3" stroke-linecap="round"/>

